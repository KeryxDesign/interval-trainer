<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#14151a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Huermony</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#14151a; --surface:#1e2027; --surface2:#262932; --text:#edeef2; --muted:#9aa0ad; --line:#33363f; --gold:#eab308;
}
[hidden]{display:none !important;}
#ver{position:fixed; top:calc(env(safe-area-inset-top,0px) + 3px); right:8px; z-index:80; font-size:10px; font-weight:600; letter-spacing:.04em; color:var(--muted); opacity:.55; pointer-events:none;}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;}
input,textarea,select,[contenteditable]{-webkit-user-select:text; user-select:text;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; touch-action:manipulation;}
.wrap{max-width:480px; margin:0 auto; padding:16px 16px 96px;}
header{display:flex; align-items:center; justify-content:center; margin:4px 0 18px; background:var(--surface2); border-radius:14px; padding:12px 16px;}
h1{font-size:22px; font-weight:700; letter-spacing:-0.02em; margin:0; cursor:pointer;}
.lang{display:flex; gap:2px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:2px; font-size:13px; font-weight:600;}
.lang button{border:none; background:transparent; color:var(--muted); padding:4px 10px; border-radius:999px; cursor:pointer; font-weight:600;}
.lang button.on{background:var(--surface2); color:var(--text);}
.tabs{position:fixed; left:0; right:0; bottom:0; margin:0 auto; max-width:480px; display:flex; background:var(--surface); border-top:1px solid var(--line); padding:7px 4px calc(7px + env(safe-area-inset-bottom)); z-index:30;}
.tab{flex:1; border:none; background:transparent; color:var(--muted); font-size:12px; font-weight:600; padding:3px 0; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px;}
.tab i{font-size:23px; line-height:1;}
.tab.on{color:var(--text);}
/* tab Home centrale: rialzato e oro, sovrapposto alla barra */
#tab-corso{justify-content:flex-end;}
#tab-corso i{background:var(--gold); color:#14151a; width:60px; height:60px; border-radius:50%; font-size:28px; display:flex; align-items:center; justify-content:center; margin-top:-30px; box-shadow:0 6px 18px rgba(0,0,0,.45); border:5px solid var(--bg);}
#tab-corso .tablbl{color:var(--gold); font-weight:800;}
/* card prossimo esercizio: nota a destra */
.nextcard{display:flex; align-items:center; gap:14px;}
.nextcard .ntxt{flex:1; min-width:0;}
.nnote{flex:0 0 auto; width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; background:rgba(0,0,0,.18);}
/* tip random */
.tipcard{display:flex; align-items:flex-start; gap:10px; background:var(--surface2); border-radius:14px; padding:14px 16px; font-size:14px; line-height:1.5; color:var(--text);}
.tipcard i{color:var(--gold); font-size:19px; flex:0 0 auto; margin-top:1px;}
.dashsec{display:flex; align-items:center; gap:12px; font-size:16px; color:var(--text); font-weight:800; margin:32px 0 16px; text-transform:uppercase; letter-spacing:.6px; text-align:center;}
.dashsec::before,.dashsec::after{content:""; flex:1; height:2px; background:var(--line); border-radius:2px;}
#medalinfo{margin-top:14px; text-align:center; font-size:14px; line-height:1.45; color:var(--muted);}
#medalinfo b{color:var(--text);}
.edot{position:absolute; width:12px; height:12px; border-radius:50%;}
.dashhead{display:flex; flex-direction:column; align-items:center; gap:10px; margin:28px 0 24px; text-align:center;}
.dashhead #emblem{position:relative; width:128px; height:128px; flex:0 0 auto;}
.dashname{display:flex; align-items:center; gap:8px; justify-content:center;}
#hname{font-size:24px; font-weight:800; letter-spacing:-0.02em; margin:0;}
#htag{font-size:14px; color:var(--muted); margin:0 0 14px;}
.metrics{display:flex; flex-wrap:wrap; gap:10px; margin:0 0 14px;}
.metric{flex:1 1 28%; min-width:90px; background:var(--surface); border-radius:14px; padding:14px 10px; text-align:center;}
.metric .mv{font-size:26px; font-weight:700; line-height:1;}
.metric .ml{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-top:6px;}
#dash-studied{font-size:15px; color:var(--muted); background:var(--surface); border-radius:12px; padding:13px 15px; margin:0 0 18px; display:flex; align-items:center; gap:10px;}
#hplay{width:100%; min-height:54px; border:none; border-radius:14px; background:var(--text); color:var(--bg); font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;}
#hplay:active{transform:scale(0.99);}
#hprog{display:none;}
#hguide{display:block; width:100%; text-align:center; font-size:15px; font-weight:600; color:var(--text); background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:15px; cursor:pointer; margin-top:10px;}
#htut{width:100%; justify-content:center; margin-top:14px;}
#streak{display:inline-flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 14px; font-size:14px; font-weight:700; margin:0 0 16px;}
#streak i{color:#f59e0b; font-size:18px;}
.profrow{display:flex; align-items:center; gap:14px; background:var(--surface); border-radius:16px; padding:14px; margin:0 0 18px; cursor:pointer;}
.profrow .pedit{margin-left:auto; color:var(--muted); font-size:18px;}
#guide-intro h2{font-size:26px; line-height:1.25; font-weight:800; letter-spacing:-.02em; margin:0 0 16px;}
.heroq{font-size:21px; line-height:1.4; font-weight:700; color:var(--text); margin:0 0 22px; padding:18px 18px 18px 20px; background:var(--surface2); border-radius:16px; border-left:4px solid var(--gold);}
.heropts{display:flex; flex-direction:column; gap:14px; margin:0 0 8px;}
.hp{display:flex; align-items:center; gap:13px;}
.hp i{font-size:20px; color:var(--gold); width:40px; height:40px; flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; background:rgba(234,179,8,.12); border-radius:12px;}
.hp span{font-size:16px; line-height:1.4; color:var(--text);}
.hp b{font-weight:700;}
#tutbtn{width:100%; min-height:52px; justify-content:center; margin:22px 0; background:var(--gold); color:#14151a; font-size:16px; font-weight:700; border:none; border-radius:14px;}
#pe-avatars{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin:0 0 18px;}
#pe-avatars button{border:2px solid transparent; background:none; border-radius:50%; padding:2px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
#pe-avatars button.sel{border-color:var(--gold);}
#pe-name{width:100%; background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:12px; padding:13px 14px; font-size:16px; margin:0 0 18px;}
.fs-lbl{display:block; font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:0 0 8px;}
#freesetup select{background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:12px; appearance:none;}
.fsnote{display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; width:52px; height:52px; border-radius:50%; cursor:pointer; color:#fff;}
.fsnote span{font-size:12px; font-weight:600; line-height:1;}
.controls{display:flex; flex-direction:column; gap:12px; margin-bottom:16px;}
.crow{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.crow.options{flex-wrap:nowrap; justify-content:center; gap:3px;}
.crow.options.optswrap{flex-wrap:wrap;}
.crow.options .btn{padding:6px 8px; font-size:12px;}
.crow.options .btn i{font-size:15px;}
.crow.options .tgl{padding:6px 7px; font-size:12px; gap:5px;}
.crow.options .tgl .track{width:28px; height:17px;}
.crow.options .tgl .knob{width:13px; height:13px;}
.crow.options #mictxt{display:none;}
.spdbox{display:inline-flex; align-items:center; gap:4px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:6px 7px; color:var(--text); font-weight:600; font-size:12px;}
.spdbox i{font-size:15px;}
.spdbox i{color:var(--muted); font-size:16px;}
.spdbox select{appearance:none; -webkit-appearance:none; border:none; background:transparent; color:var(--text); font:inherit; font-weight:600; padding:0; cursor:pointer;}
#tonbox{display:none;}
#gamepanel.incard #tonbox{display:inline-flex;}
#scsel{flex:1 1 auto; min-width:0;}
.crow.actions .btn{flex:1; justify-content:center; padding:12px 14px;}
.crow.actions .btn.primary{flex:1.6;}
select{background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:9px 10px; font-size:14px; appearance:none;}
button.btn{background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:10px 14px; font-size:14px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
button.btn:active{transform:scale(0.97);}
button.btn.primary{background:var(--text); color:var(--bg); border-color:var(--text); font-size:15px;}
.pill{background:var(--surface); color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:9px 14px; font-size:14px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:5px;}
.pill[aria-pressed="true"]{color:var(--text); border-color:var(--gold); box-shadow:inset 0 0 0 1px var(--gold);}
.stats{display:flex; gap:8px; margin:8px 0 2px;}
.stat{flex:1; background:var(--surface); border-radius:12px; display:flex; align-items:baseline; gap:8px; padding:4px 10px;}
.stat p{margin:0;}
.stat .lbl{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em;}
.stat .val{font-size:16px; font-weight:600;}
#status{font-size:16px; font-weight:600; text-align:center; min-height:46px; display:flex; align-items:center; justify-content:center; background:var(--surface); border-radius:12px; padding:8px 14px; margin:8px 0 12px;}
#status.err{border:1px solid #e24b4a;}
#status.ok{border:1px solid #2e9e5b;}
#ctxlabel{font-size:13px; color:var(--muted); margin:0 0 10px;}
#wheelbox{display:flex; justify-content:center; border-radius:20px; transition:background .5s; padding:6px 0; margin:6px 0;}
.pbtn{flex:0 0 auto; width:34px; height:34px; border-radius:50%; border:1px solid var(--line); background:var(--surface2); color:var(--text); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; font-size:15px;}
.pbtn:active{transform:scale(0.94);}
.swt{border:1px solid var(--line); background:var(--surface); color:var(--muted); border-radius:999px; padding:8px 13px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
.swt[aria-pressed="true"]{background:var(--gold); color:#14151a; border-color:var(--gold);}
.tgl{display:inline-flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 12px; font-size:14px; font-weight:600; color:var(--text); cursor:pointer;}
.tgl i{font-size:15px; color:var(--muted);}
.tgl .track{position:relative; width:34px; height:20px; border-radius:999px; background:var(--line); transition:background .15s; flex:0 0 auto;}
.tgl .knob{position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:#fff; transition:transform .15s; box-shadow:0 1px 2px rgba(0,0,0,.4);}
.tgl[aria-pressed="true"]{border-color:var(--gold);}
.tgl[aria-pressed="true"] .track{background:var(--gold);}
.tgl[aria-pressed="true"] .track .knob{transform:translateX(14px);}
.tgl[aria-pressed="true"] i{color:var(--text);}
#wheel{position:relative;}
.key{position:absolute; border-radius:50%; border:none; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:transform .12s; padding:0; color:#fff;}
.key i{line-height:1;}
.key.klock{border:2px dashed #5a616e;}
.key span{font-weight:600; line-height:1.3;}
.kb{display:none;}
@media (pointer:fine){
 .kb{display:block; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid var(--line); border-radius:5px; font-size:10px; font-weight:600; padding:1px 5px; color:var(--muted);}
}
.dot{position:absolute; border-radius:50%; background:var(--line);}
#ctr{position:absolute; border-radius:50%; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; pointer-events:none; color:#fff;}
#reveal{display:flex; flex-wrap:wrap; gap:6px; min-height:30px; margin:8px 0;}
.chip{display:flex; align-items:center; gap:5px; padding:6px 11px; border-radius:999px; background:var(--surface); font-size:14px;}
.chip .sw{width:18px; height:18px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; color:#fff;}
.chip.err{outline:2px solid #e24b4a;}
#mapbox{display:flex; justify-content:center; margin:6px 0 18px;}
#map{position:relative;}
.mapdot{position:absolute; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff;}
.mapdot.off{background:var(--surface2) !important; color:#4a4e59;}
.world{background:var(--surface); border-radius:14px; padding:14px; margin-bottom:12px;}
.secname{font-size:28px; font-weight:800; letter-spacing:-.02em; margin:6px 0 10px; color:var(--text); text-align:center;}
.pathdots{display:flex; gap:7px; justify-content:center; align-items:center; flex-wrap:wrap; margin:6px 0 14px;}
.cpill{border:1.5px solid var(--line); background:var(--surface); color:var(--muted); border-radius:999px; padding:7px 13px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:5px; white-space:nowrap;}
.cpill.on{background:var(--gold); color:#14151a; border-color:var(--gold);}
.cpill.lock{opacity:.65;}
.medals{display:flex; gap:16px; justify-content:center; align-items:center; margin:0 0 18px; font-size:15px; font-weight:700; color:var(--text);}
.medal{display:inline-flex; align-items:center; gap:5px;}
.medalgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
.medalcell{display:flex; flex-direction:column; align-items:center; gap:5px; text-align:center; opacity:.4; cursor:pointer;}
.medalcell.on{opacity:1;}
.medalcell .mic{width:48px; height:48px; border-radius:50%; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:23px; color:var(--muted);}
.medalcell.on .mic{background:var(--gold); color:#14151a;}
.medalcell small{font-size:11px; line-height:1.15; color:var(--muted);}
.medalcell.on small{color:var(--text);}
.nextcard{width:100%; text-align:left; border:none; border-radius:16px; cursor:pointer; padding:16px 18px; background:linear-gradient(135deg,var(--gold),#d99818); color:#14151a;}
.nextcard:active{transform:scale(0.99);}
.nextcard .nlabel{font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; opacity:.7;}
.nextcard .ntitle{font-size:19px; font-weight:800; margin-top:3px; display:flex; align-items:center; gap:8px;}
.nextcard .nsub{font-size:14px; opacity:.8; margin-top:2px;}
.coursepage.locked .secname{color:var(--muted);}
.gameslot{margin:0 0 6px;}
.accwheel{margin-top:6px;}
#gamepanel.incard #gametop, #gamepanel.incard #goalbar, #gamepanel.incard #bossbar, #gamepanel.incard #tutbox, #gamepanel.incard #chordbar, #gamepanel.incard #chordseqrow, #gamepanel.incard #rowsetup, #gamepanel.incard .legbox{display:none !important;}
#gamepanel.incard{display:flex; flex-direction:column;}
#gamepanel.incard #status{order:0;} #gamepanel.incard #micline{order:0;}
#gamepanel.incard #wheelbox{order:1;}
#gamepanel.incard .stats{order:2;}
#gamepanel.incard .controls{order:3; margin:20px 0 0;}
#gamepanel.incard #reveal{order:4;}
.scalerow{justify-content:center;}
.secacc{background:var(--surface); border-radius:14px; margin:0 0 16px; overflow:hidden;}
.secacc summary{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--gold); cursor:pointer; padding:14px 16px; list-style:none; display:flex; align-items:center; justify-content:space-between;}
.secacc summary::-webkit-details-marker{display:none;}
.secacc summary i{color:var(--muted); font-size:18px; transition:transform .15s;}
.secacc summary.coursesum{text-transform:none; color:var(--text); padding:8px 4px; justify-content:center; gap:8px;}
.secacc summary.coursesum .secname{margin:0;}
.secacc[open] summary i{transform:rotate(180deg);}
.secacc .secdesc{padding:0 16px 16px; font-size:15px; line-height:1.6; color:var(--muted); margin:0;}
#methodbody h4{font-size:16px; font-weight:700; color:var(--gold); margin:14px 0 5px;}
#methodbody h4:first-child{margin-top:4px;}
#methodbody p{font-size:15px; line-height:1.6; color:var(--text); margin:0;}
.mwk{position:absolute; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; padding:0;}
.mwk:active{transform:scale(.92);}
.mwctrl{display:flex; gap:8px; justify-content:center; margin:0 0 14px; flex-wrap:wrap;}
.exrow{display:flex; flex-wrap:wrap; align-items:center; gap:8px; justify-content:center; margin:0 0 16px;}
.exlbl{font-size:13px; color:var(--muted); width:100%; text-align:center; margin:0 0 2px;}
.exbtn{background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 13px; font-size:14px; font-weight:600; color:var(--text); cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
.exbtn i{color:var(--gold);}
.exbtn:active{transform:scale(.97);}
.seclock{display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--gold); margin:0 0 14px;}
.pathsec.locked .secname{color:var(--muted);}
.world.courselock{opacity:.45;}
button.levelcard{display:block; width:100%; text-align:left; border:1px solid var(--line); color:var(--text); cursor:pointer; font:inherit;}
button.levelcard:active{transform:scale(0.99);}
.levelcard.bosscard{text-align:center; padding:22px 18px 20px; border:1.5px solid var(--line); background:var(--surface);}
.bosscard.done{border:1.5px solid var(--gold); background:linear-gradient(180deg, rgba(234,179,8,.08), var(--surface));}
.bosscard.locked{opacity:.85;}
.bosscard .skull{font-size:62px; color:#e24b4a; line-height:1; display:block; margin:0 0 8px;}
.bosscard.done .skull{color:var(--gold);}
.bosscard .btitle{font-size:19px; font-weight:700; display:block; margin:0 0 4px;}
.levelcard.elitecard{text-align:center; padding:18px 16px 16px; border:1.5px solid var(--line); background:var(--surface); margin-bottom:14px;}
.elitecard.done{border:1.5px solid var(--gold); background:linear-gradient(180deg, rgba(234,179,8,.10), var(--surface));}
.elitecard.locked{opacity:.85;}
.elitecard .eskull{font-size:46px; color:#e24b4a; line-height:1; display:block; margin:0 0 6px;}
.elitecard.done .eskull{color:var(--gold);}
.elitecard .etitle{font-size:18px; font-weight:700; display:block; margin:0 0 4px;}
.elitecard .estar{color:var(--gold); font-size:20px; vertical-align:-1px;}
.elitecard .esub{font-size:14px; color:var(--muted); margin:0;}
.welpair{display:flex; align-items:center; justify-content:center; gap:14px; margin:0 0 16px;}
.welnote{width:72px; height:72px; border-radius:50%; border:none; background:var(--surface2); color:var(--text); font-size:14px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; transition:transform .1s; flex:0 0 auto;}
.welnote:active{transform:scale(.92);}
#wel-ill{width:82px; height:82px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 22px; background:var(--gold); color:#fff; box-shadow:0 6px 20px rgba(234,179,8,.22);}
@keyframes welIn{from{opacity:0; transform:translateY(16px) scale(.95)} to{opacity:1; transform:translateY(0) scale(1)}}
@keyframes welPop{0%{opacity:0; transform:scale(.4)} 60%{transform:scale(1.08)} 100%{opacity:1; transform:scale(1)}}
@keyframes tutIn{from{opacity:0; transform:translateY(12px) scale(.97)} to{opacity:1; transform:none}}
#wel-ill i{font-size:40px;}
.wel-title{display:block; font-size:21px; font-weight:800; line-height:1.3; letter-spacing:-.01em; margin:0 0 14px;}
.wel-body{display:block; font-size:16px; line-height:1.55; color:var(--text);}
#welcome b{color:var(--gold);}
.welplay{width:42px; height:42px; border-radius:50%; border:none; background:var(--text); color:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; flex:0 0 auto;}
.welplay:active{transform:scale(.92);}
#tutbox{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:18px 16px 16px; margin:0 0 12px; text-align:center;}
.tut-ill{width:62px; height:62px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; box-shadow:0 4px 14px rgba(0,0,0,.25);}
.tut-txt{font-size:16px; line-height:1.45; color:var(--text); margin:0; font-weight:600;}
.tut-chips{display:flex; gap:14px; justify-content:center; margin:14px 0 0;}
.tut-chip{display:flex; flex-direction:column; align-items:center; gap:4px;}
.tut-chip .c{width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
.tut-chip small{font-size:13px; color:var(--muted); font-weight:700;}
.gcard{background:var(--surface); border-radius:16px; padding:18px 18px 20px; margin-bottom:14px; border:1px solid var(--line);}
.ghead{display:flex; align-items:center; gap:11px; margin:0 0 12px;}
.ghead i{font-size:18px; color:var(--gold); flex:0 0 auto; width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; background:rgba(234,179,8,.12); border-radius:10px;}
.ghead span{font-size:18px; font-weight:700; color:var(--text); letter-spacing:-.01em;}
.gbody{font-size:16px; line-height:1.62; margin:0; color:var(--text);}
.gbody b{color:var(--text); font-weight:700;}
.gcard.do{border-left:3px solid var(--gold); background:var(--surface2);}
.gcard.key{background:var(--bg);}
.gcard.key .ghead i{background:rgba(154,160,173,.14); color:var(--muted);}
.gcard.key .gbody{font-size:15px; color:var(--muted);}
.gcard.tip{background:rgba(234,179,8,.07); border:1px solid rgba(234,179,8,.25);}
.gcard.tip .ghead i{background:rgba(234,179,8,.18);}
@media (pointer:coarse){.gcard.key{display:none;}}
.world.locked .wint{opacity:.4; filter:saturate(.4);}
.world.locked .wname{color:var(--muted);}
.whead{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px;}
.wname{font-size:16px; font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.wints{display:flex; gap:4px; flex-shrink:0;}
.wint{width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff;}
.scalerow{display:flex; align-items:center; gap:6px; flex-wrap:wrap; background:rgba(255,255,255,.035); border-radius:12px; padding:9px 11px; margin:0 0 14px;}
.scalerow .srplay{background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; display:inline-flex; align-items:center; padding:0 4px 0 0; flex-shrink:0;}
.scalerow .srplay:active{transform:scale(.9);}
.scalerow.locked .srplay{cursor:default;}
.snote{width:28px; height:28px; border-radius:50%; border:none; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; padding:0;}
.snote:active{transform:scale(.92);}
.scalerow.locked{opacity:.4; filter:saturate(.4);}
.scalerow.locked .snote{cursor:default;}
#ld-head{display:flex; align-items:center; gap:10px; margin:0 0 22px; background:var(--surface2); border-radius:12px; padding:11px 13px; border-left:4px solid var(--lc,var(--gold));}
.ldsec{background:var(--surface); border-radius:14px; padding:18px 16px; margin:30px 0 14px;}
#ld-difhead{font-size:28px; font-weight:800; letter-spacing:-.01em; color:var(--gold); margin:6px 0 18px; text-align:center;}
.wreq{font-size:14px; color:var(--muted); margin:4px 0 0;}
.wsub{font-size:13px; color:var(--muted); margin:5px 0 0;}
.wsub b{color:var(--text); font-weight:700;}
/* card livello = nota grande centrale + descrizione sotto */
.levelcard.lvlcard{text-align:center; display:flex; flex-direction:column; align-items:center; gap:5px; padding:22px 16px 18px;}
.lvlcard .bignote{width:84px; height:84px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; margin-bottom:6px;}
.lvlcard.locked .bignote, .bignote.locked{background:var(--surface2); color:var(--muted); box-shadow:none;}
.lvlname{font-size:19px; font-weight:800; color:var(--text);}
.lvlcard.locked .lvlname{color:var(--muted);}
.lvldesc{font-size:14px; color:var(--muted); margin:0;}
.lvldesc b{color:var(--text); font-weight:700;}
.lvlmeta{display:flex; gap:16px; align-items:center; justify-content:center; font-size:14px; font-weight:700; margin-top:6px;}
.lvlreq{font-size:13px; color:var(--muted); margin:2px 0 0; display:flex; align-items:center; gap:5px; justify-content:center;}
/* percorso lungo continuo */
.coursehdr{display:flex; align-items:center; justify-content:center; gap:10px; font-size:16px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--text); margin:30px 0 14px;}
.coursehdr.locked{color:var(--muted);}
.lvlblock{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px; margin:0 0 14px;}
.lvlblock.locked{opacity:.6;}
.lvlhdr{display:flex; align-items:center; gap:12px; margin:0 0 6px;}
.lvlhdr .bignote{width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:25px; flex:0 0 auto;}
.lvlhdr .bignote.locked{background:var(--surface2); color:var(--muted);}
.lvlhdr .lvlname{font-size:17px; font-weight:800;}
.lvlhdr .lvldesc{font-size:13px; color:var(--muted);}
.lvlhdr .lvldesc b{color:var(--text);}
.step{display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:var(--surface2); border:none; border-radius:10px; padding:11px 12px; margin:7px 0 0; color:var(--text); font:inherit; font-size:15px; font-weight:600; cursor:pointer;}
.step:active{transform:scale(0.99);}
.step .si{font-size:18px; color:var(--gold); flex:0 0 auto; width:20px; text-align:center;}
.step .slbl{flex:1; min-width:0;}
.step .sr{font-size:13px; color:var(--muted); flex:0 0 auto; letter-spacing:1px;}
.step.locked{opacity:.5; cursor:default;}
.step.locked .si{color:var(--muted);}
.step.done .sr{color:var(--gold);}
.step.next{outline:2px solid var(--gold); outline-offset:1px;}
.stepth{margin:7px 0 0; background:var(--surface2); border-radius:10px; overflow:hidden;}
.stepth summary{display:flex; align-items:center; gap:10px; padding:11px 12px; cursor:pointer; list-style:none; font-size:15px; font-weight:600;}
.stepth summary::-webkit-details-marker{display:none;}
.stepth summary .si{color:var(--gold); font-size:18px; width:20px; text-align:center;}
.stepth>div{padding:0 12px 12px;}
/* tabellone gioco-dell-oca: nodi cerchio collegati da linee tratteggiate */
.board{display:flex; flex-direction:column; align-items:center; position:relative; padding-top:20px;}
.boardsec{display:flex; flex-direction:column; align-items:center; width:100%; border-radius:22px; padding:8px 0 28px; margin:0 0 2px;} /* sfondo leggermente diverso per sezione */
#boardlines{position:absolute; left:0; top:0; pointer-events:none; z-index:0;}
#boardlines line{stroke:var(--line); stroke-width:3; stroke-dasharray:4 8; stroke-linecap:round;}
.boardhdr{font-size:24px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; color:var(--text); margin:56px 0 8px; text-align:center; position:relative; z-index:1; line-height:1.15;}
.board .boardhdr:first-of-type{margin-top:14px;}
.boardhdr.locked{color:var(--muted); font-size:18px;}
.boardgap{height:30px;}
.boardsub{font-size:16px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--gold); margin:42px 0 6px; text-align:center; position:relative; z-index:1;}
.notehdr{display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; color:var(--text); margin:32px auto 4px; padding:6px 10px; cursor:pointer; position:relative; z-index:1;}
.notehdr .nh-top{display:inline-flex; align-items:center; gap:9px;}
.notehdr .nh-name{font-size:28px; font-weight:800;} /* nome nota 2x piu' grande */
.notehdr .nh-top i:first-child{font-size:24px;}
.notehdr .nh-ch{font-size:16px; color:var(--muted);}
.notehdr.open .nh-ch, .notehdr.done .nh-ch{color:var(--gold);}
.notehdr .nh-iv{font-size:14px; color:var(--muted); font-weight:600;}
.nh-pie{width:24px; height:24px; border-radius:50%; display:inline-block; flex-shrink:0;}
.pnode.pie i.pic{color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.6);}
.throw{display:flex; flex-direction:column; gap:9px; margin-top:14px;}
.thgame{display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:var(--gold); color:#1b1206; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:800; cursor:pointer;}
.thgot{width:100%; background:transparent; color:var(--muted); border:1px solid var(--line); border-radius:12px; padding:11px; font-size:14px; font-weight:700; cursor:pointer;}
.thgame:active,.thgot:active{transform:scale(0.98);}
.notelbl{font-size:13px; font-weight:700; color:var(--muted); margin:16px 0 2px; text-align:center; position:relative; z-index:1;}
.notelbl b{color:var(--text);}
.pnwrap{display:flex; flex-direction:column; align-items:center; position:relative; z-index:1; margin-top:24px;}
.pnwrap.first{margin-top:0;}
.pninner{display:flex; flex-direction:column; align-items:center;}
.pnwrap.left .pninner,.pnwrap.right .pninner{transform:none;} /* niente zigzag: nodi in colonna dritta */
.pnode{width:70px; height:70px; border-radius:50%; border:none; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; color:#fff; padding:0; line-height:1;}
.pnode i.pic{font-size:30px;}
.pnode:active{transform:scale(0.95);}
.pnode.locked{background:var(--surface2)!important; color:var(--muted); cursor:default;}
.pnring{width:82px; height:82px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
.pnode.next, .pnring.next{box-shadow:0 0 0 3px var(--gold), 0 0 16px 2px rgba(234,179,8,.5);}
.pnlbl{font-size:13px; font-weight:700; color:var(--muted); margin-top:6px;}
.pndiff-in{font-size:17px; line-height:1; margin-top:3px; color:inherit; opacity:.92;} /* simbolo esercizio dentro al cerchio */
.pnsub{font-size:11px; color:var(--muted); margin-top:1px;}
.pnstars{font-size:12px; color:var(--gold); letter-spacing:1px; min-height:14px;}
.pnstars .e{color:var(--line);}
.theorypanel{width:100%; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px; margin:8px 0 0; position:relative; z-index:3;}
.mrow{display:block; background:var(--surface2); border:none; border-left:4px solid var(--lc,var(--gold)); border-radius:12px; padding:15px 16px; margin-bottom:11px; width:100%; color:var(--text); cursor:pointer; text-align:left;}
.mrow:disabled{cursor:default; border-left-color:var(--line); opacity:.55;}
.mrow .mtop{display:flex; align-items:center; justify-content:space-between; gap:8px;}
.mrow .mname{font-size:18px; font-weight:700; display:inline-flex; align-items:center; gap:9px;}
.mrow .mname i{font-size:16px; color:var(--lc,var(--gold));}
.mrow:disabled .mname i{color:var(--muted);}
.mrow .stars{font-size:15px; letter-spacing:2px; color:var(--gold); white-space:nowrap;}
.mrow .stars .e{color:#4a4e59;}
.mrow .mdesc{font-size:14px; line-height:1.4; color:var(--muted); margin-top:7px;}
.legbox{margin-top:18px;}
.legbox summary{font-size:14px; color:var(--muted); cursor:pointer; padding:10px 0; list-style-position:inside;}
#legend{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:6px;}
.leg{display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:10px; background:var(--surface);}
.leg .sw{width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff;}
.leg small{font-size:13px; line-height:1.3; color:var(--text);}
.leg small b{font-weight:600;}
#unlockrow{display:flex; align-items:center; justify-content:center; gap:8px; font-size:13px; color:var(--muted); margin:6px 0 0; cursor:pointer; padding:8px 12px; border-radius:10px; border:1px solid transparent;}
#unlockrow:has(#unlockall:checked){background:rgba(234,179,8,.14); border-color:var(--gold); color:var(--gold-ink); font-weight:700;}
#timbrebox{margin-top:26px;}
#timbrelbl{font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:0 0 10px;}
#timbres{display:flex; gap:8px;}
.tmb{flex:1; min-width:0; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 6px; font-size:13px; font-weight:600; color:var(--text); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px;}
.tmb i{font-size:20px; color:var(--muted);}
.tmb.on{border-color:var(--gold); color:var(--gold);}
.tmb.on i{color:var(--gold);}
#setbox{margin-top:26px;}
#setlbl{font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:0 0 12px;}
.setrowlbl{font-size:14px; font-weight:600; color:var(--text); margin:0 0 10px;}
#fontsizes{display:flex; gap:8px;}
</style>
</head>
<body>
<div id="ver" aria-hidden="true"></div>
<div class="wrap">
  <header id="hdr" hidden>
    <h1 id="brand">Modalità Corso</h1>
  </header>

  <div id="view-home">
    <div class="dashhead">
      <div id="emblem" aria-hidden="true" style="cursor:pointer"></div>
      <div class="dashname"><p id="hname" style="cursor:pointer">Huermony</p><i class="ti ti-pencil" id="hedit" style="color:var(--muted); font-size:15px; cursor:pointer;"></i></div>
    </div>
    <p id="htag" class="dashsec" style="margin-top:22px;"></p>
    <div style="text-align:center;"><div id="streak" hidden></div></div>
    <div class="metrics">
      <div class="metric"><div class="mv" id="m-stars">0</div><div class="ml" id="m-stars-l"></div></div>
      <div class="metric"><div class="mv" id="m-elite">0</div><div class="ml" id="m-elite-l"></div></div>
      <div class="metric"><div class="mv" id="m-levels">0</div><div class="ml" id="m-levels-l"></div></div>
    </div>
    <div id="dash-studied" hidden></div>
    <div id="tipbox" style="margin:26px 0 26px;"></div>
    <div id="allenabox" style="margin:0 0 8px;"></div>
    <div id="medalsbox" style="margin:0 0 24px;"></div>
  </div>

  <div id="view-settings" hidden>
    <div class="lang" id="hlang" style="justify-content:center; margin:0 0 18px;"><button data-l="it">IT</button><button data-l="en">EN</button></div>
    <div id="timbrebox">
      <p id="timbrelbl"></p>
      <div id="timbres"></div>
    </div>
    <div id="setbox">
      <p id="setlbl"></p>
      <p class="setrowlbl" id="fontlbl"></p>
      <div id="fontsizes"></div>
    </div>
    <label id="unlockrow" style="margin-top:18px;"><input type="checkbox" id="unlockall" style="width:14px; height:14px;"> <span id="unlocktxt"></span></label>
    <div id="dangerbox" style="margin-top:22px;">
      <button class="btn" id="resetdata" style="width:100%; justify-content:center; color:#e24b4a; border-color:rgba(226,75,74,.4);"><i class="ti ti-trash"></i><span id="resetlbl"></span></button>
    </div>
  </div>

  <nav class="tabs" id="tabs" hidden>
    <button class="tab" id="tab-home"><i class="ti ti-user"></i><span class="tablbl"></span></button>
    <button class="tab" id="tab-free"><i class="ti ti-music"></i><span class="tablbl"></span></button>
    <button class="tab" id="tab-corso"><i class="ti ti-stairs-up"></i><span class="tablbl"></span></button>
    <button class="tab" id="tab-guide"><i class="ti ti-book"></i><span class="tablbl"></span></button>
    <button class="tab" id="tab-settings"><i class="ti ti-settings"></i><span class="tablbl"></span></button>
  </nav>

  <div id="view-levels" hidden>
    <div id="path"></div>
  </div>

  <div id="view-leveldetail" hidden>
    <div id="ld-head">
      <button class="btn" id="ld-back" style="flex:0 0 auto; padding:8px 12px;"><i class="ti ti-arrow-left"></i></button>
      <div style="flex:1; min-width:0;">
        <div id="ld-title" style="font-size:16px; font-weight:700; line-height:1.2;"></div>
        <div id="ld-subtitle" style="font-size:13px; color:var(--muted);"></div>
      </div>
      <span id="ld-stars" style="color:var(--gold); font-size:14px; white-space:nowrap;"></span>
    </div>
    <p id="ld-difhead"></p>
    <div id="ld-modes"></div>
    <div class="ldsec">
      <p id="ld-learnhead" style="font-size:24px; font-weight:800; color:var(--text); margin:0 0 16px; text-align:center;"></p>
      <div id="ld-wheel" class="mwbox"></div>
      <div id="ld-listen" class="mwctrl"></div>
      <div id="ld-theory"></div>
    </div>
  </div>

  <div id="view-guide" hidden>
    <div id="guide-intro"></div>
    <button class="btn" id="tutbtn"><i class="ti ti-school"></i><span id="tutbtntxt"></span></button>
    <div id="guide"></div>
    <details id="methodbox" class="secacc" style="margin:18px 0 16px;"><summary><span id="methodsum"></span><i class="ti ti-chevron-down"></i></summary><div id="methodbody" style="padding:0 16px 16px;"></div></details>
    <p id="thintro" style="font-size:15px; line-height:1.6; color:var(--text); margin:0 0 14px;"></p>
    <div id="theory"></div>
  </div>

  <div id="view-game" hidden>
    <div id="giocapath"></div>
    <div id="gamepanel">
    <div id="gametop" hidden style="display:flex; align-items:center; gap:10px; margin:0 0 12px; background:var(--surface2); border-radius:12px; padding:9px 12px; border-left:3px solid var(--gold);">
      <button class="btn" id="backbtn" style="flex:0 0 auto; padding:8px 12px;"><i class="ti ti-arrow-left"></i></button>
      <span id="gametitle" style="font-size:14px; color:var(--text); font-weight:700;"></span>
    </div>
    <div id="goalbar" hidden style="font-size:13px; text-align:center; margin:0 0 12px; background:var(--surface); border-radius:10px; padding:10px 10px;"></div>
    <div class="controls" id="controls">
      <div class="crow" id="rowsetup">
        <select id="scsel" aria-label="Scale"></select>
        <span id="modechip" hidden style="flex:0 0 auto;"></span>
        <select id="rootsel" aria-label="Tonic"></select>
        <button class="btn" id="fs-reopen"><i class="ti ti-adjustments-horizontal"></i><span id="fs-reopentxt"></span></button>
        <button class="btn" id="tastebtn"><i class="ti ti-music"></i><span id="tastetxt"></span></button>
        <button class="btn" id="freeinfo" style="flex:0 0 auto; padding:8px 11px;" aria-label="info"><i class="ti ti-help"></i></button>
      </div>
      <div class="crow options" id="optsrow">
        <button class="btn" id="rehear" aria-label="replay"><i class="ti ti-refresh"></i><span id="rehtxt"></span></button>
        <button class="btn" id="bscale" hidden aria-label="scale"><i class="ti ti-stairs-up"></i><span id="bscaletxt"></span></button>
        <span class="spdbox"><i class="ti ti-gauge"></i><select id="spdsel" aria-label="Speed"></select></span>
        <button class="tgl" id="miccb" aria-pressed="false"><i class="ti ti-microphone"></i><span id="mictxt"></span><span class="track"><span class="knob"></span></span></button>
        <button class="tgl" id="dronecb" hidden aria-pressed="false" aria-label="drone tonica"><i class="ti ti-home"></i><span class="track"><span class="knob"></span></span></button>
        <span class="spdbox" id="tonbox"><i class="ti ti-music"></i><select id="freetonic" aria-label="Tonic"></select></span>
      </div>
    </div>
    <div id="bossbar" hidden style="display:flex; justify-content:center; align-items:center; gap:18px; font-size:16px; margin:0 0 12px;"></div>

    <div id="tutbox" hidden></div>
    <div id="wheelbox"><div id="wheel"></div></div>
    <p id="status" style="min-height:24px;"></p>
    <p id="micline" hidden style="font-size:14px; color:var(--muted); margin:-4px 0 8px; min-height:18px;"></p>
    <div class="stats" id="stats">
      <div class="stat"><p class="lbl" id="roundlbl"></p><p class="val" id="round">–</p></div>
      <div class="stat"><p class="lbl" id="bestlbl"></p><p class="val" id="best">0</p></div>
    </div>
    <div id="freetry" hidden style="margin:12px 0 0; text-align:center;">
      <div id="ftbtns" class="crow" style="justify-content:center; flex-wrap:wrap; margin:0 0 8px;">
        <button class="btn" id="ftbtn"><i class="ti ti-flask"></i><span id="fttxt"></span></button>
      </div>
      <div id="ftrow" style="display:flex; justify-content:center; gap:7px; flex-wrap:wrap;"></div>
    </div>
    <div id="reveal"></div>
    <div id="chordbar" hidden style="margin:24px 0 4px;"></div>
    <div id="chordseqrow" hidden style="display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin:0 0 6px;"></div>
    </div>
  </div>

</div>
<div id="welcome" hidden style="position:fixed; inset:0; background:var(--bg); display:flex; overflow-y:auto; z-index:60; max-width:480px; margin:0 auto;">
  <div id="wel-inner" style="margin:auto; display:flex; flex-direction:column; align-items:center; text-align:center; padding:40px 28px; width:100%;">
    <div id="wel-pairs" hidden style="width:100%; margin:0 0 22px;"></div>
    <div id="wel-ill" hidden></div>

 methodTitle:"Come funziona Huermony", methodBody:"<h4>Pensare in relazioni</h4><p>Chi <b>pensa in musica</b> non pensa alle note una per una. Pensa a <b>come stanno tra loro</b>. Huermony ti fa prendere confidenza con questo.</p><h4>Le distanze</h4><p>Ogni due note hanno una <b>distanza</b>. Alcune distanze suonano bene insieme, altre fanno tensione. È così per tutti: il nostro orecchio funziona così.</p><h4>Non solo numeri: emozioni</h4><p>La musica non è solo conti. È l'<b>emozione</b> che due note fanno nascere. E l'emozione non si impara a memoria: la devi <b>sentire</b>. Per ricordarla servono dei trucchi.</p><h4>Il trucco: i colori</h4><p>Huermony dà a ogni suono un <b>colore</b> e un <b>disegno</b>. Così, piano piano, riconoscere le note diventa facile. Come imparare una nuova lingua.</p>",
 legsum:"Legenda colori", thintro:"Qui trovi <b>cosa fa ogni nota</b> dentro la musica: dove tira, che carattere ha. La sensazione vale sempre. Il ruolo qui descritto è quello nel maggiore e nel minore: in altri modi la stessa nota può <b>cambiare lavoro</b>.",

 courses:{
  pent:{title:"Pentatonica maggiore", desc:"Cinque note che insieme <b>suonano sempre bene</b>. Niente gradini piccoli, niente tensione. Tutto <b>galleggia</b>. È la scala <b>più usata al mondo</b>, dal blues alle canzoni popolari. Qui costruisci le <b>basi del tuo orecchio</b>: casa, apertura, movimento.",
   levels:[
   {name:"Il pilastro", th:"Conosci già <b>casa</b>. Ora arriva il suo <b>pilastro</b>: il suono più solido dopo casa. È la spinta che ti <b>riporta a casa</b>. Insieme sono i due punti su cui si regge tutta la musica. Ancora nessun colore: senti solo che è <b>stabile</b>, come il pavimento sotto i piedi."},
   {name:"L'arpeggio", th:"Arriva il <b>sole</b>: con casa e pilastro fa il sorriso del maggiore. È la nota che <b>accende la luce</b>. Senti come da due suoni nudi nasce un colore pieno e aperto: la sensazione del <b>sole che sorge</b>."},
   {name:"Il passo", th:"Finora le note saltavano da un punto all'altro. Ora arriva il <b>gradino</b> che le fa camminare. Questa nota non riposa e non spinge: è <b>solo movimento</b>. Con lei la melodia inizia a passeggiare, un passo dopo l'altro."},
   {name:"La pentatonica", th:"L'ultima nota <b>completa la pentatonica</b>: cinque suoni, nessuna tensione. È la scala dove <b>tutto suona bene</b>, qualunque cosa fai. Senti l'<b>apertura totale</b>, calda e leggera. Tieni a mente questa sensazione: nel prossimo corso la cambieremo."}]},
  maj:{title:"Scala maggiore (ionico)", desc:"Prendi la pentatonica e aggiungi le <b>due note che mancano</b>. Sono le uniche che creano un <b>gradino piccolo</b>, e cambiano tutto: dove prima tutto galleggiava, ora c'è <b>tensione</b>. Una nota che chiede di tornare a casa. Così nasce il <b>suono pieno e felice</b> della scala maggiore, dentro quasi ogni canzone che conosci.",
   levels:[
   {name:"La sensibile", th:"Ecco la <b>prima vera tensione</b>. Questa nota sta a un <b>solo gradino da casa</b>. Non sta ferma, spinge in su, vuole tornare a casa. Per la prima volta senti una nota che <b>NON vuole restare dov'è</b>. È lei che rende il ritorno a casa quasi obbligato. Ora c'è un <b>richiamo</b>."},
   {name:"La scala completa", th:"L'ultima nota <b>chiude il cerchio</b>: ci sono tutte e sette le note. Insieme alla sensibile crea il <b>motore segreto</b> che porta a casa. Ora la scala è <b>completa</b>: ogni tensione sa dove andare. Questa è la sensazione del maggiore: sicurezza, arrivo, casa."}]},
  pmin:{title:"Pentatonica minore", desc:"La versione <b>triste</b> della pentatonica: sempre cinque note, sempre <b>nessun gradino piccolo</b>, ma con la <b>luna</b> (la terza minore) che porta <b>malinconia</b> e profondità. È la scala dei <b>riff e degli assoli</b>: blues, rock, folk. Facile da cantare, e come la maggiore <b>suona sempre bene</b>. Qui impari il <b>colore triste</b>.",
   levels:[
   {name:"Il pilastro", th:"Si riparte dai due punti fissi: dopo casa, il suo <b>pilastro</b>. Lo scheletro è uguale a quello della pentatonica maggiore: il punto stabile che spinge e <b>riporta a casa</b>, ancora senza colore. Senti di nuovo il pavimento su cui poseremo il colore triste."},
   {name:"Il colore minore", th:"Arriva la <b>luna</b> (la terza minore): a soli 3 gradini da casa, <b>scurisce</b> tutto. Dove il maggiore sorrideva, qui c'è <b>malinconia</b> e profondità. È la nota che rende <b>triste</b> il suono. Tieni a mente questa sensazione: è il cuore di metà della musica che ascolti."},
   {name:"Il passo", th:"Entra il <b>ponte</b> (la quarta), il <b>gradino</b> che fa camminare la melodia. <b>Sospende</b> piano, senza dramma, e collega casa e pilastro. Con lui la scala triste inizia a <b>respirare e muoversi</b>."},
   {name:"La pentatonica minore", th:"L'ultima nota <b>completa la pentatonica minore</b>: l'<b>onda</b> (la settima minore), calda e bluesy, che scende morbida verso il pilastro. Cinque suoni, nessuna tensione, pieno <b>colore triste</b>. È la scala dei <b>riff e degli assoli</b>: ora ce l'hai tutta nell'orecchio."}]}},
 TH:[
  "La <b>casa</b>. È il punto di riposo. Tutto parte da qui e tutto, prima o poi, ci torna. Quando la melodia finisce sulla casa, la frase si <b>chiude</b>.",
  "Sta <b>un gradino sopra casa</b>. Preme, non sta ferma, vuole muoversi. È un suono <b>teso e scuro</b>.",
  "Il <b>passo</b> della melodia. Non riposa e non spinge: è <b>movimento</b>, il gradino con cui le frasi camminano.",
  "La nota che <b>scurisce</b> tutto: con lei il suono diventa <b>triste</b>. Malinconia e profondità. È il cuore del suono minore.",
  "La nota che <b>illumina</b> tutto: con lei il suono diventa <b>felice</b>. Apertura e luce. È il cuore del suono maggiore.",
  "Il <b>primo passo</b> del viaggio. <b>Sospende</b> senza fare dramma: tira piano verso il sole, vuole posarsi lì vicino.",
  "Taglia il suono giusto <b>a metà</b>: è il più <b>instabile</b> di tutti. Spinge fortissimo e vuole subito muoversi, in su o in giù.",
  "Il <b>pilastro</b>. Il suono più <b>solido</b> dopo casa. Ma è anche una spinta: esiste per tirare verso casa.",
  "La <b>malinconia dolce</b> del suono triste. Pesa verso il basso: tende a <b>scendere di un gradino</b> sul pilastro.",
  "<b>Calda e aperta</b>, è il colore del maggiore che sorride. Da qui il lato triste è a un passo.",
  "Il colore del <b>blues</b>, la nota calda che scende morbida. <b>Tensione dolce</b> che tira verso il sole.",
  "Il <b>fulmine</b>: a un gradino da casa, <b>spinge fortissimo in su</b>. È la nota che rende quasi obbligato il ritorno a casa."],
 GUIDE:[
  {h:"Cosa impari qui", p:"Huermony allena l'orecchio a riconoscere le note <b>dalla distanza che hanno da casa</b> (la nota di partenza). I colori aiutano: ogni suono ha sempre lo <b>stesso colore</b>, lo stesso disegno e lo stesso posto sulla ruota. Se cambi la nota di partenza, i colori restano uguali. <b>Non impari le note a memoria: impari le distanze.</b>"},
  {h:"Il percorso", p:"Nella <b>Home</b> i corsi sono uno sotto l'altro, come un sentiero. Si parte dalla <b>pentatonica</b>: 5 note, nessuna tensione, facili da cantare. La costruisci un suono alla volta (Casa e Pilastro, poi Sole, Passo, Nuvola). Quando la finisci, si apre la <b>scala maggiore</b>: prendi la pentatonica e aggiungi le 2 note che fanno la tensione. Sotto a ogni scala c'è una riga di cerchi colorati: toccali per sentire le note, tocca l'altoparlante per sentire tutta la scala."},
  {h:"Come si gioca", t:"do", p:"È come il gioco Simon: ascolta e ripeti.<br>1. Premi <b>Gioca</b> (o il grande tasto al centro della ruota): parte una piccola melodia.<br>2. Ripetila toccando i cerchi nello stesso ordine.<br>3. Giusta? Riparte con una nota in più.<br><br>Si sale fino al <b>round 7</b>. Se sbagli vedi la fila giusta, ed è lì che si impara. A te basta ricordare l'ordine. La <b>velocità</b> la regoli come in un video: da lenta a veloce."},
  {h:"Difficoltà e stelle", p:"Apri un livello e in cima trovi <b>Inizia a giocare</b> con tre modi. Puoi farli in ordine, ma sono <b>tutti aperti</b>: se sei bravo salti avanti.<br><br><b>Facile</b> · costruisci la melodia un pezzo alla volta. Vedi colori e disegni, che spariscono piano piano.<br><b>Normale</b> · ti dà una melodia da 7 e la rifai tu. La <b>vedi</b> mentre suona.<br><b>Difficile</b> · costruisci una nota alla volta, ma <b>solo a orecchio</b>: la senti e basta.<br><br>Ogni modo dà fino a <span style='color:var(--gold)'>★★★</span> (★ round 5 · ★★ round 7 · ★★★ round 7 senza Riascolta). Fino a <b>9 stelle</b> per livello. E sei generoso con te stesso: se vinci un modo più duro, quelli più facili prendono le 3 stelle da soli."},
  {h:"Boss: come si va avanti", p:"Ogni livello finisce con il <b>Boss</b>: rifai una melodia di 7 note <b>solo a orecchio</b>, senza vederla, con 3 vite e 3 riascolti.<br><br>Vincere il Boss è ciò che ti fa <b>andare avanti</b>: sblocca la <b>nota nuova</b> (poi la usi nel Libero) e apre il <b>livello dopo</b>. Lo puoi provare quando vuoi: se lo batti a freddo, il livello è tutto fatto (9 stelle).<br><br>Sotto, in <b>Cosa imparerai</b>, trovi sempre cosa fa ogni suono."},
  {h:"Rispondi con la voce o lo strumento", p:"Accendi il <b>microfono</b> e invece di toccare lo schermo puoi rispondere cantando, fischiando o suonando uno strumento, una nota per volta. Va bene a qualsiasi altezza: conta la nota, non se è acuta o grave. Mentre fai il suono, la ruota si illumina sulla nota che stai facendo, così vedi se sei giusto."},
  {h:"Libero", p:"In <b>Libero</b> giochi senza punti. Prima scegli scala e nota di casa, poi senti le note. Usa <b>Assaggia</b> per sentire il sapore della scala, tocca gli accordi per costruire un giro, e premi <b>Cambia</b> quando vuoi ripartire da un'altra scala. Se avvii il gioco a melodie, la <b>velocità sale da sola</b> ogni 5 round, così non diventa mai troppo facile. È lo spazio per giocare, non per i record."},
  {h:"Teoria", p:"In <b>Teoria</b> trovi cosa fa ogni suono: dove tira, che sapore ha, quanto è lontano da casa. Ci sono anche i <b>modi</b>, cioè le diverse atmosfere che nascono spostando il centro della scala. Tutto si può ascoltare, non solo leggere."},
  {h:"Mettila sul telefono", p:"Huermony si installa senza nessuno store. Aprila nel browser, poi su iPhone fai <b>Condividi → \"Aggiungi a Home\"</b>, su Android <b>menu → \"Installa app\"</b>. Da lì si apre grande con la sua icona e funziona anche <b>senza internet</b>."},
  {h:"Da computer", t:"key", p:"Puoi giocare con la tastiera. <b>A</b> = casa, poi <b>W S E D F T G Y H U J</b> salendo per gradini, come i tasti del pianoforte. <b>R</b> = riascolta, <b>Invio</b> = gioca. Fuori dalla partita i tasti suonano liberi: usali per provare i colori."},
  {h:"Un consiglio", t:"tip", p:"Meglio <b>5 minuti al giorno</b> che un'ora alla domenica. L'orecchio cresce poco per volta, non con un solo grande sforzo. Tieni d'occhio la <b>striscia di giorni</b> nel Profilo: ti aiuta a non saltare. Quando ti accorgi di \"vedere\" il colore di un suono prima ancora di pensarci, sta funzionando."}]
},

 tips:[
  {s:0,ic:'bulb',t:"The sun (the major third) is 4 steps from home. It's what makes a sound smile."},
  {s:0,ic:'bulb',t:"The pillar (the fifth) is 7 steps from home. It's the most solid sound after home."},
  {s:0,ic:'bulb',t:"The bolt sits just one small step below home. That's why it pulls home so strongly."},
  {s:0,ic:'bulb',t:"The vortex cuts the sound right in half, 6 steps. It's the most shaky sound: it pushes a lot."},
  {s:0,ic:'bulb',t:"The pentatonic has 5 notes and no small steps. That's why no note ever sounds wrong."},
  {s:0,ic:'bulb',t:"A big step is 2 small steps. The major scale is a fixed line of big and small steps."},
  {s:0,ic:'bulb',t:"If you change home, the distances stay the same. Your ear hears the distances, not single notes."},
  {s:1,ic:'brain',t:"Repeating the melody from memory helps much more than just listening to it."},
  {s:1,ic:'brain',t:"Giving each sound a color and a shape helps your brain remember faster."},
  {s:1,ic:'brain',t:"Five minutes a day beats an hour a week. Your ear grows little by little."},
  {s:1,ic:'brain',t:"Hearing the distances between notes is not a gift. You learn it with practice, at any age."},
  {s:1,ic:'brain',t:"Singing the notes, not just hearing them, helps you get them right. The voice teaches the ear."},
  {s:1,ic:'brain',t:"Ear training uses hearing, memory and movement together. That's why it keeps the mind awake."},
  {s:1,ic:'brain',t:"When you see a sound's color before thinking, it's working: the color comes before the name."},
  {s:1,ic:'brain',t:"Making a mistake and then seeing the right answer is one of the best ways to learn."}

 methodTitle:"How Huermony works", methodBody:"<h4>Thinking in relationships</h4><p>People who <b>think in music</b> don't think about notes one by one. They think about <b>how they sit together</b>. Huermony helps you get used to this.</p><h4>Distances</h4><p>Every two notes have a <b>distance</b>. Some distances sound good together, others make tension. It's the same for everyone: that's how our ears work.</p><h4>Not just numbers: feelings</h4><p>Music isn't just math. It's the <b>feeling</b> two notes create. And feelings can't be memorized: you have to <b>hear</b> them. To remember them you need little tricks.</p><h4>The trick: colors</h4><p>Huermony gives every sound a <b>color</b> and a <b>shape</b>. So, little by little, knowing the notes gets easy. Like learning a new language.</p>",

 courses:{
  pent:{title:"Major pentatonic", desc:"Five notes that <b>always sound good</b> together. No small steps, no tension. Everything <b>floats</b>. It's the <b>most used scale in the world</b>, from blues to folk songs. Here you build the <b>base of your ear</b>: home, openness, movement.",
   levels:[
   {name:"The pillar", th:"You already know <b>home</b>. Now its <b>pillar</b> arrives: the most solid sound after home. It's the push that <b>brings you back home</b>. Together they're the two points that all music rests on. No color yet: you just feel that it's <b>solid</b>, like the floor under your feet."},
   {name:"The arpeggio", th:"The <b>sun</b> arrives: with home and pillar it makes the major smile. It's the note that <b>turns the light on</b>. Feel how two bare sounds become a full, open color: the feeling of the <b>rising sun</b>."},
   {name:"The step", th:"Until now the notes jumped from point to point. Now comes the <b>step</b> that makes them walk. This note doesn't rest and doesn't push: it's <b>just movement</b>. With it the melody starts to stroll, one step after another."},
   {name:"The pentatonic", th:"The last note <b>completes the pentatonic</b>: five sounds, no tension. It's the scale where <b>everything sounds good</b>, whatever you play. Feel the <b>full openness</b>, warm and light. Hold on to this feeling, because in the next course we'll change it."}]},
  maj:{title:"Major scale (Ionian)", desc:"Take the pentatonic and add the <b>two notes that are missing</b>. They're the only ones that make a <b>small step</b>, and they change everything: where before everything floated, now there's <b>tension</b>. A note that wants to go back home. That's how the <b>full, happy sound</b> of the major scale is born, inside almost every song you know.",
   levels:[
   {name:"The leading tone", th:"Here's the <b>first real tension</b>. This note sits <b>just one step from home</b>. It won't sit still, it pushes up, it wants to go home. For the first time you feel a note that <b>does NOT want to stay put</b>. It's what makes the return home feel needed. Now there's a <b>pull</b>."},
   {name:"The full scale", th:"The last note <b>closes the circle</b>: all seven notes are here. With the leading tone it makes the <b>secret engine</b> that pulls home. Now the scale is <b>complete</b>: every tension knows where to go. This is the feeling of major: sureness, arrival, home."}]},
  pmin:{title:"Minor pentatonic", desc:"The <b>sad</b> version of the pentatonic: still five notes, still <b>no small steps</b>, but with the <b>moon</b> (the minor third) that brings <b>sadness</b> and depth. It's the scale of <b>riffs and solos</b>: blues, rock, folk. Easy to sing, and like the major one it <b>always sounds good</b>. Here you learn the <b>sad color</b>.",
   levels:[
   {name:"The pillar", th:"You start again from the two fixed points: after home, its <b>pillar</b>. The skeleton is the same as the major pentatonic: the solid point that pushes and <b>brings you back home</b>, no color yet. Feel again the floor we'll lay the sad color on."},
   {name:"The minor color", th:"The <b>moon</b> (the minor third) arrives: just 3 steps from home, it <b>darkens</b> everything. Where the major smiled, here there's <b>sadness</b> and depth. It's the note that makes a sound <b>sad</b>. Hold on to this feeling: it's the heart of half the music you hear."},
   {name:"The step", th:"The <b>bridge</b> (the fourth) enters, the <b>step</b> that makes the melody walk. It <b>hangs</b> gently, with no drama, and links home and pillar. With it the sad scale starts to <b>breathe and move</b>."},
   {name:"The minor pentatonic", th:"The last note <b>completes the minor pentatonic</b>: the <b>wave</b> (the minor seventh), warm and bluesy, falling softly toward the pillar. Five sounds, no tension, full <b>sad color</b>. It's the scale of <b>riffs and solos</b>: now you've got all of it in your ear."}]}},
 TH:[
  "<b>Home</b>. It's the resting point. Everything starts here and everything, sooner or later, comes back here. When the melody lands on home, the phrase <b>closes</b>.",
  "It sits <b>one step above home</b>. It presses, it won't sit still, it wants to move. A <b>tense, dark</b> sound.",
  "The <b>step</b> of the melody. It doesn't rest and doesn't push: it's <b>movement</b>, the step the phrases walk on.",
  "The note that <b>darkens</b> everything: with it the sound turns <b>sad</b>. Sadness and depth. The heart of the minor sound.",
  "The note that <b>brightens</b> everything: with it the sound turns <b>happy</b>. Openness and light. The heart of the major sound.",
  "The <b>first step</b> of the journey. It <b>hangs</b> with no drama: it pulls gently toward the sun, wanting to settle next to it.",
  "It cuts the sound exactly <b>in half</b>: it's the most <b>shaky</b> of all. It pushes hard and wants to move right away, up or down.",
  "The <b>pillar</b>. The most <b>solid</b> sound after home. But it's also a push: it exists to pull toward home.",
  "The <b>sweet sadness</b> of the minor sound. It leans down: it tends to <b>fall one step</b> onto the pillar.",
  "<b>Warm and open</b>, the color of the major smiling. From here, the sad side is one step away.",
  "The color of <b>blues</b>, the warm note that falls softly. <b>Soft tension</b> that pulls toward the sun.",
  "The <b>bolt</b>: one step from home, it <b>pushes hard upward</b>. It's the note that makes the return home feel needed."],
 GUIDE:[
  {h:"What you learn here", p:"Huermony trains your ear to know notes <b>by how far they are from home</b> (the starting note). Colors help: every sound always has the <b>same color</b>, the same shape and the same spot on the wheel. If you change the starting note, the colors stay the same. <b>You don't memorize notes: you learn distances.</b>"},
  {h:"The path", p:"On the <b>Home</b> screen the courses sit one below the other, like a trail. You start with the <b>pentatonic</b>: 5 notes, no tension, easy to sing. You build it one sound at a time (Home and Pillar, then Sun, Step, Cloud). Finish it and the <b>major scale</b> opens: you take the pentatonic and add the 2 notes that make the tension. Under each scale there's a row of colored circles: tap them to hear the notes, tap the speaker to hear the whole scale."},
  {h:"How to play", t:"do", p:"It's like the game Simon: listen and repeat.<br>1. Press <b>Play</b> (or the big button in the center of the wheel): a little melody starts.<br>2. Repeat it by tapping the circles in the same order.<br>3. Right? It restarts with one more note.<br><br>You climb up to <b>round 7</b>. If you make a mistake you see the right line, and that's where you learn. You just need to remember the order. <b>Speed</b> works like a video: from slow to fast."},
  {h:"Difficulty and stars", p:"Open a level and at the top you'll find <b>Start playing</b> with three modes. You can do them in order, but they're <b>all open</b>: if you're good, you skip ahead.<br><br><b>Easy</b> · build the melody one piece at a time. You see colors and shapes, which fade away little by little.<br><b>Normal</b> · it gives you a 7-note melody and you make it again. You <b>see</b> it while it plays.<br><b>Hard</b> · build it one note at a time, but <b>by ear only</b>: you just hear it.<br><br>Each mode gives up to <span style='color:var(--gold)'>★★★</span> (★ round 5 · ★★ round 7 · ★★★ round 7 without Replay). Up to <b>9 stars</b> per level. And you're generous with yourself: if you win a harder mode, the easier ones get their 3 stars by themselves."},
  {h:"Boss: how you move on", p:"Every level ends with the <b>Boss</b>: redo a 7-note melody <b>by ear only</b>, without seeing it, with 3 lives and 3 replays.<br><br>Winning the Boss is what moves you <b>forward</b>: it unlocks the <b>new note</b> (you then use it in Free play) and opens the <b>next level</b>. You can try it whenever you want: if you beat it cold, the whole level is done (9 stars).<br><br>Below, in <b>What you'll learn</b>, you'll always find what each sound does."},
  {h:"Answer with your voice or instrument", p:"Turn on the <b>microphone</b> and instead of tapping the screen you can answer by singing, whistling or playing one note at a time. Any height works: the note is what counts, not whether it's high or low. While you make the sound, the wheel lights up on the note you're making, so you can see if you're right."},
  {h:"Free play", p:"In <b>Free play</b> you play with no score. First pick a scale and a home note, then hear the notes. Use <b>Taste it</b> to feel the flavor of the scale, tap the chords to build a little progression, and press <b>Change</b> whenever you want to start over with another scale. If you start the melody game, the <b>speed rises on its own</b> every 5 rounds, so it never gets too easy. This is the space to play, not for records."},
  {h:"Theory", p:"In <b>Theory</b> you'll find what each sound does: where it pulls, what it tastes like, how far it is from home. There are also the <b>modes</b>, the different moods you get by moving the center of the scale. Everything can be listened to, not just read."},
  {h:"Put it on your phone", p:"Huermony installs without any store. Open it in your browser, then on iPhone tap <b>Share → \"Add to Home Screen\"</b>, on Android <b>menu → \"Install app\"</b>. From there it opens big with its own icon and works <b>without internet</b> too."},
  {h:"On a computer", t:"key", p:"You can play with the keyboard. <b>A</b> = home, then <b>W S E D F T G Y H U J</b> going up by steps, like piano keys. <b>R</b> = replay, <b>Enter</b> = play. Outside a game the keys play freely: use them to try the colors."},
  {h:"One piece of advice", t:"tip", p:"<b>Five minutes a day</b> beats an hour on Sunday. Your ear grows little by little, not with one big effort. Keep an eye on your <b>day streak</b> in the Profile: it helps you not skip days. When you catch yourself \"seeing\" the color of a sound before you even think about it, it's working."}]
}};

function prog(c){try{return JSON.parse(localStorage.getItem('it_prog_'+c)||'{}')}catch(e){return{}}}
function saveProg(c,key,entry){const p=prog(c); const old=p[key]||{stars:0,bestRound:0};
 p[key]={stars:Math.max(old.stars,entry.stars), bestRound:Math.max(old.bestRound,entry.bestRound)};
 localStorage.setItem('it_prog_'+c,JSON.stringify(p));}
function starsOf(c,w,m){const e=prog(c)['w'+w+'m'+m]; const s=e?e.stars:0; return Math.min(s,3);} // ogni modo max 3
function bestOf(c,w,m){const e=prog(c)['w'+w+'m'+m]; return e?e.bestRound:0;}
function unlockAll(){return localStorage.getItem('it_unlockall')==='1';}
function updateUnlockLabel(){const t=$('unlocktxt'); if(t)t.textContent=unlockAll()?S9.unlockOn:S9.unlock;}
// livello successivo: si sblocca battendo l'Elite del livello precedente (che introduce la nota)
function worldUnlocked(c,i){ if(unlockAll()) return true; if(i===0) return c!==COURSE_IDS[0] || !!localStorage.getItem('hm_casa_done'); return !!localStorage.getItem('hm_elite_'+c+'_'+(i-1)); } // il primo livello si sblocca solo dopo la casa (Livello 0)
// modi in ordine (Facile->Normale->Difficile); il Boss invece e' sempre tentabile (test-out) -> gestito a parte
function modeUnlocked(c,w,m){ if(!(unlockAll()||worldUnlocked(c,w))) return false; if(m===0) return true; return starsOf(c,w,m-1)>=1; }
function bossUnlocked(c,w){ return unlockAll() || starsOf(c,w,2)>=1; } // niente skip: il Boss si sblocca solo dopo aver fatto i 3 modi
function cumSet(c,wi){let s=(CBASE[c]||[]).slice(); for(let i=0;i<=wi;i++)s=s.concat(CWADD[c][i]); return [...new Set(s)].sort((a,b)=>a-b);}
// livelli = note (CWADD) + accordi (CHORDS) in coda. w continuo: i primi sono note, poi accordi
function noteLevels(c){return S9.courses[c].levels.length;}
function chordList(c){return CHORDS[c]||[];}
function totLevels(c){return noteLevels(c)+chordList(c).length;}
function isChord(c,w){return w>=noteLevels(c);}
function chordAt(c,w){return chordList(c)[w-noteLevels(c)];}
function chordNotes(c,w){return [...new Set(chordAt(c,w).notes)].sort((a,b)=>a-b);}
function levelPool(c,w){return isChord(c,w)?chordNotes(c,w):cumSet(c,w);} // note giocabili del livello (accordo = note dell'accordo)
function levelName(c,w){return isChord(c,w)?(S9.chordWord+' '+chordAt(c,w).n):plainNames(c,w);}
function startNote(pool){return pool.includes(0)?0:pool[0];} // melodia parte dalla casa se c'e', altrimenti dalla prima nota dell'accordo
function pieBg(cols){const n=cols.length; let s='conic-gradient('; for(let i=0;i<n;i++){const a=Math.round(i*360/n), b=Math.round((i+1)*360/n); s+=cols[i]+' '+a+'deg '+b+'deg'+(i<n-1?', ':'');} return s+')';} // torta a fette uguali coi colori delle note dell'accordo
function courseUnlocked(c){
 if(unlockAll()) return true;
 const idx=COURSE_IDS.indexOf(c);
 if(idx<=0) return true;
 const prev=COURSE_IDS[idx-1];
 const last=S9.courses[prev].levels.length-1;
 return !!localStorage.getItem('hm_elite_'+prev+'_'+last); // scala successiva: solo finendo la precedente (battuto il Boss dell'ultimo livello)
}
function maxUnlockedWorld(c){let m=0; for(let i=0;i<CWADD[c].length;i++){if(worldUnlocked(c,i))m=i;} return m;}
function activeSet(){if(game.kind==='tut')return[0,7]; if(game.kind==='casa')return[0,2,4,7,9]; if(game.kind==='boss'||game.kind==='bossgrow')return game.notes; return game.kind==='free'?(game.notes||SCALES[scale]):levelPool(game.c,game.w);}
function courseScale(c){return c==='pent'?'pmaj':(c==='maj'?'maj':c);}
// le note NUOVE di un livello si sbloccano nel free play solo battendo l'ELITE di quel livello
function unlockedNotes(c){ if(!unlockAll()&&!courseUnlocked(c)) return []; const s=new Set(CBASE[c]||[]); S9.courses[c].levels.forEach((_,w)=>{ if(unlockAll()||localStorage.getItem('hm_elite_'+c+'_'+w)) CWADD[c][w].forEach(k=>s.add(k)); }); return [...s].sort((a,b)=>a-b);}
function starsStr(n){let s=''; for(let i=1;i<=3;i++)s+=i<=n?'★':'<span class="e">★</span>'; return s;}
function casaStar(c){return (c===COURSE_IDS[0]&&localStorage.getItem('hm_casa_done'))?1:0;} // Livello 0 "La casa" vale 1 stella nel corso iniziale
function courseStars(c){let t=casaStar(c); for(let w=0;w<totLevels(c);w++)t+=levelStars(c,w); return t;} // somma capata (A orecchio max 1)
function totalStars(){let t=0; COURSE_IDS.forEach(c=>t+=courseStars(c)); return t;}
function courseMaxStars(c){return totLevels(c)*9+(c===COURSE_IDS[0]?1:0);}
function courseEliteDone(c){let n=0; S9.courses[c].levels.forEach((_,w)=>{if(localStorage.getItem('hm_elite_'+c+'_'+w))n++;}); return n;}
function bossDone(c){return !!localStorage.getItem('hm_boss_'+c);}
function totalElite(){let n=0; COURSE_IDS.forEach(c=>n+=courseEliteDone(c)); return n;}
function totalEliteMax(){let n=0; COURSE_IDS.forEach(c=>n+=totLevels(c)); return n;}
function totalBoss(){let n=0; COURSE_IDS.forEach(c=>{if(bossDone(c))n++;}); return n;}

function getStreak(){

 const y=new Date(); y.setDate(y.getDate()-1);
 return (last===dayStr(new Date())||last===dayStr(y))?s:0;
}

}

 svg.setAttribute('width',W); svg.setAttribute('height',H); svg.setAttribute('viewBox','0 0 '+W+' '+H);

}

function tone(midi,durS){
 const f=440*Math.pow(2,(midi-69)/12), t0=ctx.currentTime+0.02;
 const g=ctx.createGain(); g.connect(ctx.destination);
 if(timbre==='corda'){
  const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=f;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(Math.min(9000,f*8),t0);
  lp.frequency.exponentialRampToValueAtTime(Math.max(500,f*1.6),t0+durS);
  g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.34,t0+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+durS);
  o.connect(lp); lp.connect(g); o.start(t0); o.stop(t0+durS+0.03);
 } else if(timbre==='pad'){
  [-7,0,7].forEach(c=>{const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=f; o.detune.value=c; o.connect(g); o.start(t0); o.stop(t0+durS+0.06);});
  const a=Math.min(0.13,durS*0.45);
  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(0.10,t0+a);
  g.gain.setValueAtTime(0.10,t0+Math.max(a,durS-0.12)); g.gain.linearRampToValueAtTime(0,t0+durS+0.05);
 } else if(timbre==='voce'){
  const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=f;
  const lfo=ctx.createOscillator(); lfo.frequency.value=5.5; const lg=ctx.createGain(); lg.gain.value=f*0.012; lfo.connect(lg); lg.connect(o.frequency); lfo.start(t0); lfo.stop(t0+durS+0.02);
  const o2=ctx.createOscillator(); o2.type='triangle'; o2.frequency.value=f; const g2=ctx.createGain(); g2.gain.value=0.12; o2.connect(g2); g2.connect(g); o2.start(t0); o2.stop(t0+durS+0.02);
  const a=Math.min(0.06,durS*0.3);
  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(0.26,t0+a);
  g.gain.setValueAtTime(0.26,t0+Math.max(a,durS-0.1)); g.gain.linearRampToValueAtTime(0,t0+durS);
  o.connect(g); o.start(t0); o.stop(t0+durS+0.02);
 } else {
  const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=f;
  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(0.25,t0+0.02);
  g.gain.setValueAtTime(0.25,t0+Math.max(0.04,durS-0.08)); g.gain.linearRampToValueAtTime(0,t0+durS);
  o.connect(g); o.start(t0); o.stop(t0+durS);
 }
}

let held={};
function startHold(k){
 stopHold(k);
 const f=440*Math.pow(2,(60+root+k-69)/12), t0=ctx.currentTime;
 const g=ctx.createGain(); g.connect(ctx.destination);
 let oscs=[], lfo=null, peak=0.25;
 if(timbre==='corda'){
  const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=f;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=Math.min(6000,f*6);
  o.connect(lp); lp.connect(g); oscs=[o]; peak=0.30;
 } else if(timbre==='pad'){
  [-7,0,7].forEach(c=>{const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=f; o.detune.value=c; o.connect(g); oscs.push(o);}); peak=0.10;
 } else if(timbre==='voce'){
  const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=f; o.connect(g); oscs.push(o);
  lfo=ctx.createOscillator(); lfo.frequency.value=5.5; const lg=ctx.createGain(); lg.gain.value=f*0.012; lfo.connect(lg); lg.connect(o.frequency);
  const o2=ctx.createOscillator(); o2.type='triangle'; o2.frequency.value=f; const g2=ctx.createGain(); g2.gain.value=0.12; o2.connect(g2); g2.connect(g); oscs.push(o2); peak=0.26;
 } else {
  const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=f; o.connect(g); oscs=[o]; peak=0.25;
 }
 g.gain.setValueAtTime(0.0001,t0); g.gain.linearRampToValueAtTime(peak,t0+0.02);
 oscs.forEach(o=>o.start(t0)); if(lfo)lfo.start(t0);
 held[k]={oscs,gain:g,lfo,peak};
}
function stopHold(k){
 const h=held[k]; if(!h) return; delete held[k];
 const t=ctx.currentTime;
 try{h.gain.gain.cancelScheduledValues(t); h.gain.gain.setValueAtTime(h.peak,t); h.gain.gain.linearRampToValueAtTime(0.0001,t+0.12);}catch(e){}
 h.oscs.forEach(o=>{try{o.stop(t+0.15)}catch(e){}});
 if(h.lfo){try{h.lfo.stop(t+0.15)}catch(e){}}
}
