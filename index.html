 const reh=$('rehear'), bsc=$('bscale'), ftbtns=$('ftbtns'), ftbtn=$('ftbtn'), opt=$('optsrow');
 if(!reh||!ftbtns||!opt) return;
 if(boss){ if(reh.parentElement!==ftbtns){ ftbtns.insertBefore(reh, ftbtn); ftbtns.insertBefore(bsc, ftbtn); } }
 else if(reh.parentElement!==opt){ opt.insertBefore(bsc, opt.firstChild); opt.insertBefore(reh, opt.firstChild); }
}
function updateEliteReplay(){ if(game.kind!=='boss') return; $('rehtxt').textContent=S9.rehear+' '+game.replays; $('rehear').style.opacity=game.replays>0?'1':'.4'; } // conteggio sul bottone (elite/hard)
// PROVA LIBERA: in Elite e Boss una riga di note suonabili per ricostruire la melodia per tentativi. 3 sessioni per partita.
function freeTryEligible(){ return !!game && !game.elite && (game.daily || game.review || game.kind==='bossgrow'); } // niente "Prova le note" come aiuto nel Boss/Elite
function setupFreeTry(){
 const boss=(game.kind==='boss'||game.kind==='bossgrow'); // zona aiuti in basso per tutte le modalità boss-like
 if(!boss){ $('freetry').hidden=true; return; }
 $('freetry').hidden=false;
 const elig=freeTryEligible(); // elite o boss: c'è anche "Prova le note" + ruota
 $('ftbtn').hidden=!elig; $('ftrow').hidden=!elig;
 if(elig){ if(typeof game.tryLeft!=='number') game.tryLeft=3; game.trying=false; renderFtRow(); updateFreeTry(); }
}
function renderFtRow(){
 const ks=game.notes.slice().sort((a,b)=>a-b);
 $('ftrow').innerHTML=ks.map(k=>'<button class="ftnote" data-k="'+k+'" style="width:42px;height:42px;border-radius:50%;border:none;background:'+C[k].h+';color:'+ink(k)+ring(k)+';display:inline-flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:transform .12s,opacity .12s"><i class="ti ti-'+C[k].ic+'"></i></button>').join('');
}
function updateFreeTry(){
 const left=game.tryLeft||0, on=game.trying;
 $('fttxt').textContent = on?S9.ftStop : (left>0?S9.ftTry+' · '+left : S9.ftDone);
 $('ftbtn').style.opacity = (on||left>0)?'1':'.45';
 $('ftrow').style.opacity = on?'1':'.4'; $('ftrow').style.pointerEvents = on?'auto':'none';
}
function toggleFreeTry(){
 if(!freeTryEligible()) return;
 if(game.trying){ game.trying=false; }
 else { if((game.tryLeft||0)<=0) return; game.tryLeft--; game.trying=true; }
 updateFreeTry();
}
function closeFreeTry(){ if(game&&game.trying){ game.trying=false; updateFreeTry(); } }
function ftHit(k){ if(!game||!game.trying) return; ensureCtx(); tone(60+(root||0)+k,0.4); const b=$('ftrow').querySelector('.ftnote[data-k="'+k+'"]'); if(b){ b.style.transform='scale(1.18)'; setTimeout(()=>{b.style.transform='';},130);} }
function startBossLike(g, title){
 resetSpeed(); game=g; root=g.root||0; state='idle'; seq=[];
 setView('free');
 $('tab-free').classList.remove('on'); $('tab-'+((g.daily||g.review)?'home':'corso')).classList.add('on'); // sfide/ripasso = Profilo, boss corso = Corso
 $('gametop').hidden=false; $('gametitle').textContent=(g.elite?'💀 ':'')+title;
 $('rowsetup').hidden=true; $('goalbar').hidden=true; $('chordbar').hidden=true; $('chordseqrow').hidden=true;
 $('bossbar').hidden=false;
 $('round').textContent='–'; $('best').textContent='–'; $('bestlbl').textContent=S9.bossBest; $('reveal').innerHTML='';
 $('rehtxt').textContent=S9.rehear; $('bscale').hidden=true; $('rehear').style.opacity='1'; $('optsrow').classList.remove('optswrap');
 render(); renderBossBar(); setupFreeTry(); updateEliteReplay();
 bumpPlays(g.c); bumpStreak();
 startDrone(); showDroneToggle(true); // drone disponibile anche in elite/A orecchio (dopo setView)
 bossIntro();
}
// intro del boss: ascolti le note della scala una volta, poi "pronti, partenza, via", poi la melodia
function bossIntro(){
 ensureCtx(); state='wait'; clearTimers();
 const asc=game.notes.slice().sort((a,b)=>a-b).concat([12]);
 const sstep=Math.max(160,300/speed); let t=350;
 setStatus(S9.bossScale);
 asc.forEach(k=>{ timers.push(setTimeout(()=>{flash(k,sstep-60); tone(60+root+k,Math.max(0.2,sstep*0.8/1000));},t)); t+=sstep; });
 t+=250;
 S9.bossCount.forEach((w,i)=>{ const via=i===S9.bossCount.length-1; timers.push(setTimeout(()=>{setStatus(''); centerMsg(w); tone(via?84:72,via?0.22:0.12);},t)); t+=620; });
 timers.push(setTimeout(()=>bossPlay(),t));
}
function randMelody(pool,len){const sq=[]; for(let i=0;i<len;i++){ if(i===0){sq.push(pool.includes(0)?0:pool[0]); continue;} let k,g=0; do{k=pool[Math.floor(Math.random()*pool.length)];}while(g++<8 && i>=2 && k===sq[i-1] && k===sq[i-2]); sq.push(k);} return sq;} // parte sempre dalla tonica
// BOSS finale: costruisci nota dopo nota fino a 7, SOLO a orecchio (cerchi neutri),
// riascolto della scala illimitato, niente vite (sbagli -> risuona la giusta -> riparti dal round).
function beginDifficile(c,w){ // DIFFICILE: costruisci la melodia una nota alla volta, SOLO a orecchio, tonica random
 clearTimers(); stopAllHeld(); stopMic(); resetSpeed();
 const pool=levelPool(c,w);
 game={kind:'bossgrow', c:c, w:w, m:2, name:levelName(c,w), notes:pool, target:7, lives:3, melReplays:3, scaleReplays:3};
 root=Math.floor(Math.random()*12); state='idle'; seq=[]; dur=[];
 setView('free');
 $('tab-free').classList.remove('on'); $('tab-corso').classList.add('on');
 $('gametop').hidden=false; $('gametitle').textContent=S9.modes[2]+' · '+levelName(c,w);
 $('rowsetup').hidden=true; $('goalbar').hidden=true; $('chordbar').hidden=true; $('chordseqrow').hidden=true; $('modechip').hidden=true;
 $('round').textContent='–'; $('best').textContent=String(7); $('bestlbl').textContent=S9.bossTarget; $('reveal').innerHTML='';
 $('bscale').hidden=false; $('rehear').style.opacity='1'; $('bscale').style.opacity='1'; $('optsrow').classList.add('optswrap'); updateBossReplays(); // 2 riascolti, max 3 ciascuno
 $('bossbar').hidden=false; renderBossBar(); // 3 vite
 render(); setupFreeTry(); bumpPlays(c); bumpStreak();
 startDrone(); showDroneToggle(true); // drone disponibile anche nel boss (dopo setView)
 bossGrowIntro();
}
// suona la scala in salita; ritorna il tempo finale
function bossScaleSeq(t0){
 const asc=game.notes.slice().sort((a,b)=>a-b).concat([12]);
 const sstep=Math.max(160,300/speed); let t=t0||300;
 asc.forEach(k=>{ timers.push(setTimeout(()=>{ flash(k%12,sstep-60,true); tone(60+root+k,Math.max(0.2,sstep*0.8/1000));},t)); t+=sstep; }); // i cerchi si allargano: associi nota<->colore<->suono
 return t;
}
function updateBossReplays(){ if(game.kind!=='bossgrow') return; const m=game.melReplays, s=game.scaleReplays; $('rehtxt').textContent=S9.bossMelodyBtn+' '+m; $('bscaletxt').textContent=S9.bossScaleBtn+' '+s; $('rehear').style.opacity=m>0?'1':'.4'; $('bscale').style.opacity=s>0?'1':'.4'; }
function bossScaleReplay(){ if(game.kind!=='bossgrow'||state==='play'||game.scaleReplays<=0) return; ensureCtx(); game.scaleReplays--; updateBossReplays(); setStatus(S9.bossScale); bossScaleSeq(120); } // max 3, con flash sui cerchi
function bossMelodyReplay(){ if(game.kind!=='bossgrow'||state!=='input'||game.melReplays<=0) return; ensureCtx(); game.melReplays--; updateBossReplays(); bossGrowPlay(); } // max 3, solo a orecchio (pulse)
function bossGrowIntro(){
 ensureCtx(); state='wait'; clearTimers(); setStatus(S9.bossScale);
 let t=bossScaleSeq(350)+250;
 S9.bossCount.forEach((w,i)=>{ const via=i===S9.bossCount.length-1; timers.push(setTimeout(()=>{setStatus(''); centerMsg(w); tone(via?84:72,via?0.22:0.12);},t)); t+=620; });
 timers.push(setTimeout(()=>{ bossGrowAdd(); bossGrowPlay(); },t));
}
function bossGrowAdd(){
 if(!seq.length){ seq.push(startNote(game.notes)); dur.push(1); return; } // parte dalla casa se c'e', altrimenti dalla prima nota della pool (accordi)
 const pool=game.notes; let k,g=0;
 do{k=pool[Math.floor(Math.random()*pool.length)];}while(g++<8 && seq.length>=2 && k===seq[seq.length-1] && k===seq[seq.length-2]);
 seq.push(k); dur.push(1);
}
function bossGrowPlay(){
 ensureCtx(); state='play'; clearTimers(); closeFreeTry(); setStatus(S9.listen);
 const base=Math.max(300,520-seq.length*16)/speed; let t=300;
 seq.forEach((k)=>{ timers.push(setTimeout(()=>{ game.shown?flash(k,base-90,true):pulse(base-90); tone(60+root+k,Math.max(0.2,base*0.82/1000)); },t)); t+=base; });
 timers.push(setTimeout(()=>{ state='input'; step=0; $('round').textContent=seq.length; setStatus(S9.yourTurn(0,seq.length)); },t));
}
function bossGrowPress(k,held){
 if(state!=='input') return; ensureCtx();
 recordHit(seq[step], k===seq[step]); // statistiche per il Ripasso
 if(k===seq[step]){
  flash(k,260,true); if(!held) tone(60+root+k,0.36); step++;
  if(step>=seq.length){
   if(seq.length>=game.target){ state='over'; chime(); bossGrowWin(); }
   else { if(game.endless&&seq.length>endlessRecord())$('best').textContent=String(seq.length); state='wait'; setStatus(S9.correct,'ok'); timers.push(setTimeout(()=>{ bossGrowAdd(); bossGrowPlay(); },800)); }
  } else setStatus(S9.yourTurn(step,seq.length));
 } else {
  game.lives--; buzz(); renderBossBar(); flash(k,300,true); if(!held) tone(60+root+k,0.5); // senti la nota che HAI toccato (non riveliamo la giusta)
  if(game.lives<=0){ state='over'; bossGrowFail(); }
  else { state='wait'; setStatus(S9.bossWrong,'err'); timers.push(setTimeout(()=>bossGrowPlay(),1100)); } // perdi una vita, si riparte dal round
 }
}
function bossGrowFail(){
 if(game.endless){ endlessOver(); return; } // Infinito: salva e mostra il record
 $('bossbar').hidden=true; $('freetry').hidden=true; setStatus(S9.bossFail,'err'); $('reveal').innerHTML=''; centerPlay();
}
function bossGrowWin(){ // DIFFICILE: costruzione nota per nota a orecchio
 if(game.warmup){ warmupWin(); return; } // riscaldamento teoria: niente stelle, segna teoria fatta
 const st=(game.melReplays===3&&game.scaleReplays===3)?3:2; saveProg(game.c,'w'+game.w+'m2',{stars:st,bestRound:game.target}); dominateBelow(game.c,game.w,2);
 modeWinCelebrate(2,st);
}

// ===== ALLENAMENTO: note sbloccate su tutti i corsi =====
function allUnlockedNotes(){ const s=new Set([0]); COURSE_IDS.forEach(c=>{ if(unlockAll()||courseUnlocked(c)){ (CBASE[c]||[]).forEach(k=>s.add(k)); S9.courses[c].levels.forEach((_,w)=>{ if(unlockAll()||localStorage.getItem('hm_elite_'+c+'_'+w)) CWADD[c][w].forEach(k=>s.add(k)); }); } }); return [...s].sort((a,b)=>a-b); }
function seededRand(seed){ let x=(seed||1)&0x7fffffff; return ()=>{ x=(x*1103515245+12345)&0x7fffffff; return x/0x7fffffff; }; }
function dayHash(){ const t=dayStr(new Date()); let h=5381; for(let i=0;i<t.length;i++)h=((h*33)+t.charCodeAt(i))&0x7fffffff; return h; }
function seededMelody(pool,len,rnd){ const sq=[]; for(let i=0;i<len;i++){ if(i===0){sq.push(pool.includes(0)?0:pool[0]); continue;} let k,g=0; do{k=pool[Math.floor(rnd()*pool.length)];}while(g++<8&&i>=2&&k===sq[i-1]&&k===sq[i-2]); sq.push(k);} return sq; }
// SFIDA DEL GIORNO: ricostruzione da 7 SOLO a orecchio, uguale per tutta la giornata (seed=data)
function beginDaily(){
 clearTimers(); stopAllHeld(); stopMic();
 const pool=allUnlockedNotes(); const rnd=seededRand(dayHash());
 const r0=Math.floor(rnd()*12); const sq=seededMelody(pool,7,rnd);
 startBossLike({kind:'boss', daily:true, earOnly:true, c:null, w:null, name:S9.dailyTitle, seq:sq, notes:pool, lives:3, replays:3, root:r0}, S9.dailyTitle);
}
function dailyStreak(){ const last=localStorage.getItem('hm_daily'); const s=parseInt(localStorage.getItem('hm_dstreak')||'0',10)||0; if(!last||!s)return 0; const y=new Date(); y.setDate(y.getDate()-1); return (last===dayStr(new Date())||last===dayStr(y))?s:0; }
function dailyDoneToday(){ return localStorage.getItem('hm_daily')===dayStr(new Date()); }
function reviewDoneToday(){ return localStorage.getItem('hm_review')===dayStr(new Date()); }
function endlessDoneToday(){ return localStorage.getItem('hm_endless_day')===dayStr(new Date()); }
function dailyWin(){
 const t=dayStr(new Date());
 if(localStorage.getItem('hm_daily')!==t){ const y=new Date(); y.setDate(y.getDate()-1); const s=(localStorage.getItem('hm_daily')===dayStr(y))?dailyStreak()+1:1; localStorage.setItem('hm_dstreak',String(s)); localStorage.setItem('hm_daily',t); }
 $('bossbar').hidden=true; $('freetry').hidden=true;
 $('celico').innerHTML='<div style="width:74px;height:74px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#14151a"><i class="ti ti-calendar-star" style="font-size:36px"></i></div>';
 $('celtitle').textContent=S9.dailyWin; $('celname').innerHTML='<b>'+S9.dailyStreakLbl+': '+dailyStreak()+'</b>'; $('celtap').textContent=S9.unlockTap;
 celebrateCb=()=>showHome(); $('celebrate').hidden=false; chime(); setTimeout(chime,260);
}
// INFINITO: la melodia cresce senza fine (motore a crescita), solo a orecchio; salvi il record

 game={kind:'bossgrow', endless:true, c:null, w:null, name:S9.endlessTitle, notes:pool, target:9999, lives:3, melReplays:3, scaleReplays:3};
 root=Math.floor(Math.random()*12); state='idle'; seq=[]; dur=[];
 setView('free');

 const rec=Math.max(endlessRecord(), (seq.length-1)); const isNew=(seq.length-1)>endlessRecord();

 celebrateCb=()=>showHome(); $('celebrate').hidden=false; chime(); setTimeout(chime,260);
}
function bossPlay(keepStep){
 ensureCtx(); state='play'; clearTimers(); closeFreeTry(); setStatus(S9.listen);
 if(!keepStep) step=0;
 const base=Math.max(170,320/speed); let t=Math.max(220,350/speed);
 game.seq.forEach((k)=>{ timers.push(setTimeout(()=>{ game.earOnly?pulse(base-70):flash(k,base-70); tone(60+root+k,Math.max(0.2,base*0.85/1000));},t)); t+=base; });
 timers.push(setTimeout(()=>{state='input'; setStatus(S9.yourTurn(step,game.seq.length));},t));
}
function bossReplay(){ if(game.kind!=='boss'||game.replays<=0) return; if(state!=='input'&&state!=='play') return; game.replays--; renderBossBar(); updateEliteReplay(); bossPlay(true); }
function bossHit(k,held){
 if(state!=='input') return; ensureCtx();
 recordHit(game.seq[step], k===game.seq[step]); // statistiche per il Ripasso
 if(k===game.seq[step]){
  flash(k,300,true); if(!held) tone(60+root+k,0.38); step++;
  if(step>=game.seq.length){ state='over'; chime(); bossWin(); }
  else setStatus(S9.yourTurn(step,game.seq.length));
 } else {
  game.lives--; buzz(); renderBossBar();
  if(game.earOnly){ flash(k,300,true); if(!held) tone(60+root+k,0.5); } else { flash(game.seq[step],420); } // elite: senti la nota che HAI toccato; Hard: mostra la giusta
  if(game.lives<=0){ state='over'; bossFail(); }
  else { state='wait'; setStatus(S9.bossWrong,'err'); timers.push(setTimeout(()=>bossPlay(),1100)); } // riascolto automatico, si riparte da capo
 }
}
// ===== statistiche errori per intervallo (per il Ripasso mirato) =====
function getStats(){ try{return JSON.parse(localStorage.getItem('hm_stats')||'{}')}catch(e){return{}} }
function recordHit(k, ok){ if(k==null)return; const s=getStats(); const e=s[k]||{a:0,m:0}; e.a++; if(!ok)e.m++; s[k]=e; localStorage.setItem('hm_stats',JSON.stringify(s)); } // k = nota ATTESA
function weakIntervals(){ const s=getStats(); return Object.keys(s).map(k=>+k).filter(k=>s[k].a>=4&&s[k].m>0).sort((a,b)=>(s[b].m/s[b].a)-(s[a].m/s[a].a)); } // i piu' sbagliati, dal peggiore
function beginReview(){ // RIPASSO MIRATO: ricostruzione corta fatta soprattutto coi tuoi suoni piu' sbagliati
 clearTimers(); stopAllHeld(); stopMic();
 const all=allUnlockedNotes(); const weak=weakIntervals().filter(k=>all.includes(k));
 const pool=weak.length>=1?[...new Set([0,...weak.slice(0,3)])]:all;
 const sq=randMelody(pool.length>=2?pool:all,5);
 startBossLike({kind:'boss', review:true, earOnly:true, c:null, w:null, name:S9.reviewTitle, seq:sq, notes:all, lives:3, replays:3, root:Math.floor(Math.random()*12)}, S9.reviewTitle);
}
function reviewWin(){
 localStorage.setItem('hm_review',dayStr(new Date())); // task giornaliero
 $('bossbar').hidden=true; $('freetry').hidden=true;
 $('celico').innerHTML='<div style="width:74px;height:74px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#14151a"><i class="ti ti-target-arrow" style="font-size:36px"></i></div>';
 $('celtitle').textContent=S9.reviewWin; $('celname').innerHTML='<b>'+S9.reviewWinSub+'</b>'; $('celtap').textContent=S9.unlockTap;
 celebrateCb=()=>showHome(); $('celebrate').hidden=false; chime(); setTimeout(chime,260);
}

function addNote(forceNew){
 const sc=activeSet();
 let pool=sc;
 if(game.kind==='level' && isChord(game.c,game.w)){ pool=sc; } // accordo: melodie con le sole note dell'accordo
 else if(game.kind==='level'){
  // Facile: riscaldamento integrato e CONTEGGIATO -> le prime note usano solo tonica + nota nuova, poi si apre a tutte
  const warmPool=[...new Set([0,...CWADD[game.c][game.w]])].filter(k=>sc.includes(k));
  if(game.m===0 && seq.length<WARMUP){
   pool=warmPool.length?warmPool:sc;
  } else if(game.m===0 && seq.length===WARMUP){
   // fine riscaldamento: forzo una nota "vecchia" cosi' l'apertura a tutte le note si sente sempre
   const oldN=sc.filter(k=>!warmPool.includes(k));
   pool=oldN.length?oldN:sc;
  } else if(forceNew){
   const nn=CWADD[game.c][game.w].filter(k=>sc.includes(k));
   const fresh=nn.filter(k=>!seq.includes(k));
   pool=fresh.length?fresh:(nn.length?nn:sc);
  }
 }
 let k;
 do{k=pool[Math.floor(Math.random()*pool.length)];}while(seq.length&&k===seq[seq.length-1]&&pool.length>1&&Math.random()<0.6);

  const t3=n2-k, t5=n3-k;
  let q='maj';
  if(t3===3&&t5===7)q='min'; else if(t3===3&&t5===6)q='dim'; else if(t3===4&&t5===8)q='aug';
  const ROM=['I','II','III','IV','V','VI','VII'][i];
  const name=q==='maj'?ROM:(q==='aug'?ROM+'+':ROM.toLowerCase()+(q==='dim'?'°':''));
  return {k:k, notes:[k,n2,n3], name:name};
 });
}

let micOn=false, micStream=null, micAn=null, micBuf=null, micTimer=null, micGlowed=-1;
let det={pc:-1,count:0,locked:false,lockedPc:-1,silence:0};
function autoCorrelate(buf,sr){
 let SIZE=buf.length, rms=0;
 for(let i=0;i<SIZE;i++){const v=buf[i]; rms+=v*v;}
 rms=Math.sqrt(rms/SIZE);
 if(rms<0.01) return -1;
 // ritaglia i bordi silenziosi
 let r1=0,r2=SIZE-1;
 for(let i=0;i<SIZE/2;i++) if(Math.abs(buf[i])<0.2){r1=i;break;}
 for(let i=1;i<SIZE/2;i++) if(Math.abs(buf[SIZE-i])<0.2){r2=SIZE-i;break;}
 buf=buf.slice(r1,r2); SIZE=buf.length;
 if(SIZE<256) return -1;
 // calcola l'autocorrelazione SOLO per i lag musicali utili (60..1600 Hz)
 const minLag=Math.max(2,Math.floor(sr/1600)), maxLag=Math.min(SIZE-1,Math.ceil(sr/60));
 const c=new Float32Array(maxLag+1);
 for(let i=0;i<=maxLag;i++){let s=0; for(let j=0;j<SIZE-i;j++) s+=buf[j]*buf[j+i]; c[i]=s;}
 // salta la discesa iniziale, poi prendi il primo picco forte (la fondamentale)
 let d=minLag; while(d<maxLag&&c[d]>c[d+1]) d++;
 let maxval=-1,maxpos=-1;
 for(let i=d;i<=maxLag;i++){if(c[i]>maxval){maxval=c[i];maxpos=i;}}
 if(maxpos<1) return -1;
 if(c[0]>0&&maxval/c[0]<0.4) return -1; // poca periodicita' = non e' una nota
 // affinamento del picco a lag FRAZIONARI (autocorrelazione interpolata): risoluzione molto piu' fine = note acute piu' precise
 const corrAt=(lag)=>{const i0=Math.floor(lag),fr=lag-i0,lim=SIZE-i0-1; let s=0; for(let j=0;j<lim;j++)s+=buf[j]*(buf[j+i0]*(1-fr)+buf[j+i0+1]*fr); return s;};
 let T0=maxpos, bv=maxval;
 for(let lag=maxpos-1; lag<=maxpos+1; lag+=0.2){ if(lag<minLag||lag>=SIZE-1) continue; const v=corrAt(lag); if(v>bv){bv=v; T0=lag;} }
 const dx=0.2, y1=corrAt(T0-dx), y2=corrAt(T0), y3=corrAt(T0+dx);
 const a=(y1+y3-2*y2)/2, b=(y3-y1)/2;
 if(a) T0=T0-(b/(2*a))*dx;
 const f=sr/T0;
 return (f>60&&f<1600)?f:-1;
}
function micGlow(k){
 if(micGlowed===k) return;
 if(micGlowed>=0){const o=$('b'+micGlowed); if(o) o.style.outline='';}
 if(k>=0){const b=$('b'+k); if(b) b.style.outline='3px solid rgba(255,255,255,0.65)';}
 micGlowed=k;
}
function micLoop(){
 if(!micAn) return;
 micAn.getFloatTimeDomainData(micBuf);
 const f=autoCorrelate(micBuf,ctx.sampleRate);
 if(f<0){
  det.count=0; det.silence++; det.fbuf=[];
  if(det.silence>=2){det.locked=false; det.pc=-1; micGlow(-1); $('micline').textContent=S9.micListen;}
  return;
 }
 det.silence=0;
 // media (mediana) su 3 frame: toglie il tremolio della stima, soprattutto sulle acute
 if(!det.fbuf) det.fbuf=[];
 det.fbuf.push(f); if(det.fbuf.length>3) det.fbuf.shift();
 const fs=det.fbuf.slice().sort((a,b)=>a-b); const fmed=fs[(fs.length-1)>>1];
 const midi=69+12*Math.log2(fmed/440);
 const pcAbs=((Math.round(midi))%12+12)%12;
 const k=(pcAbs-(root%12)+12)%12;
 micGlow(k);
 $('micline').innerHTML='♪ '+NOTE[pcAbs]+' · <b>'+IV[k]+'</b> ('+DEG[k]+') · '+Math.round(fmed)+' Hz';
 if(state!=='input') return;
 if(det.pc===k) det.count++; else {det.pc=k; det.count=1;}
 if(det.locked&&k!==det.lockedPc) det.locked=false;
 if(!det.locked&&det.count>=3){
  if(activeSet().includes(k)){hit(k,true);}
  det.locked=true; det.lockedPc=k;
 }
}

  micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false, noiseSuppression:false, autoGainControl:false}});
  const src=ctx.createMediaStreamSource(micStream);
  micAn=ctx.createAnalyser(); micAn.fftSize=2048;
  micBuf=new Float32Array(micAn.fftSize);
  src.connect(micAn);
  micTimer=setInterval(micLoop,50);
  micOn=true;
  $('miccb').setAttribute('aria-pressed','true');
  $('micline').hidden=false; $('micline').textContent=S9.micListen;
 }catch(e){
  micOn=false; $('miccb').setAttribute('aria-pressed','false');
  $('micline').hidden=false; $('micline').textContent=S9.micErr;
  setTimeout(()=>{if(!micOn)$('micline').hidden=true;},3000);
 }
}
function stopMic(){
 if(micTimer){clearInterval(micTimer); micTimer=null;}
 if(micStream){micStream.getTracks().forEach(t=>t.stop()); micStream=null;}
 micAn=null; micOn=false; micGlow(-1);
 $('micline').hidden=true; $('miccb').setAttribute('aria-pressed','false');
}

function press(k,held){
 if(game.kind==='tut'){tutPress(k); return;}
 if(game.kind==='casa'){casaPress(k); return;}
 if(game.kind==='boss'){ if(state==='input'){bossHit(k,held);} else if(state==='idle'||state==='over'){ensureCtx(); flash(k,300,true); tone(60+root+k,0.38);} return; }
 if(game.kind==='bossgrow'){ if(state==='input'){bossGrowPress(k,held);} else if(state==='idle'||state==='over'){ensureCtx(); flash(k,300,true); tone(60+k,0.38);} return; }
 if(state==='input'){hit(k,false,held); return;}
 if(state==='idle'||state==='over'){ensureCtx(); flash(k,300,true); tone(60+root+k,0.38);}
}
function hit(k,fromMic,held){
 if(state!=='input') return; ensureCtx();
 const correct=(k===seq[step]);
 if(game.kind==='level') recordHit(seq[step],correct); // statistiche per il Ripasso
 flash(k,300,!correct); if(!fromMic&&!held) tone(60+root+k,0.38);
 if(correct){
  step++;
  if(step===seq.length){
   if(game.kind==='level'&&seq.length>=STAR2){ finishLevel(); return; }
   let cm=S9.correct;
   if(game.kind==='level'&&seq.length===STAR1){cm+=' · ★ '+S9.starGot; chime();}
   setStatus(cm,'ok');
   if(game.kind==='free'){
    const b=+(localStorage.getItem(bestKey())||0);
    if(seq.length>b){localStorage.setItem(bestKey(),seq.length); loadBest();}
   }
   timers.push(setTimeout(()=>{addNote(); updateReveal(); $('round').textContent=seq.length; playSeq();},900));
   state='wait';
  } else setStatus(S9.yourTurn(step,seq.length));
 } else {
  state='over'; buzz();
  const wrong=seq[step];
  let msg=S9.wrong(step+1,IV[wrong],DEG[wrong]);
  if(game.kind==='level'){
   const completed=seq.length-1;
   let st=0; if(completed>=STAR1)st=1; if(completed>=STAR2)st=2; if(completed>=STAR2&&!usedRehear)st=3;
   const before=starsOf(game.c,game.w,game.m);
   const wBefore=CWADD[game.c].map((_,i)=>worldUnlocked(game.c,i));
   saveProg(game.c,'w'+game.w+'m'+game.m,{stars:st,bestRound:completed});
   const newW=CWADD[game.c].findIndex((_,i)=>worldUnlocked(game.c,i)&&!wBefore[i]);
   if(newW>=0) timers.push(setTimeout(()=>showCelebrate(game.c,newW),900));
   loadBest();
   msg+=' · '+S9.roundW+' '+completed;
   if(st>before){msg+=S9.newStar; chime();}
   setStatus(msg+' <span style="color:var(--gold);letter-spacing:2px">'+starsStr(Math.max(st,before))+'</span>','err');
  } else {
   setStatus(msg,'err');
  }
  const rv=$('reveal'); rv.innerHTML='';
  seq.forEach((q,i)=>{
   const d=document.createElement('div'); d.className='chip'+(i===step?' err':'');
   d.innerHTML='<span class="sw" style="background:'+C[q].h+';color:'+ink(q)+'"><i class="ti ti-'+C[q].ic+'" style="font-size:11px"></i></span><b>'+IV[q]+'</b>';
   rv.appendChild(d);});
  centerPlay();
 }
}

// reset dati di gioco (progressi/sblocchi/stelle/boss). Mantiene preferenze (nome, lingua, testo, timbro).
function resetGameData(){
 const keep=new Set(['hm_name','hm_avatar','hm_lang','hm_fontsize','hm_timbre','hm_mic_warned','it_speed','it_rhythm','hm_drone']);
 Object.keys(localStorage).forEach(k=>{ if((k.startsWith('it_')||k.startsWith('hm_'))&&!keep.has(k)) localStorage.removeItem(k); });
 location.reload();
}

document.addEventListener('keydown',e=>{
 if(e.repeat||e.metaKey||e.ctrlKey||e.altKey) return;
 if($('view-game').hidden) return;
 const tag=(e.target.tagName||'').toLowerCase();
 if(tag==='select'||tag==='input'||tag==='textarea') return;
 const key=e.key.toLowerCase();
 if(key==='enter'){if(document.activeElement===document.body&&(state==='idle'||state==='over')){e.preventDefault(); beginGame();} return;}
 if(key==='r'){$('rehear').click(); return;}
 if(key in KEYMAP){const k=KEYMAP[key]; if(activeSet().includes(k)) press(k);}
});

showHome();
if(!localStorage.getItem('hm_welcome_seen')) showWelcome();
const APP_VER='1.68'; $('ver').textContent='v'+APP_VER+' alpha';
// l'audio iOS si sospende quando l'app va in background/blocco schermo: lo riattivo al ritorno
['visibilitychange','focus','pageshow'].forEach(ev=>window.addEventListener(ev,()=>{ if(document.visibilityState!=='hidden' && ctx && ctx.state==='suspended') ctx.resume().catch(()=>{}); }));
if('serviceWorker' in navigator){
 let reloaded=false;
 navigator.serviceWorker.addEventListener('controllerchange',()=>{if(reloaded)return; reloaded=true; location.reload();});
 window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').then(r=>{
  const check=()=>{ try{ r.update(); }catch(e){} };
  check();
  // controlla aggiornamenti quando torni sull'app e ogni minuto: si aggiorna da solo
  document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') check(); });
  setInterval(check, 60000);
 }).catch(()=>{});});
}
