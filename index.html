<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#14151a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Huermony</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#14151a; --surface:#1e2027; --surface2:#262932; --text:#edeef2; --muted:#9aa0ad; --line:#33363f; --gold:#eab308;
}
[hidden]{display:none !important;}
#ver{position:fixed; top:calc(env(safe-area-inset-top,0px) + 3px); right:8px; z-index:80; font-size:10px; font-weight:600; letter-spacing:.04em; color:var(--muted); opacity:.55; pointer-events:none;}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; touch-action:manipulation;}
.wrap{max-width:480px; margin:0 auto; padding:16px 16px 96px;}
header{display:flex; align-items:center; justify-content:center; margin:4px 0 18px; background:var(--surface2); border-radius:14px; padding:12px 16px;}
h1{font-size:22px; font-weight:700; letter-spacing:-0.02em; margin:0; cursor:pointer;}
.lang{display:flex; gap:2px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:2px; font-size:13px; font-weight:600;}
.lang button{border:none; background:transparent; color:var(--muted); padding:4px 10px; border-radius:999px; cursor:pointer; font-weight:600;}
.lang button.on{background:var(--surface2); color:var(--text);}
.tabs{position:fixed; left:0; right:0; bottom:0; margin:0 auto; max-width:480px; display:flex; background:var(--surface); border-top:1px solid var(--line); padding:7px 4px calc(7px + env(safe-area-inset-bottom)); z-index:30;}
.tab{flex:1; border:none; background:transparent; color:var(--muted); font-size:12px; font-weight:600; padding:3px 0; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px;}
.tab i{font-size:23px; line-height:1;}
.tab.on{color:var(--text);}
.edot{position:absolute; width:12px; height:12px; border-radius:50%;}
.dashhead{display:flex; align-items:center; gap:12px; margin:4px 0 18px;}
.dashhead #emblem{position:relative; width:46px; height:46px; flex:0 0 auto;}
#hname{font-size:24px; font-weight:700; letter-spacing:-0.02em; margin:0; flex:1;}
#htag{font-size:14px; color:var(--muted); margin:0 0 14px;}
.metrics{display:flex; flex-wrap:wrap; gap:10px; margin:0 0 14px;}
.metric{flex:1 1 28%; min-width:90px; background:var(--surface); border-radius:14px; padding:14px 10px; text-align:center;}
.metric .mv{font-size:26px; font-weight:700; line-height:1;}
.metric .ml{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-top:6px;}
#dash-studied{font-size:15px; color:var(--muted); background:var(--surface); border-radius:12px; padding:13px 15px; margin:0 0 18px; display:flex; align-items:center; gap:10px;}
#hplay{width:100%; min-height:54px; border:none; border-radius:14px; background:var(--text); color:var(--bg); font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;}
#hplay:active{transform:scale(0.99);}
#hprog{display:none;}
#hguide{display:block; width:100%; text-align:center; font-size:15px; font-weight:600; color:var(--text); background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:15px; cursor:pointer; margin-top:10px;}
#htut{width:100%; justify-content:center; margin-top:14px;}
#streak{display:inline-flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 14px; font-size:14px; font-weight:700; margin:0 0 16px;}
#streak i{color:#f59e0b; font-size:18px;}
.profrow{display:flex; align-items:center; gap:14px; background:var(--surface); border-radius:16px; padding:14px; margin:0 0 18px; cursor:pointer;}
.profrow .pedit{margin-left:auto; color:var(--muted); font-size:18px;}
#guide-intro h2{font-size:26px; line-height:1.25; font-weight:800; letter-spacing:-.02em; margin:0 0 16px;}
.heroq{font-size:21px; line-height:1.4; font-weight:700; color:var(--text); margin:0 0 22px; padding:18px 18px 18px 20px; background:var(--surface2); border-radius:16px; border-left:4px solid var(--gold);}
.heropts{display:flex; flex-direction:column; gap:14px; margin:0 0 8px;}
.hp{display:flex; align-items:center; gap:13px;}
.hp i{font-size:20px; color:var(--gold); width:40px; height:40px; flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; background:rgba(234,179,8,.12); border-radius:12px;}
.hp span{font-size:16px; line-height:1.4; color:var(--text);}
.hp b{font-weight:700;}
#tutbtn{width:100%; min-height:52px; justify-content:center; margin:22px 0; background:var(--gold); color:#14151a; font-size:16px; font-weight:700; border:none; border-radius:14px;}
#pe-avatars{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin:0 0 18px;}
#pe-avatars button{border:2px solid transparent; background:none; border-radius:50%; padding:2px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
#pe-avatars button.sel{border-color:var(--gold);}
#pe-name{width:100%; background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:12px; padding:13px 14px; font-size:16px; margin:0 0 18px;}
.fs-lbl{display:block; font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:0 0 8px;}
#freesetup select{background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:12px; appearance:none;}
.fsnote{display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; width:52px; height:52px; border-radius:50%; cursor:pointer; color:#fff;}
.fsnote span{font-size:12px; font-weight:600; line-height:1;}
.controls{display:flex; flex-direction:column; gap:12px; margin-bottom:16px;}
.crow{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.crow.options{flex-wrap:nowrap; justify-content:center; gap:3px;}
.crow.options.optswrap{flex-wrap:wrap;}
.crow.options .btn{padding:6px 8px; font-size:12px;}
.crow.options .btn i{font-size:15px;}
.crow.options .tgl{padding:6px 7px; font-size:12px; gap:5px;}
.crow.options .tgl .track{width:28px; height:17px;}
.crow.options .tgl .knob{width:13px; height:13px;}
.crow.options #mictxt{display:none;}
.spdbox{display:inline-flex; align-items:center; gap:4px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:6px 7px; color:var(--text); font-weight:600; font-size:12px;}
.spdbox i{font-size:15px;}
.spdbox i{color:var(--muted); font-size:16px;}
.spdbox select{appearance:none; -webkit-appearance:none; border:none; background:transparent; color:var(--text); font:inherit; font-weight:600; padding:0; cursor:pointer;}
#tonbox{display:none;}
#gamepanel.incard #tonbox{display:inline-flex;}
#scsel{flex:1 1 auto; min-width:0;}
.crow.actions .btn{flex:1; justify-content:center; padding:12px 14px;}
.crow.actions .btn.primary{flex:1.6;}
select{background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:9px 10px; font-size:14px; appearance:none;}
button.btn{background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:10px 14px; font-size:14px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
button.btn:active{transform:scale(0.97);}
button.btn.primary{background:var(--text); color:var(--bg); border-color:var(--text); font-size:15px;}
.pill{background:var(--surface); color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:9px 14px; font-size:14px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:5px;}
.pill[aria-pressed="true"]{color:var(--text); border-color:var(--gold); box-shadow:inset 0 0 0 1px var(--gold);}
.stats{display:flex; gap:8px; margin:8px 0 2px;}
.stat{flex:1; background:var(--surface); border-radius:12px; display:flex; align-items:baseline; gap:8px; padding:4px 10px;}
.stat p{margin:0;}
.stat .lbl{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em;}
.stat .val{font-size:16px; font-weight:600;}
#status{font-size:16px; font-weight:600; text-align:center; min-height:46px; display:flex; align-items:center; justify-content:center; background:var(--surface); border-radius:12px; padding:8px 14px; margin:8px 0 12px;}
#status.err{border:1px solid #e24b4a;}
#status.ok{border:1px solid #2e9e5b;}
#ctxlabel{font-size:13px; color:var(--muted); margin:0 0 10px;}
#wheelbox{display:flex; justify-content:center; border-radius:20px; transition:background .5s; padding:6px 0; margin:6px 0;}
.pbtn{flex:0 0 auto; width:34px; height:34px; border-radius:50%; border:1px solid var(--line); background:var(--surface2); color:var(--text); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; font-size:15px;}
.pbtn:active{transform:scale(0.94);}
.swt{border:1px solid var(--line); background:var(--surface); color:var(--muted); border-radius:999px; padding:8px 13px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
.swt[aria-pressed="true"]{background:var(--gold); color:#14151a; border-color:var(--gold);}
.tgl{display:inline-flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 12px; font-size:14px; font-weight:600; color:var(--text); cursor:pointer;}
.tgl i{font-size:15px; color:var(--muted);}
.tgl .track{position:relative; width:34px; height:20px; border-radius:999px; background:var(--line); transition:background .15s; flex:0 0 auto;}
.tgl .knob{position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:#fff; transition:transform .15s; box-shadow:0 1px 2px rgba(0,0,0,.4);}
.tgl[aria-pressed="true"]{border-color:var(--gold);}
.tgl[aria-pressed="true"] .track{background:var(--gold);}
.tgl[aria-pressed="true"] .track .knob{transform:translateX(14px);}
.tgl[aria-pressed="true"] i{color:var(--text);}
#wheel{position:relative;}
.key{position:absolute; border-radius:50%; border:none; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:transform .12s; padding:0; color:#fff;}
.key i{line-height:1;}
.key.klock{border:2px dashed #5a616e;}
.key span{font-weight:600; line-height:1.3;}
.kb{display:none;}
@media (pointer:fine){
 .kb{display:block; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid var(--line); border-radius:5px; font-size:10px; font-weight:600; padding:1px 5px; color:var(--muted);}
}
.dot{position:absolute; border-radius:50%; background:var(--line);}
#ctr{position:absolute; border-radius:50%; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; pointer-events:none; color:#fff;}
#reveal{display:flex; flex-wrap:wrap; gap:6px; min-height:30px; margin:8px 0;}
.chip{display:flex; align-items:center; gap:5px; padding:6px 11px; border-radius:999px; background:var(--surface); font-size:14px;}
.chip .sw{width:18px; height:18px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; color:#fff;}
.chip.err{outline:2px solid #e24b4a;}
#mapbox{display:flex; justify-content:center; margin:6px 0 18px;}
#map{position:relative;}
.mapdot{position:absolute; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff;}
.mapdot.off{background:var(--surface2) !important; color:#4a4e59;}
.world{background:var(--surface); border-radius:14px; padding:14px; margin-bottom:12px;}
.secname{font-size:28px; font-weight:800; letter-spacing:-.02em; margin:6px 0 10px; color:var(--text); text-align:center;}
.pathdots{display:flex; gap:8px; justify-content:center; align-items:center; margin:6px 0 14px;}
.pdot{width:9px; height:9px; border-radius:50%; border:none; background:var(--line); padding:0; cursor:pointer; transition:width .2s, background .2s; flex:0 0 auto;}
.pdot.on{background:var(--gold); width:24px; border-radius:5px;}
.medals{display:flex; gap:16px; justify-content:center; align-items:center; margin:0 0 18px; font-size:15px; font-weight:700; color:var(--text);}
.medal{display:inline-flex; align-items:center; gap:5px;}
.coursepage.locked .secname{color:var(--muted);}
.gameslot{margin:0 0 6px;}
.accwheel{margin-top:6px;}
#gamepanel.incard #gametop, #gamepanel.incard #goalbar, #gamepanel.incard #bossbar, #gamepanel.incard #tutbox, #gamepanel.incard #chordbar, #gamepanel.incard #chordseqrow, #gamepanel.incard #rowsetup, #gamepanel.incard .legbox{display:none !important;}
#gamepanel.incard{display:flex; flex-direction:column;}
#gamepanel.incard #status{order:0;} #gamepanel.incard #micline{order:0;}
#gamepanel.incard #wheelbox{order:1;}
#gamepanel.incard .stats{order:2;}
#gamepanel.incard .controls{order:3; margin:20px 0 0;}
#gamepanel.incard #reveal{order:4;}
.scalerow{justify-content:center;}
.secacc{background:var(--surface); border-radius:14px; margin:0 0 16px; overflow:hidden;}
.secacc summary{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--gold); cursor:pointer; padding:14px 16px; list-style:none; display:flex; align-items:center; justify-content:space-between;}
.secacc summary::-webkit-details-marker{display:none;}
.secacc summary i{color:var(--muted); font-size:18px; transition:transform .15s;}
.secacc[open] summary i{transform:rotate(180deg);}
.secacc .secdesc{padding:0 16px 16px; font-size:15px; line-height:1.6; color:var(--muted); margin:0;}
#methodbody h4{font-size:16px; font-weight:700; color:var(--gold); margin:14px 0 5px;}
#methodbody h4:first-child{margin-top:4px;}
#methodbody p{font-size:15px; line-height:1.6; color:var(--text); margin:0;}
.mwk{position:absolute; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; padding:0;}
.mwk:active{transform:scale(.92);}
.mwctrl{display:flex; gap:8px; justify-content:center; margin:0 0 14px; flex-wrap:wrap;}
.exrow{display:flex; flex-wrap:wrap; align-items:center; gap:8px; justify-content:center; margin:0 0 16px;}
.exlbl{font-size:13px; color:var(--muted); width:100%; text-align:center; margin:0 0 2px;}
.exbtn{background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 13px; font-size:14px; font-weight:600; color:var(--text); cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
.exbtn i{color:var(--gold);}
.exbtn:active{transform:scale(.97);}
.seclock{display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--gold); margin:0 0 14px;}
.pathsec.locked .secname{color:var(--muted);}
.world.courselock{opacity:.45;}
button.levelcard{display:block; width:100%; text-align:left; border:1px solid var(--line); color:var(--text); cursor:pointer; font:inherit;}
button.levelcard:active{transform:scale(0.99);}
.levelcard.bosscard{text-align:center; padding:22px 18px 20px; border:1.5px solid var(--line); background:var(--surface);}
.bosscard.done{border:1.5px solid var(--gold); background:linear-gradient(180deg, rgba(234,179,8,.08), var(--surface));}
.bosscard.locked{opacity:.85;}
.bosscard .skull{font-size:62px; color:#e24b4a; line-height:1; display:block; margin:0 0 8px;}
.bosscard.done .skull{color:var(--gold);}
.bosscard .btitle{font-size:19px; font-weight:700; display:block; margin:0 0 4px;}
.levelcard.elitecard{text-align:center; padding:18px 16px 16px; border:1.5px solid var(--line); background:var(--surface); margin-bottom:14px;}
.elitecard.done{border:1.5px solid var(--gold); background:linear-gradient(180deg, rgba(234,179,8,.10), var(--surface));}
.elitecard.locked{opacity:.85;}
.elitecard .eskull{font-size:46px; color:#e24b4a; line-height:1; display:block; margin:0 0 6px;}
.elitecard.done .eskull{color:var(--gold);}
.elitecard .etitle{font-size:18px; font-weight:700; display:block; margin:0 0 4px;}
.elitecard .estar{color:var(--gold); font-size:20px; vertical-align:-1px;}
.elitecard .esub{font-size:14px; color:var(--muted); margin:0;}
.welpair{display:flex; align-items:center; justify-content:center; gap:14px; margin:0 0 16px;}
.welnote{width:72px; height:72px; border-radius:50%; border:none; background:var(--surface2); color:var(--text); font-size:14px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; transition:transform .1s; flex:0 0 auto;}
.welnote:active{transform:scale(.92);}
#wel-ill{width:82px; height:82px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 22px; background:var(--gold); color:#fff; box-shadow:0 6px 20px rgba(234,179,8,.22);}
@keyframes welIn{from{opacity:0; transform:translateY(16px) scale(.95)} to{opacity:1; transform:translateY(0) scale(1)}}
@keyframes welPop{0%{opacity:0; transform:scale(.4)} 60%{transform:scale(1.08)} 100%{opacity:1; transform:scale(1)}}
@keyframes tutIn{from{opacity:0; transform:translateY(12px) scale(.97)} to{opacity:1; transform:none}}
#wel-ill i{font-size:40px;}
.wel-title{display:block; font-size:21px; font-weight:800; line-height:1.3; letter-spacing:-.01em; margin:0 0 14px;}
.wel-body{display:block; font-size:16px; line-height:1.55; color:var(--text);}
#welcome b{color:var(--gold);}
.welplay{width:42px; height:42px; border-radius:50%; border:none; background:var(--text); color:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; flex:0 0 auto;}
.welplay:active{transform:scale(.92);}
#tutbox{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:18px 16px 16px; margin:0 0 12px; text-align:center;}
.tut-ill{width:62px; height:62px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; box-shadow:0 4px 14px rgba(0,0,0,.25);}
.tut-txt{font-size:16px; line-height:1.45; color:var(--text); margin:0; font-weight:600;}
.tut-chips{display:flex; gap:14px; justify-content:center; margin:14px 0 0;}
.tut-chip{display:flex; flex-direction:column; align-items:center; gap:4px;}
.tut-chip .c{width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
.tut-chip small{font-size:13px; color:var(--muted); font-weight:700;}
.gcard{background:var(--surface); border-radius:16px; padding:18px 18px 20px; margin-bottom:14px; border:1px solid var(--line);}
.ghead{display:flex; align-items:center; gap:11px; margin:0 0 12px;}
.ghead i{font-size:18px; color:var(--gold); flex:0 0 auto; width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; background:rgba(234,179,8,.12); border-radius:10px;}
.ghead span{font-size:18px; font-weight:700; color:var(--text); letter-spacing:-.01em;}
.gbody{font-size:16px; line-height:1.62; margin:0; color:var(--text);}
.gbody b{color:var(--text); font-weight:700;}
.gcard.do{border-left:3px solid var(--gold); background:var(--surface2);}
.gcard.key{background:var(--bg);}
.gcard.key .ghead i{background:rgba(154,160,173,.14); color:var(--muted);}
.gcard.key .gbody{font-size:15px; color:var(--muted);}
.gcard.tip{background:rgba(234,179,8,.07); border:1px solid rgba(234,179,8,.25);}
.gcard.tip .ghead i{background:rgba(234,179,8,.18);}
@media (pointer:coarse){.gcard.key{display:none;}}
.world.locked .wint{opacity:.4; filter:saturate(.4);}
.world.locked .wname{color:var(--muted);}
.whead{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px;}
.wname{font-size:16px; font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.wints{display:flex; gap:4px; flex-shrink:0;}
.wint{width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff;}
.scalerow{display:flex; align-items:center; gap:6px; flex-wrap:wrap; background:rgba(255,255,255,.035); border-radius:12px; padding:9px 11px; margin:0 0 14px;}
.scalerow .srplay{background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; display:inline-flex; align-items:center; padding:0 4px 0 0; flex-shrink:0;}
.scalerow .srplay:active{transform:scale(.9);}
.scalerow.locked .srplay{cursor:default;}
.snote{width:28px; height:28px; border-radius:50%; border:none; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; padding:0;}
.snote:active{transform:scale(.92);}
.scalerow.locked{opacity:.4; filter:saturate(.4);}
.scalerow.locked .snote{cursor:default;}
#ld-head{display:flex; align-items:center; gap:10px; margin:0 0 22px; background:var(--surface2); border-radius:12px; padding:11px 13px; border-left:4px solid var(--lc,var(--gold));}
.ldsec{background:var(--surface); border-radius:14px; padding:18px 16px; margin:30px 0 14px;}
#ld-difhead{font-size:28px; font-weight:800; letter-spacing:-.01em; color:var(--gold); margin:6px 0 18px; text-align:center;}
.wreq{font-size:14px; color:var(--muted); margin:4px 0 0;}
.wsub{font-size:13px; color:var(--muted); margin:5px 0 0;}
.wsub b{color:var(--text); font-weight:700;}
.mrow{display:block; background:var(--surface2); border:none; border-left:4px solid var(--lc,var(--gold)); border-radius:12px; padding:15px 16px; margin-bottom:11px; width:100%; color:var(--text); cursor:pointer; text-align:left;}
.mrow:disabled{cursor:default; border-left-color:var(--line); opacity:.55;}
.mrow .mtop{display:flex; align-items:center; justify-content:space-between; gap:8px;}
.mrow .mname{font-size:18px; font-weight:700; display:inline-flex; align-items:center; gap:9px;}
.mrow .mname i{font-size:16px; color:var(--lc,var(--gold));}
.mrow:disabled .mname i{color:var(--muted);}
.mrow .stars{font-size:15px; letter-spacing:2px; color:var(--gold); white-space:nowrap;}
.mrow .stars .e{color:#4a4e59;}
.mrow .mdesc{font-size:14px; line-height:1.4; color:var(--muted); margin-top:7px;}
.legbox{margin-top:18px;}
.legbox summary{font-size:14px; color:var(--muted); cursor:pointer; padding:10px 0; list-style-position:inside;}
#legend{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:6px;}
.leg{display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:10px; background:var(--surface);}
.leg .sw{width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff;}
.leg small{font-size:13px; line-height:1.3; color:var(--text);}
.leg small b{font-weight:600;}
#unlockrow{display:flex; align-items:center; justify-content:center; gap:8px; font-size:13px; color:var(--muted); margin:6px 0 0; cursor:pointer; padding:8px 12px; border-radius:10px; border:1px solid transparent;}
#unlockrow:has(#unlockall:checked){background:rgba(234,179,8,.14); border-color:var(--gold); color:var(--gold-ink); font-weight:700;}
#timbrebox{margin-top:26px;}
#timbrelbl{font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:0 0 10px;}
#timbres{display:flex; gap:8px;}
.tmb{flex:1; min-width:0; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 6px; font-size:13px; font-weight:600; color:var(--text); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px;}
.tmb i{font-size:20px; color:var(--muted);}
.tmb.on{border-color:var(--gold); color:var(--gold);}
.tmb.on i{color:var(--gold);}
#setbox{margin-top:26px;}
#setlbl{font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:0 0 12px;}
.setrowlbl{font-size:14px; font-weight:600; color:var(--text); margin:0 0 10px;}
#fontsizes{display:flex; gap:8px;}
</style>
</head>

  {s:0,ic:'bulb',t:"La quinta giusta è a 7 semitoni dalla tonica: l'intervallo più stabile dopo l'ottava, il \"pilastro\"."},
  {s:0,ic:'bulb',t:"La sensibile è a un solo semitono sotto la tonica: per questo \"tira\" così forte verso casa."},
  {s:0,ic:'bulb',t:"Il tritono divide l'ottava esattamente a metà, 6 semitoni: è l'intervallo più instabile, il motore della tensione."},
  {s:0,ic:'bulb',t:"La pentatonica non ha semitoni: ecco perché nessuna nota suona mai \"sbagliata\"."},
  {s:0,ic:'bulb',t:"Un tono vale 2 semitoni. La scala maggiore è una sequenza precisa di toni e semitoni: T-T-S-T-T-T-S."},
  {s:0,ic:'bulb',t:"Cambiare tonica non cambia le distanze: l'orecchio relativo riconosce gli intervalli, non le note assolute."},
  {s:1,ic:'brain',t:"Ripetere la melodia a memoria, non solo ascoltarla, fissa l'apprendimento molto più dell'ascolto passivo."},
  {s:1,ic:'brain',t:"Associare ogni suono a un colore e un simbolo sfrutta la doppia codifica: il cervello memorizza più in fretta."},
  {s:1,ic:'brain',t:"Cinque minuti al giorno valgono più di un'ora alla settimana: l'orecchio si costruisce con la ripetizione frequente."},
  {s:1,ic:'brain',t:"L'orecchio relativo è un'abilità che si allena, non un dono: migliora con la pratica a qualsiasi età."},
  {s:1,ic:'brain',t:"Cantare le note, non solo ascoltarle, accelera l'intonazione: la voce insegna all'orecchio."},
  {s:1,ic:'brain',t:"Allenare l'orecchio mette al lavoro insieme udito, memoria e movimento: per questo tiene la mente attiva."},
  {s:1,ic:'brain',t:"Quando \"vedi\" il colore di un intervallo prima di pensarci, la sinestesia sta funzionando: il colore arriva prima del nome."},
  {s:1,ic:'brain',t:"Sbagliare e poi vedere la risposta giusta è uno dei modi più efficaci per imparare: l'errore corretto fissa il ricordo."}

 fiTitle:"Modalità Libero", fiClose:"Inizia",
 fsTitle:"Modalità libera", fsSub:"Scegli scala e tonica, ascolta le note, poi gioca.", fsScale:"Scala", fsTonic:"Tonica", fsNotes:"Le note", fsTaste:"Assaggia", fsPlay:"Gioca", fsChange:"Cambia", ldSeq:"In sequenza", exLbl:"Lo senti in queste melodie",
 fiBody:"Scegli scala e tonica e allena l'orecchio senza percorso, come vuoi tu.<br><br><b>Gioca</b> — ripeti la melodia che cresce a ogni round.<br><b>Assaggio</b> — ascolta il sapore della scala scelta.<br><b>Accordi</b> — toccali sotto la ruota per costruire un giro.<br><b>Canta</b> — rispondi con la voce invece dei tasti.<br><br>I colori e i simboli sono gli stessi ovunque: quello che impari qui vale nei livelli, e viceversa.",

 modesTitle:"I modi: la luce del viaggio",
 modesIntro:"Un modo è la stessa collana di note con una casa diversa: prendi le sette note della maggiore, scegli come tonica un'altra di loro, e le distanze da casa cambiano: si accende un'altra costellazione. Maggiore e minore naturale sono anche loro modi (ionico ed eolio): li chiamiamo scale solo perché sono i due di default. Stessi luoghi, luce diversa.",
 MODETH:{
  lyd:{nick:"la piuma",desc:"Toglie l'unico peso del maggiore (la quarta che scende) e tutto <b>galleggia</b>: sognante, fiabesco, sospeso a mezz'aria. È il suono della <b>meraviglia</b> nelle colonne sonore. Sensazione: <b>volare</b>."},
  maj:{nick:"la bandiera",desc:"Il maggiore pieno: <b>affermativo</b>, quadrato, ogni tensione sa dove risolvere. È la <b>luce di default</b> della musica occidentale: inni, pop, cori da stadio. Sensazione: <b>arrivare</b>."},
  mixo:{nick:"la strada",desc:"Maggiore <b>senza sensibile</b>: niente fretta di tornare a casa. Terreno, caldo, un po' polveroso: blues, rock anni settanta, folk. Sensazione: <b>camminare col sole addosso</b>."},
  dor:{nick:"la bussola",desc:"Minore con la <b>schiena dritta</b>: la sesta maggiore gli accende una <b>speranza dentro la malinconia</b>. Cool, elegante, mai disperato: jazz modale, Santana, ballate celtiche. Sensazione: <b>tramonto con la rotta chiara</b>."},
  min:{nick:"l'ombrello",desc:"Il minore naturale, la <b>malinconia di default</b>: pioggia interiore, nostalgia, raccoglimento. Sensazione: <b>sera, dentro casa, fuori piove</b>."},
  phr:{nick:"il vento",desc:"La seconda minore sopra la tonica preme come un <b>vento caldo e scuro</b>: spagnolo, mediterraneo, minaccioso. Flamenco e metal se lo contendono. Sensazione: <b>notte di vento</b>."},
  loc:{nick:"il vortice",desc:"Non ha la quinta giusta: <b>manca il pavimento</b>. Tutto è sospeso, <b>instabile</b>, in caduta controllata. Quasi mai un centro tonale, quasi sempre un passaggio. Sensazione: <b>vertigine</b>."}},

 methodTitle:"Come funziona Huermony", methodBody:"<h4>Pensare in relazioni</h4><p>Chi «pensa in musica» non pensa in note, pensa in <b>relazioni</b>. Huermony nasce per farti familiarizzare con queste relazioni.</p><h4>Gli intervalli</h4><p>Queste relazioni hanno un nome: <b>intervalli</b>. Sono la distanza in frequenza tra due note, secondo precisi schemi matematici. Alcune combinazioni di suoni sono gradevoli per il cervello umano: è un fatto biologico.</p><h4>Non solo matematica: emozione</h4><p>La musica non è solo matematica, sarebbe troppo facile. È l'<b>emozione</b> che due note vicine generano. E l'emozione non si impara a memoria: la devi sentire, e crearti delle ancore per ricordarla.</p><h4>Il metodo: la sinestesia</h4><p>Huermony crea questi <b>ancoraggi</b> tramite la sinestesia, la contaminazione di sensi diversi: ogni suono ha un colore e una forma. Così, col tempo, riconoscere le note diventa naturale. Come una seconda lingua.</p>",
 legsum:"Legenda colori", thintro:"La <b>funzione di ogni intervallo</b>: cosa fa dentro la musica, dove tira, che carattere ha. La sensazione vale ovunque; il ruolo descritto è quello nel <b>contesto maggiore/minore</b>: dentro ogni modo lo stesso intervallo può <b>cambiare mestiere</b> (la 2m nel frigio non è una tensione da risolvere, è il colore di casa).",

 courses:{
  pent:{title:"Pentatonica maggiore", desc:"Cinque note che insieme <b>non sbagliano un colpo</b>: nessun semitono, nessuna tensione. Tutto <b>galleggia</b>, tutto suona bene. È la scala <b>più diffusa al mondo</b>, dal blues ai canti popolari. Qui costruisci le <b>fondamenta dell'orecchio</b>: casa, apertura, movimento. La sensazione di base su cui poi nascerà tutto il resto.",
   levels:[
   {name:"I due poli", th:"Si parte dai <b>due punti</b> tra cui si muove tutta la musica: la <b>tonica</b>, il riposo, e la <b>dominante</b>, il suo pilastro. Uno è casa, l'altro è la spinta che ti riporta a casa. Non c'è ancora colore né tensione: senti solo l'<b>asse</b>, il nord e il sud del suono. È la sensazione della <b>stabilità</b>, il pavimento sotto i piedi."},
   {name:"L'arpeggio", th:"Arriva la <b>terza maggiore</b> e di colpo c'è un'<b>identità</b>: con casa e pilastro forma l'accordo maggiore, il suo sorriso. È la nota che <b>accende la luce</b>. Senti come da due punti nudi nasce un colore pieno, aperto, affermativo: la sensazione del <b>sole che sorge</b>."},
   {name:"Il passo", th:"Finora le note saltavano da un punto all'altro; ora arriva il <b>gradino</b> che le fa camminare. Questa nota non è riposo né tensione: è <b>movimento puro</b>. Con lei la melodia smette di balzare e inizia a passeggiare, un passo dopo l'altro. La sensazione è quella del <b>cammino dolce</b>."},
   {name:"La pentatonica", th:"L'ultima nota <b>completa la pentatonica</b>: cinque suoni, zero semitoni, zero tensione. È la scala <b>\"a prova di errore\"</b>, dove qualsiasi cosa suoni va bene. Senti l'<b>apertura totale</b>, calda e senza gravità: niente tira, tutto galleggia. Tieni a mente bene questa sensazione, perché nel prossimo corso la trasformeremo."}]},
  maj:{title:"Scala maggiore (ionico)", desc:"Prendi la pentatonica che hai costruito e aggiungi le <b>due note che le mancano</b>. Sono le uniche due che creano un <b>semitono</b>, e cambiano tutto: dove prima tutto galleggiava, ora compare la <b>gravità</b>. Tensione che chiede di risolvere, il bisogno di tornare a casa. È così che dalla pentatonica nasce il <b>suono pieno e affermativo</b> della scala maggiore, l'alfabeto di quasi ogni melodia che conosci.",
   levels:[
   {name:"La sensibile", th:"Ecco la <b>prima vera tensione</b>. La sensibile sta a un <b>solo semitono da casa</b>: non sta ferma, preme, tira verso l'alto, chiede di scaricarsi sulla tonica. Dopo tutto il galleggiare della pentatonica, per la prima volta senti una nota che <b>NON vuole restare dov'è</b>: è lei che rende il ritorno a casa inevitabile. La sensazione cambia: ora c'è un <b>richiamo</b>."},
   {name:"La scala completa", th:"L'ultima nota <b>chiude il cerchio</b>: tutti e sette i gradi. La sottodominante apre il viaggio armonico e, insieme alla sensibile, forma il <b>tritono nascosto</b> (fa-si), il motore segreto di ogni chiusura. Ora la scala ha <b>gravità piena</b>: ogni tensione sa dove andare. Questa è la sensazione del maggiore: affermazione, arrivo, casa."}]},
  pmin:{title:"Pentatonica minore", desc:"La controparte <b>minore</b> della pentatonica: sempre cinque note, sempre <b>nessun semitono</b>, ma con la <b>terza minore</b> che porta <b>malinconia</b> e profondità. È la scala dei <b>riff e degli assoli</b>: blues, rock, folk. Espressiva, comodissima da cantare, e come la maggiore <b>non sbaglia un colpo</b>. Qui impari il <b>colore minore</b> sulle fondamenta che hai già costruito.",
   levels:[
   {name:"I due poli", th:"Si riparte dall'<b>asse</b>: <b>tonica</b> e <b>quinta</b>, casa e pilastro. Lo scheletro è lo stesso della pentatonica maggiore: due punti stabili, ancora nessun colore. Senti di nuovo il <b>nord e il sud</b> del suono, il pavimento su cui poseremo il colore minore."},
   {name:"Il colore minore", th:"Arriva la <b>terza minore</b>: a soli 3 semitoni da casa, <b>scurisce</b> tutto. Dove la maggiore sorrideva, qui c'è <b>malinconia</b>, profondità, interiorità. È la nota che rende <b>minore</b> l'accordo. Tieni a mente questa sensazione: è il cuore di metà della musica che ascolti."},
   {name:"Il passo", th:"Entra la <b>quarta</b>, il <b>gradino</b> che fa camminare la melodia. <b>Sospende</b> dolcemente, senza dramma, e fa da ponte tra casa e pilastro. Con lei la scala minore inizia a <b>respirare e muoversi</b>, non più solo due poli e un colore."},
   {name:"La pentatonica minore", th:"L'ultima nota <b>completa la pentatonica minore</b>: la <b>settima minore</b>, calda e bluesy, che scende morbida verso la quinta. Cinque suoni, zero semitoni, pieno <b>colore minore</b>. È la scala dei <b>riff e degli assoli</b>: ora ce l'hai tutta nell'orecchio."}]}},
 TH:[
  "Il <b>punto di riposo</b>. Tutto si misura da qui e tutto, prima o poi, ci torna. Quando la melodia atterra sulla tonica, la frase si <b>chiude</b>.",
  "Un <b>semitono sopra casa</b>: striscia, preme, non sta ferma. È la <b>tensione cromatica</b> pura, il colore scuro del modo frigio.",
  "Il <b>passo naturale</b> della melodia. Non è riposo e non è dramma: è <b>movimento</b>, il gradino con cui le frasi camminano.",
  "La nota che <b>scurisce</b>: con lei il modo diventa <b>minore</b>. Malinconia, interiorità. Cuore dell'accordo minore.",
  "La nota che <b>illumina</b>: con lei il modo diventa <b>maggiore</b>. Apertura, affermazione. Cuore dell'accordo maggiore.",
  "Il <b>primo passo</b> del viaggio armonico (I→IV). <b>Sospende</b> senza drammatizzare: è la quarta del sus4, che chiede di posarsi sulla terza.",
  "Divide l'ottava esattamente <b>a metà</b>: <b>massima instabilità</b>, nessuna gerarchia. È il motore dell'accordo di dominante: vuole risolvere per semitoni, in entrambe le direzioni.",
  "Il <b>pilastro</b>. L'intervallo più <b>stabile</b> dopo l'ottava, e insieme la <b>tensione strutturale</b> dell'armonia: la dominante esiste per tirare verso casa.",
  "La <b>malinconia dolce</b> del modo minore. Pesa verso il basso: tende a <b>scendere di semitono</b> sulla dominante.",
  "<b>Calda e aperta</b>, il colore del maggiore che sorride. Da qui la relativa minore è a un passo.",
  "Il colore del <b>blues</b> e del mixolidio, la settima dell'accordo di dominante. <b>Tensione morbida</b> che scende verso la mediante.",
  "Il <b>fulmine</b>: a un semitono da casa, <b>carica massima verso l'alto</b>. È la sensibile, la nota che rende inevitabile il ritorno alla tonica."],
 GUIDE:[
  {h:"Cosa alleni qui", p:"Huermony allena l'<b>orecchio relativo</b> con una piccola sinestesia: ogni suono, rispetto alla tonica (la nota di casa), ha sempre lo <b>stesso colore</b>, lo stesso simbolo e lo stesso posto sulla ruota. Cambi la nota di partenza e i colori restano gli stessi. <b>Non impari le note a memoria: impari le distanze.</b>"},
  {h:"Il percorso", p:"Nella <b>Home</b> trovi i corsi uno sotto l'altro, come un sentiero. Si parte dalla <b>pentatonica</b>: 5 note, nessuna tensione, facili da cantare. La costruisci un suono alla volta (Casa e Pilastro, poi Sole, Passo, Cielo). Quando la finisci si sblocca la <b>scala maggiore</b>: prendi la pentatonica e aggiungi le 2 note che creano la tensione. Sotto a ogni scala c'è una riga di cerchi colorati: toccali per sentire le note, tocca l'altoparlante per sentire tutta la scala."},
  {h:"Come si gioca", t:"do", p:"È come Simon: ascolta e ripeti.<br>1. Premi <b>Gioca</b> (o il grande tasto Play al centro della ruota): parte una breve melodia.<br>2. Ripetila toccando i cerchi nello stesso ordine.<br>3. Giusta? Riparte con una nota in più.<br><br>Si sale fino al <b>round 7</b>: lì hai superato il livello. Se sbagli vedi la sequenza giusta, ed è lì che si impara. Il ritmo cambia da solo: le note hanno durate diverse, ma a te basta l'ordine. La <b>velocità</b> la regoli come in un video: 0.5x, 1x, 1.5x, 2x."},
  {h:"Difficoltà e stelle", p:"Apri un livello e in cima trovi <b>Inizia a giocare</b> con tre difficoltà:<br><b>Facile</b>: ripeti la melodia, gli aiuti (simbolo, poi nome) calano a ogni stella.<br><b>Normale</b>: come Facile, ma la <b>tonalità cambia</b> a ogni round.<br><b>Difficile</b>: <b>ricostruisci</b> la melodia a orecchio, 3 vite e 3 riascolti (le stelle dipendono dalle vite rimaste).<br><br>In Facile e Normale: <span style='color:var(--gold)'>★</span> al round 5 · <span style='color:var(--gold)'>★★</span> al round 7 · <span style='color:var(--gold)'>★★★</span> al round 7 senza Riascolta. Fino a 9 stelle per livello; ogni difficoltà si sblocca con 1★ nella precedente. Alla fine del corso, il <b>Boss</b>: costruisci 7 note solo a orecchio, riascoltando la scala quando vuoi. Più in basso, in <b>Cosa imparerai</b>, trovi il ruolo di ogni suono."},
  {h:"Rispondi con la voce o lo strumento", p:"Attiva il <b>microfono</b> e invece di toccare lo schermo puoi rispondere cantando, fischiando o suonando uno strumento a una nota per volta. Vale qualsiasi ottava: conta la nota, non se è acuta o grave. Mentre fai il suono, la ruota si illumina su quello che stai intonando, così vedi se sei centrato."},
  {h:"Libero", p:"In <b>Libero</b> esplori senza punteggio. Prima scegli scala e tonica, poi senti le note. Usa <b>Assaggia</b> per sentire il sapore della scala, tocca gli accordi del modo per costruirti un giro, e premi <b>Cambia</b> quando vuoi ripartire da un'altra scala. È lo spazio per le idee, non per i record."},
  {h:"Teoria", p:"In <b>Teoria</b> trovi il carattere di ogni suono: dove tira, che sapore ha, quanto è lontano dalla tonica. Ci sono anche i <b>modi</b>, cioè le diverse atmosfere che nascono spostando il centro della scala. Tutto si può ascoltare, non solo leggere."},
  {h:"Mettila sul telefono", p:"Huermony si installa senza nessuno store. Aprila nel browser, poi su iPhone fai <b>Condividi → \"Aggiungi a Home\"</b>, su Android <b>menu → \"Installa app\"</b>. Da lì si apre a tutto schermo con la sua icona e funziona anche <b>offline</b>."},
  {h:"Da computer", t:"key", p:"Puoi giocare con la tastiera. <b>A</b> = tonica, poi <b>W S E D F T G Y H U J</b> salendo per semitoni, come i tasti di un pianoforte. <b>R</b> = riascolta, <b>Invio</b> = gioca. Fuori dalla partita i tasti suonano liberi: usali per esplorare i colori."},
  {h:"Un consiglio", t:"tip", p:"Meglio <b>5 minuti al giorno</b> che un'ora alla domenica. L'orecchio si forma con la ripetizione frequente, non con lo sforzo di una volta sola. Tieni d'occhio la <b>streak</b> nel Profilo: ti aiuta a non saltare i giorni. Quando ti accorgi di \"vedere\" il colore di un suono prima ancora di pensarci, sta funzionando."}]

  {s:0,ic:'bulb',t:"The distance from tonic to mediant (the major third) is 4 semitones: it's what makes a chord sound \"major\"."},
  {s:0,ic:'bulb',t:"The perfect fifth is 7 semitones from the tonic: the most stable interval after the octave, the \"pillar\"."},
  {s:0,ic:'bulb',t:"The leading tone is just one semitone below the tonic: that's why it \"pulls\" home so strongly."},
  {s:0,ic:'bulb',t:"The tritone splits the octave exactly in half, 6 semitones: the most unstable interval, the engine of tension."},
  {s:0,ic:'bulb',t:"The pentatonic has no semitones: that's why no note ever sounds \"wrong\"."},
  {s:0,ic:'bulb',t:"A whole tone is 2 semitones. The major scale is a precise sequence of tones and semitones: W-W-H-W-W-W-H."},
  {s:0,ic:'bulb',t:"Changing the tonic doesn't change the distances: relative pitch recognizes intervals, not absolute notes."},
  {s:1,ic:'brain',t:"Repeating the melody from memory, not just listening, locks in learning far more than passive listening."},
  {s:1,ic:'brain',t:"Pairing each sound with a color and a symbol uses dual coding: the brain memorizes faster."},
  {s:1,ic:'brain',t:"Five minutes a day beats an hour a week: your ear is built by frequent repetition."},
  {s:1,ic:'brain',t:"Relative pitch is a trainable skill, not a gift: it improves with practice at any age."},
  {s:1,ic:'brain',t:"Singing the notes, not just hearing them, speeds up intonation: the voice teaches the ear."},
  {s:1,ic:'brain',t:"Ear training works hearing, memory and movement together: that's why it keeps the mind active."},
  {s:1,ic:'brain',t:"When you \"see\" an interval's color before thinking, the synesthesia is working: the color comes before the name."},
  {s:1,ic:'brain',t:"Making a mistake and then seeing the right answer is one of the most effective ways to learn: corrected errors stick."}

 modesIntro:"A mode is the same necklace of notes with a different home: take the seven notes of the major scale, pick another one of them as the tonic, and the distances from home change: a different constellation lights up. Major and natural minor are modes too (Ionian and Aeolian): we call them scales only because they are the two defaults. Same places, different light.",
 MODETH:{
  lyd:{nick:"the feather",desc:"It removes the major scale's only downward pull (the falling fourth) and everything <b>floats</b>: dreamy, fairy-tale, mid-air. The sound of <b>wonder</b> in film scores. Feels like: <b>flying</b>."},
  maj:{nick:"the flag",desc:"Full major: <b>affirmative</b>, square, every tension knows where to resolve. The <b>default light</b> of Western music: anthems, pop, stadium choirs. Feels like: <b>arriving</b>."},
  mixo:{nick:"the road",desc:"Major <b>without the leading tone</b>: no rush to get home. Earthy, warm, a little dusty: blues, seventies rock, folk. Feels like: <b>walking in the sun</b>."},
  dor:{nick:"the compass",desc:"Minor with a <b>straight back</b>: the major sixth lights a <b>hope inside the melancholy</b>. Cool, elegant, never desperate: modal jazz, Santana, Celtic ballads. Feels like: <b>sunset with a clear course</b>."},
  min:{nick:"the umbrella",desc:"Natural minor, the <b>default melancholy</b>: inner rain, nostalgia, gathering in. Feels like: <b>evening indoors while it rains</b>."},
  phr:{nick:"the wind",desc:"The minor second above the tonic presses like a <b>hot, dark wind</b>: Spanish, Mediterranean, threatening. Flamenco and metal both claim it. Feels like: <b>a windy night</b>."},
  loc:{nick:"the vortex",desc:"It has no perfect fifth: <b>the floor is missing</b>. Everything hangs, <b>unstable</b>, in controlled fall. Almost never a home key, almost always a passage. Feels like: <b>vertigo</b>."}},

 unlockTap:"tap to continue",
 methodTitle:"How Huermony works", methodBody:"<h4>Thinking in relationships</h4><p>Those who «think in music» don't think in notes, they think in <b>relationships</b>. Huermony exists to make you familiar with these relationships.</p><h4>Intervals</h4><p>These relationships have a name: <b>intervals</b>. They're the distance in frequency between two notes, following precise mathematical patterns. Some combinations of sounds are pleasing to the human brain: it's a biological fact.</p><h4>Not just math: emotion</h4><p>Music isn't just math, that would be too easy. It's the <b>emotion</b> two nearby notes create. And emotion can't be memorized: you have to feel it, and build your own anchors to remember it.</p><h4>The method: synesthesia</h4><p>Huermony builds these <b>anchors</b> through synesthesia, the blending of different senses: every sound has a color and a shape. So over time, recognizing notes becomes natural. Like a second language.</p>",

 courses:{
  pent:{title:"Major pentatonic", desc:"Five notes that <b>never miss together</b>: no semitones, no tension. Everything <b>floats</b>, everything sounds good. It's the <b>most widespread scale in the world</b>, from blues to folk songs. Here you build the <b>foundations of your ear</b>: home, openness, movement. The base sensation everything else will grow from.",
   levels:[
   {name:"The two poles", th:"You start from the <b>two points</b> all music moves between: the <b>tonic</b>, the rest, and the <b>dominant</b>, its pillar. One is home, the other is the push that brings you back home. No color yet, no tension: you feel only the <b>axis</b>, the north and south of sound. It's the sensation of <b>stability</b>, the floor under your feet."},
   {name:"The arpeggio", th:"The <b>major third</b> arrives and suddenly there's an <b>identity</b>: with home and pillar it forms the major chord, its smile. It's the note that <b>turns the light on</b>. Feel how from two bare points a full, open, affirmative color is born: the sensation of the <b>rising sun</b>."},
   {name:"The step", th:"Until now the notes leaped from point to point; now comes the <b>stair-step</b> that makes them walk. This note is neither rest nor tension: it's <b>pure movement</b>. With it the melody stops jumping and starts strolling, one step after another. The sensation is a <b>gentle walk</b>."},
   {name:"The pentatonic", th:"The last note <b>completes the pentatonic</b>: five sounds, zero semitones, zero tension. It's the <b>\"fail-safe\" scale</b> where anything you play works. Feel the <b>total openness</b>, warm and weightless: nothing pulls, everything floats. Hold on to this sensation, because in the next course we'll transform it."}]},
  maj:{title:"Major scale (Ionian)", desc:"Take the pentatonic you built and add the <b>two notes it's missing</b>. They're the only two that create a <b>semitone</b>, and they change everything: where before everything floated, now there's <b>gravity</b>. Tension asking to resolve, the need to get home. That's how the <b>full, affirmative sound</b> of the major scale is born from the pentatonic, the alphabet of almost every melody you know.",
   levels:[
   {name:"The leading tone", th:"Here's the <b>first real tension</b>. The leading tone sits <b>just a semitone from home</b>: it won't sit still, it presses, it pulls upward, it begs to discharge onto the tonic. After all the floating of the pentatonic, for the first time you feel a note that <b>does NOT want to stay put</b>: it's what makes the return home inevitable. The sensation shifts: now there's a <b>pull</b>."},
   {name:"The full scale", th:"The last note <b>closes the circle</b>: all seven degrees. The subdominant opens the harmonic journey and, with the leading tone, forms the <b>hidden tritone</b> (fa-ti), the secret engine of every closure. Now the scale has <b>full gravity</b>: every tension knows where to go. This is the sensation of major: affirmation, arrival, home."}]},
  pmin:{title:"Minor pentatonic", desc:"The <b>minor</b> counterpart of the pentatonic: still five notes, still <b>no semitones</b>, but with the <b>minor third</b> that brings <b>melancholy</b> and depth. It's the scale of <b>riffs and solos</b>: blues, rock, folk. Expressive, easy to sing, and like the major one it <b>never misses</b>. Here you learn the <b>minor color</b> on foundations you've already built.",
   levels:[
   {name:"The two poles", th:"You start again from the <b>axis</b>: <b>tonic</b> and <b>fifth</b>, home and pillar. The skeleton is the same as the major pentatonic: two stable points, no color yet. Feel again the <b>north and south</b> of sound, the floor we'll lay the minor color on."},
   {name:"The minor color", th:"The <b>minor third</b> arrives: just 3 semitones from home, it <b>darkens</b> everything. Where the major smiled, here there's <b>melancholy</b>, depth, inwardness. It's the note that makes a chord <b>minor</b>. Hold on to this sensation: it's the heart of half the music you hear."},
   {name:"The step", th:"The <b>fourth</b> enters, the <b>stair-step</b> that makes the melody walk. It <b>suspends</b> gently, without drama, bridging home and pillar. With it the minor scale starts to <b>breathe and move</b>, no longer just two poles and a color."},
   {name:"The minor pentatonic", th:"The last note <b>completes the minor pentatonic</b>: the <b>minor seventh</b>, warm and bluesy, falling softly toward the fifth. Five sounds, zero semitones, full <b>minor color</b>. It's the scale of <b>riffs and solos</b>: now you've got all of it in your ear."}]}},
 TH:[
  "The <b>resting point</b>. Everything is measured from here and everything, sooner or later, returns here. When the melody lands on the tonic, the phrase <b>closes</b>.",
  "A <b>semitone above home</b>: it creeps, it presses, it will not sit still. Pure <b>chromatic tension</b>, the dark color of the Phrygian mode.",
  "The <b>natural step</b> of melody. Neither rest nor drama: it is <b>motion</b>, the stair-step that phrases walk on.",
  "The note that <b>darkens</b>: with it the mode turns <b>minor</b>. Melancholy, interiority. The heart of the minor chord.",
  "The note that <b>brightens</b>: with it the mode turns <b>major</b>. Openness, affirmation. The heart of the major chord.",
  "The <b>first step</b> of the harmonic journey (I→IV). It <b>suspends</b> without drama: it is the fourth of the sus4 chord, asking to settle onto the third.",
  "It splits the octave exactly <b>in half</b>: <b>maximum instability</b>, no hierarchy. The engine of the dominant seventh chord: it wants to resolve by semitones, in both directions.",
  "The <b>pillar</b>. The most <b>stable</b> interval after the octave, and at the same time the <b>structural tension</b> of harmony: the dominant exists to pull toward home.",
  "The <b>sweet melancholy</b> of the minor mode. It leans downward: it tends to <b>fall by semitone</b> onto the dominant.",
  "<b>Warm and open</b>, the color of the major mode smiling. From here, the relative minor is one step away.",
  "The color of <b>blues</b> and Mixolydian, the seventh of the dominant chord. <b>Soft tension</b> drifting down toward the mediant.",
  "The <b>lightning</b>: a semitone from home, <b>maximum upward charge</b>. It is the leading tone, the note that makes the return to the tonic inevitable."],
 GUIDE:[
  {h:"What you're training", p:"Huermony trains your <b>relative ear</b> with a little synesthesia: every sound, compared to the tonic (the home note), always has the <b>same color</b>, the same symbol and the same place on the wheel. Change the starting note and the colors stay the same. <b>You don't memorize notes: you learn distances.</b>"},
  {h:"The path", p:"On the <b>Home</b> screen the courses sit one below the other, like a trail. You start with the <b>pentatonic</b>: 5 notes, no tension, easy to sing. You build it one sound at a time (Home and Pillar, then Sun, Step, Sky). Finish it and the <b>major scale</b> unlocks: you take the pentatonic and add the 2 notes that create the tension. Under each scale there's a row of colored circles: tap them to hear the notes, tap the speaker to hear the whole scale."},
  {h:"How to play", t:"do", p:"It's like Simon: listen and repeat.<br>1. Press <b>Play</b> (or the big Play button in the center of the wheel): a short melody starts.<br>2. Repeat it by tapping the circles in the same order.<br>3. Right? It restarts with one more note.<br><br>You climb up to <b>round 7</b>: that's when you clear the level. If you make a mistake you see the right sequence, and that's where you learn. The rhythm changes on its own: notes have different lengths, but you only need the order. <b>Speed</b> works like a video player: 0.5x, 1x, 1.5x, 2x."},
  {h:"Difficulty and stars", p:"Open a level and at the top you'll find <b>Start playing</b> with three difficulties:<br><b>Easy</b>: repeat the melody, hints (symbol, then name) fade with each star.<br><b>Normal</b>: like Easy, but the <b>key changes</b> every round.<br><b>Hard</b>: <b>rebuild</b> the melody by ear, 3 lives and 3 replays (stars depend on lives left).<br><br>In Easy and Normal: <span style='color:var(--gold)'>★</span> round 5 · <span style='color:var(--gold)'>★★</span> round 7 · <span style='color:var(--gold)'>★★★</span> round 7 without Replay. Up to 9 stars per level; each difficulty unlocks with 1★ in the previous one. At the end of the course, the <b>Boss</b>: build 7 notes by ear alone, replaying the scale whenever you want. Further down, in <b>What you'll learn</b>, you'll find the role of each sound."},
  {h:"Answer with your voice or instrument", p:"Turn on the <b>microphone</b> and instead of tapping the screen you can answer by singing, whistling or playing one note at a time on an instrument. Any octave works: the note is what counts, not whether it's high or low. While you make the sound, the wheel lights up on what you're producing, so you can see if you're on target."},
  {h:"Free play", p:"In <b>Free play</b> you explore with no score. First pick a scale and a tonic, then hear the notes. Use <b>Taste it</b> to feel the flavor of the scale, tap the chords of the mode to build a little progression, and press <b>Change</b> whenever you want to start over with another scale. This is the space for ideas, not for records."},
  {h:"Theory", p:"In <b>Theory</b> you'll find the character of each sound: where it pulls, what it tastes like, how far it sits from the tonic. There are also the <b>modes</b>, the different moods you get by shifting the center of the scale. Everything can be listened to, not just read."},
  {h:"Put it on your phone", p:"Huermony installs without any store. Open it in your browser, then on iPhone tap <b>Share → \"Add to Home Screen\"</b>, on Android <b>menu → \"Install app\"</b>. From there it opens full screen with its own icon and works <b>offline</b> too."},
  {h:"On a computer", t:"key", p:"You can play with the keyboard. <b>A</b> = tonic, then <b>W S E D F T G Y H U J</b> going up by semitones, like piano keys. <b>R</b> = replay, <b>Enter</b> = play. Outside a game the keys play freely: use them to explore the colors."},
  {h:"One piece of advice", t:"tip", p:"<b>Five minutes a day</b> beats an hour on Sunday. Your ear is built by frequent repetition, not by one big effort. Keep an eye on your <b>streak</b> in the Profile: it helps you not skip days. When you catch yourself \"seeing\" the color of a sound before you even think about it, it's working."}]
}};

function prog(c){try{return JSON.parse(localStorage.getItem('it_prog_'+c)||'{}')}catch(e){return{}}}
function saveProg(c,key,entry){const p=prog(c); const old=p[key]||{stars:0,bestRound:0};
 p[key]={stars:Math.max(old.stars,entry.stars), bestRound:Math.max(old.bestRound,entry.bestRound)};
 localStorage.setItem('it_prog_'+c,JSON.stringify(p));}
function starsOf(c,w,m){const e=prog(c)['w'+w+'m'+m]; return e?e.stars:0;}
function bestOf(c,w,m){const e=prog(c)['w'+w+'m'+m]; return e?e.bestRound:0;}
function unlockAll(){return localStorage.getItem('it_unlockall')==='1';}
function updateUnlockLabel(){const t=$('unlocktxt'); if(t)t.textContent=unlockAll()?S9.unlockOn:S9.unlock;}
// livello successivo: si sblocca battendo l'Elite del livello precedente (che introduce la nota)
function worldUnlocked(c,i){return unlockAll()||i===0||!!localStorage.getItem('hm_elite_'+c+'_'+(i-1));}
// modalità successiva: servono SEMPRE 3 stelle (★★★) sulla precedente
function modeUnlocked(c,w,m){return unlockAll()||(m===0?worldUnlocked(c,w):starsOf(c,w,m-1)>=3);}
function cumSet(c,wi){let s=(CBASE[c]||[]).slice(); for(let i=0;i<=wi;i++)s=s.concat(CWADD[c][i]); return [...new Set(s)].sort((a,b)=>a-b);}
function courseUnlocked(c){
 if(unlockAll()) return true;
 const idx=COURSE_IDS.indexOf(c);
 if(idx<=0) return true;
 const prev=COURSE_IDS[idx-1];
 return S9.courses[prev].levels.every((_,i)=>levelStars(prev,i)>=1);
}
function maxUnlockedWorld(c){let m=0; for(let i=0;i<CWADD[c].length;i++){if(worldUnlocked(c,i))m=i;} return m;}
function activeSet(){if(game.kind==='tut')return[0,7]; if(game.kind==='boss'||game.kind==='bossgrow')return game.notes; return game.kind==='free'?(game.notes||SCALES[scale]):cumSet(game.c,game.w);}
function courseScale(c){return c==='pent'?'pmaj':(c==='maj'?'maj':c);}
// le note NUOVE di un livello si sbloccano nel free play solo battendo l'ELITE di quel livello
function unlockedNotes(c){ if(!unlockAll()&&!courseUnlocked(c)) return []; const s=new Set(CBASE[c]||[]); S9.courses[c].levels.forEach((_,w)=>{ if(unlockAll()||localStorage.getItem('hm_elite_'+c+'_'+w)) CWADD[c][w].forEach(k=>s.add(k)); }); return [...s].sort((a,b)=>a-b);}
function starsStr(n){let s=''; for(let i=1;i<=3;i++)s+=i<=n?'★':'<span class="e">★</span>'; return s;}
function courseStars(c){const p=prog(c); let t=0; for(const k in p)t+=p[k].stars; return t;}
function totalStars(){let t=0; COURSE_IDS.forEach(c=>t+=courseStars(c)); return t;}
function courseMaxStars(c){return S9.courses[c].levels.length*9;}
function courseEliteDone(c){let n=0; S9.courses[c].levels.forEach((_,w)=>{if(localStorage.getItem('hm_elite_'+c+'_'+w))n++;}); return n;}
function bossDone(c){return !!localStorage.getItem('hm_boss_'+c);}
function totalElite(){let n=0; COURSE_IDS.forEach(c=>n+=courseEliteDone(c)); return n;}
function totalEliteMax(){let n=0; COURSE_IDS.forEach(c=>n+=S9.courses[c].levels.length); return n;}
function totalBoss(){let n=0; COURSE_IDS.forEach(c=>{if(bossDone(c))n++;}); return n;}

  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=Math.min(6000,f*6);

  [-7,0,7].forEach(c=>{const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=f; o.detune.value=c; o.connect(g); oscs.push(o);}); peak=0.10;

  lfo=ctx.createOscillator(); lfo.frequency.value=5.5; const lg=ctx.createGain(); lg.gain.value=f*0.012; lfo.connect(lg); lg.connect(o.frequency);

const DURS=[0.5,1,1,1,1.5,2];
function addNote(forceNew){
 const sc=activeSet();
 let pool=sc;
 if(game.kind==='level'){
  // Facile: riscaldamento integrato e CONTEGGIATO -> le prime note usano solo tonica + nota nuova, poi si apre a tutte
  const warmPool=[...new Set([0,...CWADD[game.c][game.w]])].filter(k=>sc.includes(k));
  if(game.m===0 && seq.length<WARMUP){
   pool=warmPool.length?warmPool:sc;
  } else if(game.m===0 && seq.length===WARMUP){
   // fine riscaldamento: forzo una nota "vecchia" cosi' l'apertura a tutte le note si sente sempre
   const oldN=sc.filter(k=>!warmPool.includes(k));
   pool=oldN.length?oldN:sc;
  } else if(forceNew){
   const nn=CWADD[game.c][game.w].filter(k=>sc.includes(k));
   const fresh=nn.filter(k=>!seq.includes(k));
   pool=fresh.length?fresh:(nn.length?nn:sc);
  }
 }
 let k;
 do{k=pool[Math.floor(Math.random()*pool.length)];}while(seq.length&&k===seq[seq.length-1]&&pool.length>1&&Math.random()<0.6);
 seq.push(k);
 dur.push(rhythm?DURS[Math.floor(Math.random()*DURS.length)]:1);
}
function stripTags(s){return (s||'').replace(/<[^>]+>/g,'');}
function tonesStr(k){const whole=Math.floor(k/2); return (k%2)?((whole||'')+'½'):String(whole);}
function tipSentences(html){return stripTags(html).split(/(?<=[.!?…])\s+/).map(s=>s.trim()).filter(s=>s.length>=25&&s.length<=160);}

function loadingTip(ctx){
 const g=S9.tips[Math.floor(Math.random()*S9.tips.length)], gen={ic:g.ic,cat:g.s?S9.tipScience:S9.tipPractical,t:g.t};

 if(c && S9.courses[c]){
  const pool=[];
  if(w!=null && CWADD[c] && CWADD[c][w]){
   tipSentences(S9.courses[c].levels[w].th).forEach(s=>pool.push({ic:'music',cat:S9.tipLevel,t:s})); // ruolo della nota nel livello
   CWADD[c][w].forEach(k=>{ if(k!==0) pool.push(distTip(k)); });                                      // distanza del nuovo grado
  } else {
   (SCALES[courseScale(c)]||[]).forEach(k=>{ if(k!==0) pool.push(distTip(k)); });                     // boss/corso intero: distanze di tutti i gradi
  }
  tipSentences(S9.courses[c].desc).forEach(s=>pool.push({ic:'bulb',cat:S9.tipScale,t:s}));            // curiosita' sulla scala
  pool.push(gen);
  if(pool.length) return pool[Math.floor(Math.random()*pool.length)];
 }
 return gen;
}

let chordSeq=[];
function diatonicChords(){
 const sc=SCALES[scale];
 if(sc.length!==7) return null;
 return sc.map((k,i)=>{
  const n2=sc[(i+2)%7]+((i+2)>=7?12:0);
  const n3=sc[(i+4)%7]+((i+4)>=7?12:0);
  const t3=n2-k, t5=n3-k;
  let q='maj';
  if(t3===3&&t5===7)q='min'; else if(t3===3&&t5===6)q='dim'; else if(t3===4&&t5===8)q='aug';
  const ROM=['I','II','III','IV','V','VI','VII'][i];
  const name=q==='maj'?ROM:(q==='aug'?ROM+'+':ROM.toLowerCase()+(q==='dim'?'°':''));
  return {k:k, notes:[k,n2,n3], name:name};
 });
}
function chordTones(c){
 c.notes.forEach(n=>tone(60+root+n,0.85));
 tone(48+root+c.k,0.85);
}
function chordFlash(c,ms){
 c.notes.forEach(n=>{const b=$('b'+(n%12)); if(b){b.style.transform='scale(1.22)'; setTimeout(()=>{b.style.transform='scale(1)';},ms||380);}});
 const ct=$('ctr');
 if(ct){ct.style.background=C[c.k%12].h; ct.style.color=ink(c.k%12);
  ct.innerHTML='<span style="font-size:30px;font-weight:700">'+c.name+'</span>';
  ct.style.opacity='0.95'; setTimeout(()=>{ct.style.opacity='0';},ms||380);}
}
function tapChord(c){
 if(state==='play'||state==='input'||state==='wait') return;

 if(chordSeq.length<16){chordSeq.push(c); renderChordSeq();}
}
function renderChordSeq(){
 const row=$('chordseqrow');
 if(!chordSeq.length){row.hidden=true; row.innerHTML=''; return;}

}
function playChordSeq(){
 if(!chordSeq.length||state==='play'||state==='input'||state==='wait') return;
 ensureCtx(); clearTimers(); state='play';
 const stepMs=Math.max(380,700/speed); let t=100;
 chordSeq.forEach(c=>{timers.push(setTimeout(()=>{chordTones(c); chordFlash(c,stepMs-60);},t)); t+=stepMs;});
 timers.push(setTimeout(()=>{state='idle';},t+200));
}
function renderChords(){
 const bar=$('chordbar');

 if(!chs){bar.hidden=true; $('chordseqrow').hidden=true; chordSeq=[]; return;}
 let h='<p style="font-size:13px;color:var(--muted);margin:0 0 6px">'+S9.chordsTitle+'</p><div style="display:flex;gap:6px;flex-wrap:wrap">';
 chs.forEach((c,i)=>{
  let dots='';
  c.notes.forEach(n=>{dots+='<span style="width:8px;height:8px;border-radius:50%;background:'+C[n%12].h+'"></span>';});
  h+='<button class="pill" style="gap:6px" data-ci="'+i+'"><span style="font-weight:700">'+c.name+'</span><span style="display:inline-flex;gap:2px">'+dots+'</span></button>';
 });
 h+='</div>';
 bar.hidden=false; bar.innerHTML=h;
 [...bar.querySelectorAll('button')].forEach(b=>{b.addEventListener('click',()=>tapChord(chs[+b.dataset.ci]));});

function tasteMelody(){
 if(state==='play'||state==='wait'||state==='input') return;
 ensureCtx(); clearTimers(); state='play'; setStatus(S9.tasting);
 const sc=SCALES[scale].slice();
 const ext=sc.concat([12]);
 const n=6+Math.floor(Math.random()*5);
 const ch=(CHARS[scale]||[]).filter(k=>sc.includes(k));
 let idx=0; const mel=[0];
 for(let i=1;i<n-1;i++){
  const r=Math.random();
  if(ch.length&&r<0.22){idx=sc.indexOf(ch[Math.floor(Math.random()*ch.length)]);}
  else if(r<0.62){idx+=(Math.random()<0.5?-1:1);}
  else if(r<0.87){idx+=(Math.random()<0.5?-2:2);}
  else {idx=Math.floor(Math.random()*ext.length);}
  idx=Math.max(0,Math.min(ext.length-1,idx));
  mel.push(ext[idx]);
 }
 mel.push(Math.random()<0.7?0:12);
 const base=520/speed; let t=150;
 mel.forEach((k,i)=>{
  const df=i===mel.length-1?2:[0.5,0.75,1,1,1.5][Math.floor(Math.random()*5)];
  const ms=base*df;
  timers.push(setTimeout(()=>{flash(k%12,ms-80); tone(60+root+k,Math.max(0.2,ms*0.85/1000));},t));
  t+=ms;
 });
 timers.push(setTimeout(()=>{state='idle'; setStatus(''); centerPlay();},t+100));
}

let micOn=false, micStream=null, micAn=null, micBuf=null, micTimer=null, micGlowed=-1;
let det={pc:-1,count:0,locked:false,lockedPc:-1,silence:0};
function autoCorrelate(buf,sr){
 let SIZE=buf.length, rms=0;
 for(let i=0;i<SIZE;i++){const v=buf[i]; rms+=v*v;}
 rms=Math.sqrt(rms/SIZE);
 if(rms<0.01) return -1;
 // ritaglia i bordi silenziosi
 let r1=0,r2=SIZE-1;
 for(let i=0;i<SIZE/2;i++) if(Math.abs(buf[i])<0.2){r1=i;break;}
 for(let i=1;i<SIZE/2;i++) if(Math.abs(buf[SIZE-i])<0.2){r2=SIZE-i;break;}
 buf=buf.slice(r1,r2); SIZE=buf.length;
 if(SIZE<256) return -1;
 // calcola l'autocorrelazione SOLO per i lag musicali utili (60..1600 Hz)
 const minLag=Math.max(2,Math.floor(sr/1600)), maxLag=Math.min(SIZE-1,Math.ceil(sr/60));
 const c=new Float32Array(maxLag+1);
 for(let i=0;i<=maxLag;i++){let s=0; for(let j=0;j<SIZE-i;j++) s+=buf[j]*buf[j+i]; c[i]=s;}
 // salta la discesa iniziale, poi prendi il primo picco forte (la fondamentale)
 let d=minLag; while(d<maxLag&&c[d]>c[d+1]) d++;
 let maxval=-1,maxpos=-1;
 for(let i=d;i<=maxLag;i++){if(c[i]>maxval){maxval=c[i];maxpos=i;}}
 if(maxpos<1) return -1;
 if(c[0]>0&&maxval/c[0]<0.4) return -1; // poca periodicita' = non e' una nota
 // affinamento del picco a lag FRAZIONARI (autocorrelazione interpolata): risoluzione molto piu' fine = note acute piu' precise
 const corrAt=(lag)=>{const i0=Math.floor(lag),fr=lag-i0,lim=SIZE-i0-1; let s=0; for(let j=0;j<lim;j++)s+=buf[j]*(buf[j+i0]*(1-fr)+buf[j+i0+1]*fr); return s;};
 let T0=maxpos, bv=maxval;
 for(let lag=maxpos-1; lag<=maxpos+1; lag+=0.2){ if(lag<minLag||lag>=SIZE-1) continue; const v=corrAt(lag); if(v>bv){bv=v; T0=lag;} }
 const dx=0.2, y1=corrAt(T0-dx), y2=corrAt(T0), y3=corrAt(T0+dx);
 const a=(y1+y3-2*y2)/2, b=(y3-y1)/2;
 if(a) T0=T0-(b/(2*a))*dx;
 const f=sr/T0;
 return (f>60&&f<1600)?f:-1;
}
function micGlow(k){
 if(micGlowed===k) return;
 if(micGlowed>=0){const o=$('b'+micGlowed); if(o) o.style.outline='';}
 if(k>=0){const b=$('b'+k); if(b) b.style.outline='3px solid rgba(255,255,255,0.65)';}
 micGlowed=k;
}
function micLoop(){
 if(!micAn) return;
 micAn.getFloatTimeDomainData(micBuf);
 const f=autoCorrelate(micBuf,ctx.sampleRate);
 if(f<0){
  det.count=0; det.silence++; det.fbuf=[];
  if(det.silence>=2){det.locked=false; det.pc=-1; micGlow(-1); $('micline').textContent=S9.micListen;}
  return;
 }
 det.silence=0;
 // media (mediana) su 3 frame: toglie il tremolio della stima, soprattutto sulle acute
 if(!det.fbuf) det.fbuf=[];
 det.fbuf.push(f); if(det.fbuf.length>3) det.fbuf.shift();
 const fs=det.fbuf.slice().sort((a,b)=>a-b); const fmed=fs[(fs.length-1)>>1];
 const midi=69+12*Math.log2(fmed/440);
 const pcAbs=((Math.round(midi))%12+12)%12;
 const k=(pcAbs-(root%12)+12)%12;
 micGlow(k);
 $('micline').innerHTML='♪ '+NOTE[pcAbs]+' · <b>'+IV[k]+'</b> ('+DEG[k]+') · '+Math.round(fmed)+' Hz';
 if(state!=='input') return;
 if(det.pc===k) det.count++; else {det.pc=k; det.count=1;}
 if(det.locked&&k!==det.lockedPc) det.locked=false;
 if(!det.locked&&det.count>=3){
  if(activeSet().includes(k)){hit(k,true);}
  det.locked=true; det.lockedPc=k;
 }
}
async function startMic(){
 try{
  ensureCtx();
  micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false, noiseSuppression:false, autoGainControl:false}});
  const src=ctx.createMediaStreamSource(micStream);
  micAn=ctx.createAnalyser(); micAn.fftSize=2048;
  micBuf=new Float32Array(micAn.fftSize);
  src.connect(micAn);
  micTimer=setInterval(micLoop,50);
  micOn=true;
  $('miccb').setAttribute('aria-pressed','true');
  $('micline').hidden=false; $('micline').textContent=S9.micListen;
 }catch(e){
  micOn=false; $('miccb').setAttribute('aria-pressed','false');
  $('micline').hidden=false; $('micline').textContent=S9.micErr;
  setTimeout(()=>{if(!micOn)$('micline').hidden=true;},3000);
 }
}
function stopMic(){
 if(micTimer){clearInterval(micTimer); micTimer=null;}
 if(micStream){micStream.getTracks().forEach(t=>t.stop()); micStream=null;}
 micAn=null; micOn=false; micGlow(-1);
 $('micline').hidden=true; $('miccb').setAttribute('aria-pressed','false');
}

function press(k,held){
 if(game.kind==='tut'){tutPress(k); return;}
 if(game.kind==='boss'){ if(state==='input'){bossHit(k,held);} else if(state==='idle'||state==='over'){ensureCtx(); flash(k,300,true); tone(60+root+k,0.38);} return; }
 if(game.kind==='bossgrow'){ if(state==='input'){bossGrowPress(k,held);} else if(state==='idle'||state==='over'){ensureCtx(); flash(k,300,true); tone(60+k,0.38);} return; }
 if(state==='input'){hit(k,false,held); return;}
 if(state==='idle'||state==='over'){ensureCtx(); flash(k,300,true); tone(60+root+k,0.38);}
}
function hit(k,fromMic,held){
 if(state!=='input') return; ensureCtx();
 const correct=(k===seq[step]);
 flash(k,300,!correct); if(!fromMic&&!held) tone(60+root+k,0.38);
 if(correct){
  step++;
  if(step===seq.length){
   if(game.kind==='level'&&seq.length>=STAR2){ finishLevel(); return; }
   let cm=S9.correct;
   if(game.kind==='level'&&seq.length===STAR1){cm+=' · ★ '+S9.starGot; chime();}
   setStatus(cm,'ok');
   if(game.kind==='free'){
    const b=+(localStorage.getItem(bestKey())||0);
    if(seq.length>b){localStorage.setItem(bestKey(),seq.length); loadBest();}
   }
   timers.push(setTimeout(()=>{addNote(); updateReveal(); $('round').textContent=seq.length; playSeq();},900));
   state='wait';
  } else setStatus(S9.yourTurn(step,seq.length));
 } else {
  state='over'; buzz();
  const wrong=seq[step];
  let msg=S9.wrong(step+1,IV[wrong],DEG[wrong]);
  if(game.kind==='level'){
   const completed=seq.length-1;
   let st=0; if(completed>=STAR1)st=1; if(completed>=STAR2)st=2; if(completed>=STAR2&&!usedRehear)st=3;
   const before=starsOf(game.c,game.w,game.m);
   const wBefore=CWADD[game.c].map((_,i)=>worldUnlocked(game.c,i));
   saveProg(game.c,'w'+game.w+'m'+game.m,{stars:st,bestRound:completed});
   const newW=CWADD[game.c].findIndex((_,i)=>worldUnlocked(game.c,i)&&!wBefore[i]);
   if(newW>=0) timers.push(setTimeout(()=>showCelebrate(game.c,newW),900));
   loadBest();
   msg+=' · '+S9.roundW+' '+completed;
   if(st>before){msg+=S9.newStar; chime();}
   setStatus(msg+' <span style="color:var(--gold);letter-spacing:2px">'+starsStr(Math.max(st,before))+'</span>','err');
  } else {
   setStatus(msg,'err');
  }
  const rv=$('reveal'); rv.innerHTML='';
  seq.forEach((q,i)=>{
   const d=document.createElement('div'); d.className='chip'+(i===step?' err':'');
   d.innerHTML='<span class="sw" style="background:'+C[q].h+';color:'+ink(q)+'"><i class="ti ti-'+C[q].ic+'" style="font-size:11px"></i></span><b>'+IV[q]+'</b>';
   rv.appendChild(d);});
  centerPlay();
 }
}
