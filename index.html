<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#14151a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Huermony</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#14151a; --surface:#1e2027; --surface2:#262932; --text:#edeef2; --muted:#9aa0ad; --line:#33363f; --gold:#eab308;
}
[hidden]{display:none !important;}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; touch-action:manipulation;}
.wrap{max-width:480px; margin:0 auto; padding:16px 16px 96px;}
header{display:flex; align-items:center; justify-content:space-between; margin:4px 0 18px; background:var(--surface2); border-radius:14px; padding:12px 16px;}
h1{font-size:22px; font-weight:700; letter-spacing:-0.02em; margin:0; cursor:pointer;}
.lang{display:flex; gap:2px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:2px; font-size:13px; font-weight:600;}
.lang button{border:none; background:transparent; color:var(--muted); padding:4px 10px; border-radius:999px; cursor:pointer; font-weight:600;}
.lang button.on{background:var(--surface2); color:var(--text);}
.tabs{position:fixed; left:0; right:0; bottom:0; margin:0 auto; max-width:480px; display:flex; background:var(--surface); border-top:1px solid var(--line); padding:7px 4px calc(7px + env(safe-area-inset-bottom)); z-index:30;}
.tab{flex:1; border:none; background:transparent; color:var(--muted); font-size:12px; font-weight:600; padding:3px 0; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px;}
.tab i{font-size:23px; line-height:1;}
.tab.on{color:var(--text);}
.edot{position:absolute; width:12px; height:12px; border-radius:50%;}
.dashhead{display:flex; align-items:center; gap:12px; margin:4px 0 18px;}
.dashhead #emblem{position:relative; width:46px; height:46px; flex:0 0 auto;}
#hname{font-size:24px; font-weight:700; letter-spacing:-0.02em; margin:0; flex:1;}
#htag{font-size:14px; color:var(--muted); margin:0 0 14px;}
.metrics{display:flex; gap:10px; margin:0 0 14px;}
.metric{flex:1; background:var(--surface); border-radius:14px; padding:14px 10px; text-align:center;}
.metric .mv{font-size:26px; font-weight:700; line-height:1;}
.metric .ml{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-top:6px;}
#dash-studied{font-size:15px; color:var(--muted); background:var(--surface); border-radius:12px; padding:13px 15px; margin:0 0 18px; display:flex; align-items:center; gap:10px;}
#hplay{width:100%; min-height:54px; border:none; border-radius:14px; background:var(--text); color:var(--bg); font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;}
#hplay:active{transform:scale(0.99);}
#hprog{display:none;}
#hguide{display:block; width:100%; text-align:center; font-size:15px; font-weight:600; color:var(--text); background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:15px; cursor:pointer; margin-top:10px;}
#htut{width:100%; justify-content:center; margin-top:14px;}
#streak{display:inline-flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 14px; font-size:14px; font-weight:700; margin:0 0 16px;}
#streak i{color:#f59e0b; font-size:18px;}
.profrow{display:flex; align-items:center; gap:14px; background:var(--surface); border-radius:16px; padding:14px; margin:0 0 18px; cursor:pointer;}
.profrow .pedit{margin-left:auto; color:var(--muted); font-size:18px;}
#guide-intro h2{font-size:26px; line-height:1.25; font-weight:800; letter-spacing:-.02em; margin:0 0 16px;}
.heroq{font-size:21px; line-height:1.4; font-weight:700; color:var(--text); margin:0 0 22px; padding:18px 18px 18px 20px; background:var(--surface2); border-radius:16px; border-left:4px solid var(--gold);}
.heropts{display:flex; flex-direction:column; gap:14px; margin:0 0 8px;}
.hp{display:flex; align-items:center; gap:13px;}
.hp i{font-size:20px; color:var(--gold); width:40px; height:40px; flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; background:rgba(234,179,8,.12); border-radius:12px;}
.hp span{font-size:16px; line-height:1.4; color:var(--text);}
.hp b{font-weight:700;}
#tutbtn{width:100%; min-height:52px; justify-content:center; margin:22px 0; background:var(--gold); color:#14151a; font-size:16px; font-weight:700; border:none; border-radius:14px;}
#pe-avatars{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin:0 0 18px;}
#pe-avatars button{border:2px solid transparent; background:none; border-radius:50%; padding:2px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
#pe-avatars button.sel{border-color:var(--gold);}
#pe-name{width:100%; background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:12px; padding:13px 14px; font-size:16px; margin:0 0 18px;}
.fs-lbl{display:block; font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:0 0 8px;}
#freesetup select{background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:12px; appearance:none;}
.fsnote{display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; width:52px; height:52px; border-radius:50%; cursor:pointer; color:#fff;}
.fsnote span{font-size:12px; font-weight:600; line-height:1;}
.controls{display:flex; flex-direction:column; gap:12px; margin-bottom:16px;}
.crow{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
#scsel{flex:1 1 auto; min-width:0;}
.crow.actions .btn{flex:1; justify-content:center; padding:12px 14px;}
.crow.actions .btn.primary{flex:1.6;}
select{background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:9px 10px; font-size:14px; appearance:none;}
button.btn{background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:10px 14px; font-size:14px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
button.btn:active{transform:scale(0.97);}
button.btn.primary{background:var(--text); color:var(--bg); border-color:var(--text); font-size:15px;}
.pill{background:var(--surface); color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:9px 14px; font-size:14px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:5px;}
.pill[aria-pressed="true"]{color:var(--text); border-color:var(--gold); box-shadow:inset 0 0 0 1px var(--gold);}
.stats{display:flex; gap:8px; margin:8px 0 2px;}
.stat{flex:1; background:var(--surface); border-radius:12px; display:flex; align-items:baseline; gap:8px; padding:4px 10px;}
.stat p{margin:0;}
.stat .lbl{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em;}
.stat .val{font-size:16px; font-weight:600;}
#status{font-size:16px; font-weight:600; text-align:center; min-height:46px; display:flex; align-items:center; justify-content:center; background:var(--surface); border-radius:12px; padding:8px 14px; margin:8px 0 12px;}
#status.err{border:1px solid #e24b4a;}
#status.ok{border:1px solid #2e9e5b;}
#ctxlabel{font-size:13px; color:var(--muted); margin:0 0 10px;}
#wheelbox{display:flex; justify-content:center; border-radius:20px; transition:background .5s; padding:6px 0; margin:6px 0;}
.pbtn{flex:0 0 auto; width:34px; height:34px; border-radius:50%; border:1px solid var(--line); background:var(--surface2); color:var(--text); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; font-size:15px;}
.pbtn:active{transform:scale(0.94);}
.swt{border:1px solid var(--line); background:var(--surface); color:var(--muted); border-radius:999px; padding:8px 13px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
.swt[aria-pressed="true"]{background:var(--gold); color:#14151a; border-color:var(--gold);}
.tgl{display:inline-flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 12px; font-size:14px; font-weight:600; color:var(--text); cursor:pointer;}
.tgl i{font-size:15px; color:var(--muted);}
.tgl .track{position:relative; width:34px; height:20px; border-radius:999px; background:var(--line); transition:background .15s; flex:0 0 auto;}
.tgl .knob{position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:#fff; transition:transform .15s; box-shadow:0 1px 2px rgba(0,0,0,.4);}
.tgl[aria-pressed="true"]{border-color:var(--gold);}
.tgl[aria-pressed="true"] .track{background:var(--gold);}
.tgl[aria-pressed="true"] .track .knob{transform:translateX(14px);}
.tgl[aria-pressed="true"] i{color:var(--text);}
#wheel{position:relative;}
.key{position:absolute; border-radius:50%; border:none; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:transform .12s; padding:0; color:#fff;}
.key i{line-height:1;}
.key span{font-weight:600; line-height:1.3;}
.kb{display:none;}
@media (pointer:fine){
 .kb{display:block; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid var(--line); border-radius:5px; font-size:10px; font-weight:600; padding:1px 5px; color:var(--muted);}
}
.dot{position:absolute; border-radius:50%; background:var(--line);}
#ctr{position:absolute; border-radius:50%; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; pointer-events:none; color:#fff;}
#reveal{display:flex; flex-wrap:wrap; gap:6px; min-height:30px; margin:8px 0;}
.chip{display:flex; align-items:center; gap:5px; padding:6px 11px; border-radius:999px; background:var(--surface); font-size:14px;}
.chip .sw{width:18px; height:18px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; color:#fff;}
.chip.err{outline:2px solid #e24b4a;}
#mapbox{display:flex; justify-content:center; margin:6px 0 18px;}
#map{position:relative;}
.mapdot{position:absolute; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff;}
.mapdot.off{background:var(--surface2) !important; color:#4a4e59;}
.world{background:var(--surface); border-radius:14px; padding:14px; margin-bottom:12px;}
.secname{font-size:28px; font-weight:800; letter-spacing:-.02em; margin:32px 0 12px; color:var(--text); text-align:center;}
.pathsec:first-child .secname{margin-top:16px;}
.scalerow{justify-content:center;}
.secacc{background:var(--surface); border-radius:14px; margin:0 0 16px; overflow:hidden;}
.secacc summary{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--gold); cursor:pointer; padding:14px 16px; list-style:none; display:flex; align-items:center; justify-content:space-between;}
.secacc summary::-webkit-details-marker{display:none;}
.secacc summary i{color:var(--muted); font-size:18px; transition:transform .15s;}
.secacc[open] summary i{transform:rotate(180deg);}
.secacc .secdesc{padding:0 16px 16px; font-size:15px; line-height:1.6; color:var(--muted); margin:0;}
.mwk{position:absolute; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; padding:0;}
.mwk:active{transform:scale(.92);}
.mwctrl{display:flex; gap:8px; justify-content:center; margin:0 0 14px; flex-wrap:wrap;}
.exrow{display:flex; flex-wrap:wrap; align-items:center; gap:8px; justify-content:center; margin:0 0 16px;}
.exlbl{font-size:13px; color:var(--muted); width:100%; text-align:center; margin:0 0 2px;}
.exbtn{background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 13px; font-size:14px; font-weight:600; color:var(--text); cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
.exbtn i{color:var(--gold);}
.exbtn:active{transform:scale(.97);}
.seclock{display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--gold); margin:0 0 14px;}
.pathsec.locked .secname{color:var(--muted);}
.world.courselock{opacity:.45;}
button.levelcard{display:block; width:100%; text-align:left; border:1px solid var(--line); color:var(--text); cursor:pointer; font:inherit;}
button.levelcard:active{transform:scale(0.99);}
.gcard{background:var(--surface); border-radius:16px; padding:18px 18px 20px; margin-bottom:14px; border:1px solid var(--line);}
.ghead{display:flex; align-items:center; gap:11px; margin:0 0 12px;}
.ghead i{font-size:18px; color:var(--gold); flex:0 0 auto; width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; background:rgba(234,179,8,.12); border-radius:10px;}
.ghead span{font-size:18px; font-weight:700; color:var(--text); letter-spacing:-.01em;}
.gbody{font-size:16px; line-height:1.62; margin:0; color:var(--text);}
.gbody b{color:var(--text); font-weight:700;}
.gcard.do{border-left:3px solid var(--gold); background:var(--surface2);}
.gcard.key{background:var(--bg);}
.gcard.key .ghead i{background:rgba(154,160,173,.14); color:var(--muted);}
.gcard.key .gbody{font-size:15px; color:var(--muted);}
.gcard.tip{background:rgba(234,179,8,.07); border:1px solid rgba(234,179,8,.25);}
.gcard.tip .ghead i{background:rgba(234,179,8,.18);}
@media (pointer:coarse){.gcard.key{display:none;}}
.world.locked .wint{opacity:.4; filter:saturate(.4);}
.world.locked .wname{color:var(--muted);}
.whead{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px;}
.wname{font-size:16px; font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.wints{display:flex; gap:4px; flex-shrink:0;}
.wint{width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff;}
.scalerow{display:flex; align-items:center; gap:6px; flex-wrap:wrap; background:rgba(255,255,255,.035); border-radius:12px; padding:9px 11px; margin:0 0 14px;}
.scalerow .srplay{background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; display:inline-flex; align-items:center; padding:0 4px 0 0; flex-shrink:0;}
.scalerow .srplay:active{transform:scale(.9);}
.scalerow.locked .srplay{cursor:default;}
.snote{width:28px; height:28px; border-radius:50%; border:none; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; padding:0;}
.snote:active{transform:scale(.92);}
.scalerow.locked{opacity:.4; filter:saturate(.4);}
.scalerow.locked .snote{cursor:default;}
#ld-head{display:flex; align-items:center; gap:10px; margin:0 0 22px; background:var(--surface2); border-radius:12px; padding:11px 13px; border-left:4px solid var(--lc,var(--gold));}
.ldsec{background:var(--surface); border-radius:14px; padding:18px 16px; margin:30px 0 14px;}
#ld-difhead{font-size:28px; font-weight:800; letter-spacing:-.01em; color:var(--gold); margin:6px 0 18px; text-align:center;}
.wreq{font-size:14px; color:var(--muted); margin:4px 0 0;}
.wsub{font-size:13px; color:var(--muted); margin:5px 0 0;}
.wsub b{color:var(--text); font-weight:700;}
.mrow{display:block; background:var(--surface2); border:none; border-left:4px solid var(--lc,var(--gold)); border-radius:12px; padding:15px 16px; margin-bottom:11px; width:100%; color:var(--text); cursor:pointer; text-align:left;}
.mrow:disabled{cursor:default; border-left-color:var(--line); opacity:.55;}
.mrow .mtop{display:flex; align-items:center; justify-content:space-between; gap:8px;}
.mrow .mname{font-size:18px; font-weight:700; display:inline-flex; align-items:center; gap:9px;}
.mrow .mname i{font-size:16px; color:var(--lc,var(--gold));}
.mrow:disabled .mname i{color:var(--muted);}
.mrow .stars{font-size:15px; letter-spacing:2px; color:var(--gold); white-space:nowrap;}
.mrow .stars .e{color:#4a4e59;}
.mrow .mdesc{font-size:14px; line-height:1.4; color:var(--muted); margin-top:7px;}
.legbox{margin-top:18px;}
.legbox summary{font-size:14px; color:var(--muted); cursor:pointer; padding:10px 0; list-style-position:inside;}
#legend{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:6px;}
.leg{display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:10px; background:var(--surface);}
.leg .sw{width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff;}
.leg small{font-size:13px; line-height:1.3; color:var(--text);}
.leg small b{font-weight:600;}
#unlockrow{display:flex; align-items:center; justify-content:center; gap:8px; font-size:13px; color:var(--muted); margin:6px 0 0; cursor:pointer;}
#timbrebox{margin-top:26px;}
#timbrelbl{font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:0 0 10px;}
#timbres{display:flex; gap:8px;}
.tmb{flex:1; min-width:0; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 6px; font-size:13px; font-weight:600; color:var(--text); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px;}
.tmb i{font-size:20px; color:var(--muted);}
.tmb.on{border-color:var(--gold); color:var(--gold);}
.tmb.on i{color:var(--gold);}
#setbox{margin-top:26px;}
#setlbl{font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:0 0 12px;}
.setrowlbl{font-size:14px; font-weight:600; color:var(--text); margin:0 0 10px;}
#fontsizes{display:flex; gap:8px;}
</style>
</head>
<body>
<div class="wrap">
  <header id="hdr" hidden>
    <h1 id="brand">Huermony</h1>
    <div class="lang" id="langsw"><button data-l="it">IT</button><button data-l="en">EN</button></div>
  </header>

  <div id="view-home">
    <div class="dashhead">
      <div id="emblem" aria-hidden="true" style="cursor:pointer"></div>
      <p id="hname" style="cursor:pointer">Huermony</p>
      <i class="ti ti-pencil" id="hedit" style="color:var(--muted); font-size:15px; cursor:pointer; margin-right:6px;"></i>
      <div class="lang" id="hlang"><button data-l="it">IT</button><button data-l="en">EN</button></div>
    </div>
    <p id="htag"></p>
    <div id="streak" hidden></div>
    <div class="metrics">
      <div class="metric"><div class="mv" id="m-stars">0</div><div class="ml" id="m-stars-l"></div></div>
      <div class="metric"><div class="mv" id="m-levels">0</div><div class="ml" id="m-levels-l"></div></div>
      <div class="metric"><div class="mv" id="m-games">0</div><div class="ml" id="m-games-l"></div></div>
    </div>
    <div id="dash-studied" hidden></div>
    <button id="hplay"><i class="ti ti-player-play"></i><span id="hplaytxt"></span></button>
    <p id="hprog"></p>
    <button class="btn" id="htut"><i class="ti ti-school"></i><span id="htuttxt"></span></button>
    <button id="hguide"></button>
    <div id="timbrebox">
      <p id="timbrelbl"></p>
      <div id="timbres"></div>
    </div>
    <div id="setbox">
      <p id="setlbl"></p>
      <p class="setrowlbl" id="fontlbl"></p>
      <div id="fontsizes"></div>
    </div>
  </div>

  <nav class="tabs" id="tabs" hidden>
    <button class="tab" id="tab-home"><i class="ti ti-home"></i><span class="tablbl"></span></button>
    <button class="tab" id="tab-free"><i class="ti ti-music"></i><span class="tablbl"></span></button>
    <button class="tab" id="tab-guide"><i class="ti ti-help"></i><span class="tablbl"></span></button>
    <button class="tab" id="tab-theory"><i class="ti ti-book"></i><span class="tablbl"></span></button>
    <button class="tab" id="tab-profile"><i class="ti ti-user"></i><span class="tablbl"></span></button>
  </nav>

  <div id="view-levels" hidden>
    <div id="path"></div>
    <label id="unlockrow"><input type="checkbox" id="unlockall" style="width:14px; height:14px;"> <span id="unlocktxt"></span></label>
  </div>

  <div id="view-leveldetail" hidden>
    <div id="ld-head">
      <button class="btn" id="ld-back" style="flex:0 0 auto; padding:8px 12px;"><i class="ti ti-arrow-left"></i></button>
      <div style="flex:1; min-width:0;">
        <div id="ld-title" style="font-size:16px; font-weight:700; line-height:1.2;"></div>
        <div id="ld-subtitle" style="font-size:13px; color:var(--muted);"></div>
      </div>
      <span id="ld-stars" style="color:var(--gold); font-size:14px; white-space:nowrap;"></span>
    </div>
    <p id="ld-difhead"></p>
    <div id="ld-modes"></div>
    <div class="ldsec">
      <p id="ld-learnhead" style="font-size:24px; font-weight:800; color:var(--text); margin:0 0 16px; text-align:center;"></p>
      <div id="ld-wheel" class="mwbox"></div>
      <div id="ld-listen" class="mwctrl"></div>
      <div id="ld-theory"></div>
    </div>
  </div>

  <div id="view-guide" hidden>
    <div id="guide-intro"></div>

  pent:{title:"La pentatonica", desc:"Cinque note che insieme non sbagliano un colpo: nessun semitono, nessuna tensione. Tutto galleggia, tutto suona bene. È la scala più diffusa al mondo, dal blues ai canti popolari. Qui costruisci le fondamenta dell'orecchio: casa, apertura, movimento. La sensazione di base su cui poi nascerà tutto il resto.",
   levels:[
   {name:"I due poli", th:"Si parte dai due punti tra cui si muove tutta la musica: la tonica, il riposo, e la dominante, il suo pilastro. Uno è casa, l'altro è la spinta che ti riporta a casa. Non c'è ancora colore né tensione: senti solo l'asse, il nord e il sud del suono. È la sensazione della stabilità, il pavimento sotto i piedi."},
   {name:"L'arpeggio", th:"Arriva la terza maggiore e di colpo c'è un'identità: con casa e pilastro forma l'accordo maggiore, il suo sorriso. È la nota che accende la luce. Senti come da due punti nudi nasce un colore pieno, aperto, affermativo: la sensazione del sole che sorge."},
   {name:"Il passo", th:"Finora le note saltavano da un punto all'altro; ora arriva il gradino che le fa camminare. Questa nota non è riposo né tensione: è movimento puro. Con lei la melodia smette di balzare e inizia a passeggiare, un passo dopo l'altro. La sensazione è quella del cammino dolce."},
   {name:"La pentatonica", th:"L'ultima nota completa la pentatonica: cinque suoni, zero semitoni, zero tensione. È la scala \"a prova di errore\", dove qualsiasi cosa suoni va bene. Senti l'apertura totale, calda e senza gravità: niente tira, tutto galleggia. Tieni a mente bene questa sensazione, perché nel prossimo corso la trasformeremo."}]},
  maj:{title:"La scala maggiore", desc:"Prendi la pentatonica che hai costruito e aggiungi le due note che le mancano. Sono le uniche due che creano un semitono, e cambiano tutto: dove prima tutto galleggiava, ora compare la gravità. Tensione che chiede di risolvere, il bisogno di tornare a casa. È così che dalla pentatonica nasce il suono pieno e affermativo della scala maggiore, l'alfabeto di quasi ogni melodia che conosci.",
   levels:[
   {name:"La sensibile", th:"Ecco la prima vera tensione. La sensibile sta a un solo semitono da casa: non sta ferma, preme, tira verso l'alto, chiede di scaricarsi sulla tonica. Dopo tutto il galleggiare della pentatonica, per la prima volta senti una nota che NON vuole restare dov'è: è lei che rende il ritorno a casa inevitabile. La sensazione cambia: ora c'è un richiamo."},
   {name:"La scala completa", th:"L'ultima nota chiude il cerchio: tutti e sette i gradi. La sottodominante apre il primo passo del viaggio armonico e, insieme alla sensibile, forma il tritono nascosto (fa-si), il motore segreto di ogni chiusura. Ora la scala ha gravità piena: ogni tensione sa dove andare. Questa è la sensazione del maggiore: affermazione, arrivo, casa."}]}},
 TH:[
  "Il punto di riposo. Tutto si misura da qui e tutto, prima o poi, ci torna. Quando la melodia atterra sulla tonica, la frase si chiude.",
  "Un semitono sopra casa: striscia, preme, non sta ferma. È la tensione cromatica pura, il colore scuro del modo frigio.",
  "Il passo naturale della melodia. Non è riposo e non è dramma: è movimento, il gradino con cui le frasi camminano.",
  "La nota che scurisce: con lei il modo diventa minore. Malinconia, interiorità. Cuore dell'accordo minore.",
  "La nota che illumina: con lei il modo diventa maggiore. Apertura, affermazione. Cuore dell'accordo maggiore.",
  "Il primo passo del viaggio armonico (I→IV). Sospende senza drammatizzare: è la quarta del sus4, che chiede di posarsi sulla terza.",
  "Divide l'ottava esattamente a metà: massima instabilità, nessuna gerarchia. È il motore dell'accordo di dominante: vuole risolvere per semitoni, in entrambe le direzioni.",
  "Il pilastro. L'intervallo più stabile dopo l'ottava, e insieme la tensione strutturale dell'armonia: la dominante esiste per tirare verso casa.",
  "La malinconia dolce del modo minore. Pesa verso il basso: tende a scendere di semitono sulla dominante.",
  "Calda e aperta, il colore del maggiore che sorride. Da qui la relativa minore è a un passo.",
  "Il colore del blues e del mixolidio, la settima dell'accordo di dominante. Tensione morbida che scende verso la mediante.",
  "Il fulmine: a un semitono da casa, carica massima verso l'alto. È la sensibile, la nota che rende inevitabile il ritorno alla tonica."],
 GUIDE:[
  {h:"Cosa alleni qui", p:"Huermony allena l'orecchio relativo con una piccola sinestesia: ogni suono, rispetto alla tonica (la nota di casa), ha sempre lo stesso colore, lo stesso simbolo e lo stesso posto sulla ruota. Cambi la nota di partenza e i colori restano gli stessi. Non impari le note a memoria: impari le distanze."},
  {h:"Il percorso", p:"Nella <b>Home</b> trovi i corsi uno sotto l'altro, come un sentiero. Si parte dalla <b>pentatonica</b>: 5 note, nessuna tensione, facili da cantare. La costruisci un suono alla volta (Casa e Pilastro, poi Sole, Passo, Cielo). Quando la finisci si sblocca la <b>scala maggiore</b>: prendi la pentatonica e aggiungi le 2 note che creano la tensione. Sotto a ogni scala c'è una riga di cerchi colorati: toccali per sentire le note, tocca l'altoparlante per sentire tutta la scala."},
  {h:"Come si gioca", t:"do", p:"È come Simon: ascolta e ripeti.<br>1. Premi <b>Gioca</b> (o il grande tasto Play al centro della ruota): parte una breve melodia.<br>2. Ripetila toccando i cerchi nello stesso ordine.<br>3. Giusta? Riparte con una nota in più.<br><br>Si sale fino al <b>round 7</b>: lì hai superato il livello. Se sbagli vedi la sequenza giusta, ed è lì che si impara. Il ritmo cambia da solo: le note hanno durate diverse, ma a te basta l'ordine. La <b>velocità</b> la regoli come in un video: 0.5x, 1x, 1.5x, 2x."},
  {h:"Difficoltà e stelle", p:"Apri un livello e in cima trovi <b>Inizia a giocare</b> con tre difficoltà:<br><b>Facile</b>: vedi i colori e ascolti.<br><b>Normale</b>: solo a orecchio, niente colori.<br><b>Difficile</b>: la tonica cambia a ogni round.<br><br><span style='color:var(--gold)'>★</span> arrivi al round 5 · <span style='color:var(--gold)'>★★</span> al round 7 · <span style='color:var(--gold)'>★★★</span> al round 7 senza usare Riascolta. Fino a 9 stelle per livello. Ogni difficoltà si sblocca con 1★ nella precedente. Più in basso, in <b>Cosa imparerai</b>, trovi il ruolo di ogni suono da ascoltare con calma."},
  {h:"Rispondi con la voce o lo strumento", p:"Attiva il <b>microfono</b> e invece di toccare lo schermo puoi rispondere cantando, fischiando o suonando uno strumento a una nota per volta. Vale qualsiasi ottava: conta la nota, non se è acuta o grave. Mentre fai il suono, la ruota si illumina su quello che stai intonando, così vedi se sei centrato."},
  {h:"Libero", p:"In <b>Libero</b> esplori senza punteggio. Prima scegli scala e tonica, poi senti le note. Usa <b>Assaggia</b> per sentire il sapore della scala, tocca gli accordi del modo per costruirti un giro, e premi <b>Cambia</b> quando vuoi ripartire da un'altra scala. È lo spazio per le idee, non per i record."},
  {h:"Teoria", p:"In <b>Teoria</b> trovi il carattere di ogni suono: dove tira, che sapore ha, quanto è lontano dalla tonica. Ci sono anche i <b>modi</b>, cioè le diverse atmosfere che nascono spostando il centro della scala. Tutto si può ascoltare, non solo leggere."},
  {h:"Mettila sul telefono", p:"Huermony si installa senza nessuno store. Aprila nel browser, poi su iPhone fai <b>Condividi → \"Aggiungi a Home\"</b>, su Android <b>menu → \"Installa app\"</b>. Da lì si apre a tutto schermo con la sua icona e funziona anche <b>offline</b>."},
  {h:"Da computer", t:"key", p:"Puoi giocare con la tastiera. <b>A</b> = tonica, poi <b>W S E D F T G Y H U J</b> salendo per semitoni, come i tasti di un pianoforte. <b>R</b> = riascolta, <b>Invio</b> = gioca. Fuori dalla partita i tasti suonano liberi: usali per esplorare i colori."},
  {h:"Un consiglio", t:"tip", p:"Meglio <b>5 minuti al giorno</b> che un'ora alla domenica. L'orecchio si forma con la ripetizione frequente, non con lo sforzo di una volta sola. Tieni d'occhio la <b>streak</b> nel Profilo: ti aiuta a non saltare i giorni. Quando ti accorgi di \"vedere\" il colore di un suono prima ancora di pensarci, sta funzionando."}]
},

 tips:[
  {s:0,ic:'bulb',t:"The distance from tonic to mediant (the major third) is 4 semitones: it's what makes a chord sound \"major\"."},
  {s:0,ic:'bulb',t:"The perfect fifth is 7 semitones from the tonic: the most stable interval after the octave, the \"pillar\"."},
  {s:0,ic:'bulb',t:"The leading tone is just one semitone below the tonic: that's why it \"pulls\" home so strongly."},
  {s:0,ic:'bulb',t:"The tritone splits the octave exactly in half, 6 semitones: the most unstable interval, the engine of tension."},
  {s:0,ic:'bulb',t:"The pentatonic has no semitones: that's why no note ever sounds \"wrong\"."},
  {s:0,ic:'bulb',t:"A whole tone is 2 semitones. The major scale is a precise sequence of tones and semitones: W-W-H-W-W-W-H."},
  {s:0,ic:'bulb',t:"Changing the tonic doesn't change the distances: relative pitch recognizes intervals, not absolute notes."},
  {s:1,ic:'brain',t:"Repeating the melody from memory, not just listening, locks in learning far more than passive listening."},
  {s:1,ic:'brain',t:"Pairing each sound with a color and a symbol uses dual coding: the brain memorizes faster."},
  {s:1,ic:'brain',t:"Five minutes a day beats an hour a week: your ear is built by frequent repetition."},
  {s:1,ic:'brain',t:"Relative pitch is a trainable skill, not a gift: it improves with practice at any age."},
  {s:1,ic:'brain',t:"Singing the notes, not just hearing them, speeds up intonation: the voice teaches the ear."},
  {s:1,ic:'brain',t:"Ear training works hearing, memory and movement together: that's why it keeps the mind active."},
  {s:1,ic:'brain',t:"When you \"see\" an interval's color before thinking, the synesthesia is working: the color comes before the name."},
  {s:1,ic:'brain',t:"Making a mistake and then seeing the right answer is one of the most effective ways to learn: corrected errors stick."}

 fiBody:"Pick a scale and tonic and train your ear freely, no path.<br><br><b>Play</b> — repeat the melody that grows each round.<br><b>Taste</b> — hear the flavor of the chosen scale.<br><b>Chords</b> — tap them under the wheel to build a progression.<br><b>Sing</b> — answer with your voice instead of the keys.<br><br>Colors and symbols are the same everywhere: what you learn here works in the levels, and vice versa.",

 modesTitle:"The modes: the light of the journey",
 modesIntro:"A mode is the same necklace of notes with a different home: take the seven notes of the major scale, pick another one of them as the tonic, and the distances from home change: a different constellation lights up. Major and natural minor are modes too (Ionian and Aeolian): we call them scales only because they are the two defaults. Same places, different light.",
 MODETH:{
  lyd:{nick:"the feather",desc:"It removes the major scale's only downward pull (the falling fourth) and everything floats: dreamy, fairy-tale, mid-air. The sound of wonder in film scores. Feels like: flying."},
  maj:{nick:"the flag",desc:"Full major: affirmative, square, every tension knows where to resolve. The default light of Western music: anthems, pop, stadium choirs. Feels like: arriving."},
  mixo:{nick:"the road",desc:"Major without the leading tone: no rush to get home. Earthy, warm, a little dusty: blues, seventies rock, folk. Feels like: walking in the sun."},
  dor:{nick:"the compass",desc:"Minor with a straight back: the major sixth lights a hope inside the melancholy. Cool, elegant, never desperate: modal jazz, Santana, Celtic ballads. Feels like: sunset with a clear course."},
  min:{nick:"the umbrella",desc:"Natural minor, the default melancholy: inner rain, nostalgia, gathering in. Feels like: evening indoors while it rains."},
  phr:{nick:"the wind",desc:"The minor second above the tonic presses like a hot, dark wind: Spanish, Mediterranean, threatening. Flamenco and metal both claim it. Feels like: a windy night."},
  loc:{nick:"the vortex",desc:"It has no perfect fifth: the floor is missing. Everything hangs, unstable, in controlled fall. Almost never a home key, almost always a passage. Feels like: vertigo."}},

 courses:{
  pent:{title:"The pentatonic", desc:"Five notes that never miss together: no semitones, no tension. Everything floats, everything sounds good. It's the most widespread scale in the world, from blues to folk songs. Here you build the foundations of your ear: home, openness, movement. The base sensation everything else will grow from.",
   levels:[
   {name:"The two poles", th:"You start from the two points all music moves between: the tonic, the rest, and the dominant, its pillar. One is home, the other is the push that brings you back home. No color yet, no tension: you feel only the axis, the north and south of sound. It's the sensation of stability, the floor under your feet."},
   {name:"The arpeggio", th:"The major third arrives and suddenly there's an identity: with home and pillar it forms the major chord, its smile. It's the note that turns the light on. Feel how from two bare points a full, open, affirmative color is born: the sensation of the rising sun."},
   {name:"The step", th:"Until now the notes leaped from point to point; now comes the stair-step that makes them walk. This note is neither rest nor tension: it's pure movement. With it the melody stops jumping and starts strolling, one step after another. The sensation is a gentle walk."},
   {name:"The pentatonic", th:"The last note completes the pentatonic: five sounds, zero semitones, zero tension. It's the \"fail-safe\" scale where anything you play works. Feel the total openness, warm and weightless: nothing pulls, everything floats. Hold on to this sensation, because in the next course we'll transform it."}]},
  maj:{title:"The major scale", desc:"Take the pentatonic you built and add the two notes it's missing. They're the only two that create a semitone, and they change everything: where before everything floated, now there's gravity. Tension asking to resolve, the need to get home. That's how the full, affirmative sound of the major scale is born from the pentatonic, the alphabet of almost every melody you know.",
   levels:[
   {name:"The leading tone", th:"Here's the first real tension. The leading tone sits just a semitone from home: it won't sit still, it presses, it pulls upward, it begs to discharge onto the tonic. After all the floating of the pentatonic, for the first time you feel a note that does NOT want to stay put: it's what makes the return home inevitable. The sensation shifts: now there's a pull."},
   {name:"The full scale", th:"The last note closes the circle: all seven degrees. The subdominant opens the first step of the harmonic journey and, with the leading tone, forms the hidden tritone (fa-ti), the secret engine of every closure. Now the scale has full gravity: every tension knows where to go. This is the sensation of major: affirmation, arrival, home."}]}},
 TH:[
  "The resting point. Everything is measured from here and everything, sooner or later, returns here. When the melody lands on the tonic, the phrase closes.",
  "A semitone above home: it creeps, it presses, it will not sit still. Pure chromatic tension, the dark color of the Phrygian mode.",
  "The natural step of melody. Neither rest nor drama: it is motion, the stair-step that phrases walk on.",
  "The note that darkens: with it the mode turns minor. Melancholy, interiority. The heart of the minor chord.",
  "The note that brightens: with it the mode turns major. Openness, affirmation. The heart of the major chord.",
  "The first step of the harmonic journey (I→IV). It suspends without drama: it is the fourth of the sus4 chord, asking to settle onto the third.",
  "It splits the octave exactly in half: maximum instability, no hierarchy. The engine of the dominant seventh chord: it wants to resolve by semitones, in both directions.",
  "The pillar. The most stable interval after the octave, and at the same time the structural tension of harmony: the dominant exists to pull toward home.",
  "The sweet melancholy of the minor mode. It leans downward: it tends to fall by semitone onto the dominant.",
  "Warm and open, the color of the major mode smiling. From here, the relative minor is one step away.",
  "The color of blues and Mixolydian, the seventh of the dominant chord. Soft tension drifting down toward the mediant.",
  "The lightning: a semitone from home, maximum upward charge. It is the leading tone, the note that makes the return to the tonic inevitable."],
 GUIDE:[
  {h:"What you're training", p:"Huermony trains your relative ear with a little synesthesia: every sound, compared to the tonic (the home note), always has the same color, the same symbol and the same place on the wheel. Change the starting note and the colors stay the same. You don't memorize notes: you learn distances."},
  {h:"The path", p:"On the <b>Home</b> screen the courses sit one below the other, like a trail. You start with the <b>pentatonic</b>: 5 notes, no tension, easy to sing. You build it one sound at a time (Home and Pillar, then Sun, Step, Sky). Finish it and the <b>major scale</b> unlocks: you take the pentatonic and add the 2 notes that create the tension. Under each scale there's a row of colored circles: tap them to hear the notes, tap the speaker to hear the whole scale."},
  {h:"How to play", t:"do", p:"It's like Simon: listen and repeat.<br>1. Press <b>Play</b> (or the big Play button in the center of the wheel): a short melody starts.<br>2. Repeat it by tapping the circles in the same order.<br>3. Right? It restarts with one more note.<br><br>You climb up to <b>round 7</b>: that's when you clear the level. If you make a mistake you see the right sequence, and that's where you learn. The rhythm changes on its own: notes have different lengths, but you only need the order. <b>Speed</b> works like a video player: 0.5x, 1x, 1.5x, 2x."},
  {h:"Difficulty and stars", p:"Open a level and at the top you'll find <b>Start playing</b> with three difficulties:<br><b>Easy</b>: see the colors and listen.<br><b>Normal</b>: by ear only, no colors.<br><b>Hard</b>: the tonic changes every round.<br><br><span style='color:var(--gold)'>★</span> reach round 5 · <span style='color:var(--gold)'>★★</span> round 7 · <span style='color:var(--gold)'>★★★</span> round 7 without using Replay. Up to 9 stars per level. Each difficulty unlocks with 1★ in the previous one. Further down, in <b>What you'll learn</b>, you'll find the role of each sound to listen to at your own pace."},
  {h:"Answer with your voice or instrument", p:"Turn on the <b>microphone</b> and instead of tapping the screen you can answer by singing, whistling or playing one note at a time on an instrument. Any octave works: the note is what counts, not whether it's high or low. While you make the sound, the wheel lights up on what you're producing, so you can see if you're on target."},
  {h:"Free play", p:"In <b>Free play</b> you explore with no score. First pick a scale and a tonic, then hear the notes. Use <b>Taste it</b> to feel the flavor of the scale, tap the chords of the mode to build a little progression, and press <b>Change</b> whenever you want to start over with another scale. This is the space for ideas, not for records."},

  {h:"Put it on your phone", p:"Huermony installs without any store. Open it in your browser, then on iPhone tap <b>Share → \"Add to Home Screen\"</b>, on Android <b>menu → \"Install app\"</b>. From there it opens full screen with its own icon and works <b>offline</b> too."},

function cumSet(c,wi){let s=(CBASE[c]||[]).slice(); for(let i=0;i<=wi;i++)s=s.concat(CWADD[c][i]); return [...new Set(s)].sort((a,b)=>a-b);}
function courseUnlocked(c){
 if(unlockAll()) return true;
 const idx=COURSE_IDS.indexOf(c);
 if(idx<=0) return true;

 return S9.courses[prev].levels.every((_,i)=>levelStars(prev,i)>=1);
}
function maxUnlockedWorld(c){let m=0; for(let i=0;i<CWADD[c].length;i++){if(worldUnlocked(c,i))m=i;} return m;}

function tutPress(k){
 if(tut.allowed.length&&!tut.allowed.includes(k)) return;
 ensureCtx();
 if(tut.step===1&&k===0){
  flash(0); tone(60,0.5); tutAllow([-1]);
  timers.push(setTimeout(()=>{tutAllow([7]); setStatus(S9.tut2);},800));
  tut.step=2; return;
 }
 if(tut.step===2&&k===7){
  flash(7); tone(67,0.5); tutAllow([-1]); tut.step=3;
  timers.push(setTimeout(()=>{
   setStatus(S9.tut3);
   tutMelody(()=>{tut.expect=[0,7]; tut.pos=0; tutAllow([0,7]); setStatus(S9.tutGo);});
  },800));
  return;
 }
 if(tut.step===3&&tut.expect.length){
  flash(k); tone(60+k,0.4);
  if(k===tut.expect[tut.pos]){
   tut.pos++;
   if(tut.pos>=tut.expect.length){
    tut.step=4; tutAllow([-1]);
    setStatus(S9.tutDone,'ok'); chime();
    localStorage.setItem('hm_tut_done','1');
    timers.push(setTimeout(()=>showLevelDetail('pent',0),2200));
   }
  } else {
   tut.pos=0; tutAllow([-1]);
   setStatus(S9.tutRetry,'err');
   timers.push(setTimeout(()=>{
    tutMelody(()=>{tutAllow([0,7]); setStatus(S9.tutGo);});
   },700));
  }
 }
}

  const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=f;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=Math.min(6000,f*6);
  o.connect(lp); lp.connect(g); oscs=[o]; peak=0.30;
 } else if(timbre==='pad'){
  [-7,0,7].forEach(c=>{const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=f; o.detune.value=c; o.connect(g); oscs.push(o);}); peak=0.10;
 } else if(timbre==='voce'){
  const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=f; o.connect(g); oscs.push(o);
  lfo=ctx.createOscillator(); lfo.frequency.value=5.5; const lg=ctx.createGain(); lg.gain.value=f*0.012; lfo.connect(lg); lg.connect(o.frequency);

let chordSeq=[];
function diatonicChords(){
 const sc=SCALES[scale];
 if(sc.length!==7) return null;
 return sc.map((k,i)=>{
  const n2=sc[(i+2)%7]+((i+2)>=7?12:0);
  const n3=sc[(i+4)%7]+((i+4)>=7?12:0);
  const t3=n2-k, t5=n3-k;
  let q='maj';
  if(t3===3&&t5===7)q='min'; else if(t3===3&&t5===6)q='dim'; else if(t3===4&&t5===8)q='aug';
  const ROM=['I','II','III','IV','V','VI','VII'][i];
  const name=q==='maj'?ROM:(q==='aug'?ROM+'+':ROM.toLowerCase()+(q==='dim'?'°':''));
  return {k:k, notes:[k,n2,n3], name:name};
 });
}
function chordTones(c){
 c.notes.forEach(n=>tone(60+root+n,0.85));
 tone(48+root+c.k,0.85);
}
function chordFlash(c,ms){
 c.notes.forEach(n=>{const b=$('b'+(n%12)); if(b){b.style.transform='scale(1.22)'; setTimeout(()=>{b.style.transform='scale(1)';},ms||380);}});
 const ct=$('ctr');
 if(ct){ct.style.background=C[c.k%12].h; ct.style.color=ink(c.k%12);
  ct.innerHTML='<span style="font-size:30px;font-weight:700">'+c.name+'</span>';
  ct.style.opacity='0.95'; setTimeout(()=>{ct.style.opacity='0';},ms||380);}
}
function tapChord(c){
 if(state==='play'||state==='input'||state==='wait') return;
 ensureCtx(); chordTones(c); chordFlash(c);
 if(chordSeq.length<16){chordSeq.push(c); renderChordSeq();}
}
function renderChordSeq(){
 const row=$('chordseqrow');
 if(!chordSeq.length){row.hidden=true; row.innerHTML=''; return;}
 row.hidden=false;
 let h='';
 chordSeq.forEach(c=>{h+='<span class="chip" style="font-weight:600;color:'+C[c.k%12].h+'">'+c.name+'</span>';});
 row.innerHTML=h+'<button class="btn" id="seqplay" style="padding:6px 10px" aria-label="play"><i class="ti ti-player-play" style="font-size:13px"></i></button><button class="btn" id="seqclear" style="padding:6px 10px" aria-label="clear"><i class="ti ti-x" style="font-size:13px"></i></button>';
 $('seqplay').addEventListener('click',playChordSeq);
 $('seqclear').addEventListener('click',()=>{chordSeq=[]; renderChordSeq();});
}
function playChordSeq(){
 if(!chordSeq.length||state==='play'||state==='input'||state==='wait') return;
 ensureCtx(); clearTimers(); state='play';
 const stepMs=Math.max(380,700/speed); let t=100;
 chordSeq.forEach(c=>{timers.push(setTimeout(()=>{chordTones(c); chordFlash(c,stepMs-60);},t)); t+=stepMs;});
 timers.push(setTimeout(()=>{state='idle';},t+200));
}
function renderChords(){
 const bar=$('chordbar');
 const chs=game.kind==='free'?diatonicChords():null;
 if(!chs){bar.hidden=true; $('chordseqrow').hidden=true; chordSeq=[]; return;}
 let h='<p style="font-size:13px;color:var(--muted);margin:0 0 6px">'+S9.chordsTitle+'</p><div style="display:flex;gap:6px;flex-wrap:wrap">';
 chs.forEach((c,i)=>{
  let dots='';
  c.notes.forEach(n=>{dots+='<span style="width:8px;height:8px;border-radius:50%;background:'+C[n%12].h+'"></span>';});
  h+='<button class="pill" style="gap:6px" data-ci="'+i+'"><span style="font-weight:700">'+c.name+'</span><span style="display:inline-flex;gap:2px">'+dots+'</span></button>';
 });
 h+='</div>';
 bar.hidden=false; bar.innerHTML=h;
 [...bar.querySelectorAll('button')].forEach(b=>{b.addEventListener('click',()=>tapChord(chs[+b.dataset.ci]));});
 chordSeq=[]; renderChordSeq();
}
function tasteMelody(){
 if(state==='play'||state==='wait'||state==='input') return;
 ensureCtx(); clearTimers(); state='play'; setStatus(S9.tasting);
 const sc=SCALES[scale].slice();
 const ext=sc.concat([12]);
 const n=6+Math.floor(Math.random()*5);
 const ch=(CHARS[scale]||[]).filter(k=>sc.includes(k));
 let idx=0; const mel=[0];
 for(let i=1;i<n-1;i++){
  const r=Math.random();
  if(ch.length&&r<0.22){idx=sc.indexOf(ch[Math.floor(Math.random()*ch.length)]);}
  else if(r<0.62){idx+=(Math.random()<0.5?-1:1);}
  else if(r<0.87){idx+=(Math.random()<0.5?-2:2);}
  else {idx=Math.floor(Math.random()*ext.length);}
  idx=Math.max(0,Math.min(ext.length-1,idx));
  mel.push(ext[idx]);
 }
 mel.push(Math.random()<0.7?0:12);
 const base=520/speed; let t=150;
 mel.forEach((k,i)=>{
  const df=i===mel.length-1?2:[0.5,0.75,1,1,1.5][Math.floor(Math.random()*5)];
  const ms=base*df;
  timers.push(setTimeout(()=>{flash(k%12,ms-80); tone(60+root+k,Math.max(0.2,ms*0.85/1000));},t));
  t+=ms;
 });
 timers.push(setTimeout(()=>{state='idle'; setStatus(''); centerPlay();},t+100));
}

let micOn=false, micStream=null, micAn=null, micBuf=null, micTimer=null, micGlowed=-1;
let det={pc:-1,count:0,locked:false,lockedPc:-1,silence:0};
function autoCorrelate(buf,sr){
 let SIZE=buf.length, rms=0;
 for(let i=0;i<SIZE;i++){const v=buf[i]; rms+=v*v;}
 rms=Math.sqrt(rms/SIZE);
 if(rms<0.01) return -1;
 // ritaglia i bordi silenziosi
 let r1=0,r2=SIZE-1;
 for(let i=0;i<SIZE/2;i++) if(Math.abs(buf[i])<0.2){r1=i;break;}
 for(let i=1;i<SIZE/2;i++) if(Math.abs(buf[SIZE-i])<0.2){r2=SIZE-i;break;}
 buf=buf.slice(r1,r2); SIZE=buf.length;
 if(SIZE<256) return -1;
 // calcola l'autocorrelazione SOLO per i lag musicali utili (60..1600 Hz)
 const minLag=Math.max(2,Math.floor(sr/1600)), maxLag=Math.min(SIZE-1,Math.ceil(sr/60));
 const c=new Float32Array(maxLag+1);
 for(let i=0;i<=maxLag;i++){let s=0; for(let j=0;j<SIZE-i;j++) s+=buf[j]*buf[j+i]; c[i]=s;}
 // salta la discesa iniziale, poi prendi il primo picco forte (la fondamentale)
 let d=minLag; while(d<maxLag&&c[d]>c[d+1]) d++;
 let maxval=-1,maxpos=-1;
 for(let i=d;i<=maxLag;i++){if(c[i]>maxval){maxval=c[i];maxpos=i;}}
 if(maxpos<1) return -1;
 if(c[0]>0&&maxval/c[0]<0.4) return -1; // poca periodicita' = non e' una nota
 // affinamento del picco a lag FRAZIONARI (autocorrelazione interpolata): risoluzione molto piu' fine = note acute piu' precise
 const corrAt=(lag)=>{const i0=Math.floor(lag),fr=lag-i0,lim=SIZE-i0-1; let s=0; for(let j=0;j<lim;j++)s+=buf[j]*(buf[j+i0]*(1-fr)+buf[j+i0+1]*fr); return s;};
 let T0=maxpos, bv=maxval;
 for(let lag=maxpos-1; lag<=maxpos+1; lag+=0.2){ if(lag<minLag||lag>=SIZE-1) continue; const v=corrAt(lag); if(v>bv){bv=v; T0=lag;} }
 const dx=0.2, y1=corrAt(T0-dx), y2=corrAt(T0), y3=corrAt(T0+dx);
 const a=(y1+y3-2*y2)/2, b=(y3-y1)/2;
 if(a) T0=T0-(b/(2*a))*dx;
 const f=sr/T0;
 return (f>60&&f<1600)?f:-1;
}
function micGlow(k){
 if(micGlowed===k) return;
 if(micGlowed>=0){const o=$('b'+micGlowed); if(o) o.style.outline='';}
 if(k>=0){const b=$('b'+k); if(b) b.style.outline='3px solid rgba(255,255,255,0.65)';}
 micGlowed=k;
}
function micLoop(){
 if(!micAn) return;
 micAn.getFloatTimeDomainData(micBuf);
 const f=autoCorrelate(micBuf,ctx.sampleRate);
 if(f<0){
  det.count=0; det.silence++; det.fbuf=[];
  if(det.silence>=2){det.locked=false; det.pc=-1; micGlow(-1); $('micline').textContent=S9.micListen;}
  return;
 }
 det.silence=0;
 // media (mediana) su 3 frame: toglie il tremolio della stima, soprattutto sulle acute
 if(!det.fbuf) det.fbuf=[];
 det.fbuf.push(f); if(det.fbuf.length>3) det.fbuf.shift();
 const fs=det.fbuf.slice().sort((a,b)=>a-b); const fmed=fs[(fs.length-1)>>1];
 const midi=69+12*Math.log2(fmed/440);
 const pcAbs=((Math.round(midi))%12+12)%12;
 const k=(pcAbs-(root%12)+12)%12;
 micGlow(k);
 $('micline').innerHTML='♪ '+NOTE[pcAbs]+' · <b>'+IV[k]+'</b> ('+DEG[k]+') · '+Math.round(fmed)+' Hz';
 if(state!=='input') return;
 if(det.pc===k) det.count++; else {det.pc=k; det.count=1;}
 if(det.locked&&k!==det.lockedPc) det.locked=false;
 if(!det.locked&&det.count>=3){
  if(activeSet().includes(k)){hit(k,true);}
  det.locked=true; det.lockedPc=k;
 }
}
async function startMic(){
 try{
  ensureCtx();
  micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false, noiseSuppression:false, autoGainControl:false}});
  const src=ctx.createMediaStreamSource(micStream);
  micAn=ctx.createAnalyser(); micAn.fftSize=2048;
  micBuf=new Float32Array(micAn.fftSize);
  src.connect(micAn);
  micTimer=setInterval(micLoop,50);
  micOn=true;
  $('miccb').setAttribute('aria-pressed','true');
  $('micline').hidden=false; $('micline').textContent=S9.micListen;
 }catch(e){
  micOn=false; $('miccb').setAttribute('aria-pressed','false');
  $('micline').hidden=false; $('micline').textContent=S9.micErr;
  setTimeout(()=>{if(!micOn)$('micline').hidden=true;},3000);
 }
}
function stopMic(){
 if(micTimer){clearInterval(micTimer); micTimer=null;}
 if(micStream){micStream.getTracks().forEach(t=>t.stop()); micStream=null;}
 micAn=null; micOn=false; micGlow(-1);
 $('micline').hidden=true; $('miccb').setAttribute('aria-pressed','false');
}

function press(k){
 if(game.kind==='tut'){tutPress(k); return;}
 if(game.kind==='boss'){ if(state==='input'){bossHit(k);} else if(state==='idle'||state==='over'){ensureCtx(); flash(k,300,true); tone(60+k,0.38);} return; }
 if(state==='input'){hit(k); return;}
 if(state==='idle'||state==='over'){ensureCtx(); flash(k,300,true); tone(60+root+k,0.38);}
}
function hit(k,fromMic){
 if(state!=='input') return; ensureCtx();
 const correct=(k===seq[step]);
 flash(k,300,!correct); if(!fromMic) tone(60+root+k,0.38);
 if(correct){
  step++;
  if(step===seq.length){
   if(game.kind==='level'&&seq.length>=STAR2){ finishLevel(); return; }
   let cm=S9.correct;
   if(game.kind==='level'&&seq.length===STAR1){cm+=' · ★ '+S9.starGot; chime();}
   setStatus(cm,'ok');
   if(game.kind==='free'){
    const b=+(localStorage.getItem(bestKey())||0);
    if(seq.length>b){localStorage.setItem(bestKey(),seq.length); loadBest();}
   }
   timers.push(setTimeout(()=>{addNote(); $('round').textContent=seq.length; playSeq();},900));
   state='wait';
  } else setStatus(S9.yourTurn(step,seq.length));
 } else {
  state='over'; buzz();
  const wrong=seq[step];
  let msg=S9.wrong(step+1,IV[wrong],DEG[wrong]);
  if(game.kind==='level'){
   const completed=seq.length-1;
   let st=0; if(completed>=STAR1)st=1; if(completed>=STAR2)st=2; if(completed>=STAR2&&!usedRehear)st=3;
   const before=starsOf(game.c,game.w,game.m);
   const wBefore=CWADD[game.c].map((_,i)=>worldUnlocked(game.c,i));
   saveProg(game.c,'w'+game.w+'m'+game.m,{stars:st,bestRound:completed});
   const newW=CWADD[game.c].findIndex((_,i)=>worldUnlocked(game.c,i)&&!wBefore[i]);
   if(newW>=0) timers.push(setTimeout(()=>showCelebrate(game.c,newW),900));
   loadBest();
   msg+=' · '+S9.roundW+' '+completed;
   if(st>before){msg+=S9.newStar; chime();}
   setStatus(msg+' <span style="color:var(--gold);letter-spacing:2px">'+starsStr(Math.max(st,before))+'</span>','err');
  } else {
   setStatus(msg,'err');
  }
  const rv=$('reveal'); rv.innerHTML='';
  seq.forEach((q,i)=>{
   const d=document.createElement('div'); d.className='chip'+(i===step?' err':'');
   d.innerHTML='<span class="sw" style="background:'+C[q].h+';color:'+ink(q)+'"><i class="ti ti-'+C[q].ic+'" style="font-size:11px"></i></span><b>'+IV[q]+'</b>';
   rv.appendChild(d);});
  centerPlay();
 }
}
$('tastebtn').addEventListener('click',function(){this.blur(); tasteMelody();});
$('freeinfo').addEventListener('click',function(){this.blur(); openFreeIntro();});
$('fi-close').addEventListener('click',()=>{localStorage.setItem('hm_free_seen','1'); $('freeintro').hidden=true;});
$('fs-reopen').addEventListener('click',function(){this.blur(); openFreeSetup();});
$('fs-scale').addEventListener('change',renderFsPreview);
$('fs-tonic').addEventListener('change',renderFsPreview);
$('fs-taste').addEventListener('click',function(){this.blur(); ensureCtx(); const sc=$('fs-scale').value, rt=+$('fs-tonic').value; SCALES[sc].concat([12]).forEach((k,i)=>timers.push(setTimeout(()=>tone(60+rt+k,0.34),i*300)));});
$('fs-play').addEventListener('click',startFreeGame);
$('wel-next').addEventListener('click',()=>{if(welStep<S9.welSteps.length-1){welStep++; renderWelStep();} else {localStorage.setItem('hm_welcome_seen','1'); $('welcome').hidden=true; startTutorial();}});
$('wel-skip').addEventListener('click',()=>{localStorage.setItem('hm_welcome_seen','1'); localStorage.setItem('hm_tut_done','1'); $('welcome').hidden=true; showLevels();});
$('rehear').addEventListener('click',function(){this.blur(); if(game.kind==='boss'){bossReplay(); return;} if(seq.length&&(state==='input'||state==='over')){usedRehear=true; updateGoal(); ensureCtx(); playSeq();}});
$('scsel').addEventListener('change',e=>{scale=e.target.value; clearTimers(); seq=[]; state='idle'; $('round').textContent='–'; setStatus(''); $('reveal').innerHTML=''; render(); renderSig(); renderChords(); loadBest();});
$('rootsel').addEventListener('change',e=>{root=+e.target.value; updateNotes();});
$('spdsel').addEventListener('change',e=>{speed=parseFloat(e.target.value); localStorage.setItem('it_speed',e.target.value);});
function openMicWarn(){ $('mw-title').textContent=S9.micWarnTitle; $('mw-body').innerHTML=S9.micWarnBody; $('mw-ok').textContent=S9.micWarnOk; $('micwarn').hidden=false; }
$('mw-ok').addEventListener('click',()=>{localStorage.setItem('hm_mic_warned','1'); $('micwarn').hidden=true; startMic();});
$('miccb').addEventListener('click',function(){ if(micOn){stopMic();} else if(localStorage.getItem('hm_mic_warned')){startMic();} else {openMicWarn();} });
$('unlockall').addEventListener('change',e=>{
 if(e.target.checked) localStorage.setItem('it_unlockall','1');
 else localStorage.removeItem('it_unlockall');
 renderPath();
});
document.addEventListener('keydown',e=>{
 if(e.repeat||e.metaKey||e.ctrlKey||e.altKey) return;
 if($('view-game').hidden) return;
 const tag=(e.target.tagName||'').toLowerCase();
 if(tag==='select'||tag==='input'||tag==='textarea') return;
 const key=e.key.toLowerCase();
 if(key==='enter'){if(document.activeElement===document.body&&(state==='idle'||state==='over')){e.preventDefault(); beginGame();} return;}
 if(key==='r'){$('rehear').click(); return;}
 if(key in KEYMAP){const k=KEYMAP[key]; if(activeSet().includes(k)) press(k);}
});
applyFont();
applyStatic();
showLevels();
if(!localStorage.getItem('hm_welcome_seen')) showWelcome();
if('serviceWorker' in navigator){
 let reloaded=false;
 navigator.serviceWorker.addEventListener('controllerchange',()=>{if(reloaded)return; reloaded=true; location.reload();});
 window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').then(r=>{r.update&&r.update();}).catch(()=>{});});
}
